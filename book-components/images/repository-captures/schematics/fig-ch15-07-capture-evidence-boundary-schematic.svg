<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Level 2 capture evidence boundary</title><desc id="desc">Source, HTTP availability, and future runtime proof are separate evidence classes.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Level 2 capture evidence boundary</text><text x="80" y="120" class="subtitle">Source, HTTP availability, and future runtime proof are separate evidence classes.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(90 210)"><rect width="390" height="360" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">SOURCE-PRESENT</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Repository UI</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Ledger + Command Center</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">AG-UI client wiring</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">supervision components</text></g><g transform="translate(605 210)"><rect width="390" height="360" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">HTTP-VERIFIED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Page availability</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">shell returned 200</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">date + command recorded</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">no visual interaction</text></g><g transform="translate(1120 210)"><rect width="390" height="360" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">BLOCKED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Runtime proof</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">adapter + model absent</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">no isolated worker</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">no denial or tool result</text></g><path d="M 480 390 L 605 390" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 995 390 L 1120 390" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><text x="800" y="856" class="body" text-anchor="middle">The future capture must include runtime, policy, isolation, denial, diff, verification, and recovery evidence.</text></svg>