<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">What the pinned Hermes seam actually proved</title><desc id="desc">Two UI shells answered over HTTP; the external adapter and all machine actions remained unavailable.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">What the pinned Hermes seam actually proved</text><text x="80" y="120" class="subtitle">Two UI shells answered over HTTP; the external adapter and all machine actions remained unavailable.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(90 205)"><rect width="410" height="360" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">HTTP 200 · 2026-07-15</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Ledger shell</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Next.js page answered</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">CopilotKit UI source present</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">no browser capture</text><text x="26" y="196" class="small" fill="#010507" style="fill:#010507">no model or tool event</text></g><g transform="translate(595 205)"><rect width="410" height="360" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">HTTP 200 · 2026-07-15</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Command Center</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Next.js page answered</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">status / trace UI source present</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">no browser capture</text><text x="26" y="196" class="small" fill="#010507" style="fill:#010507">no stored run</text></g><g transform="translate(1100 205)"><rect width="410" height="360" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">UNAVAILABLE</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Hermes adapter :8000</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">external checkout absent</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">no model credentials</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">no file edit or command</text><text x="26" y="196" class="small" fill="#010507" style="fill:#010507">no live AG-UI stream</text></g><text x="800" y="856" class="body" text-anchor="middle">Pinned source fc434913…; source-faithful evidence boundary, not a GUI screenshot.</text></svg>