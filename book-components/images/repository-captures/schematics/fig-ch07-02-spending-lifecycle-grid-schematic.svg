dth="2"/><text x="26" y="36" class="label">EXECUTING</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Searching July</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">safe visible parameters</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">deterministic fixture</text></g><g transform="translate(1095 180)"><rect width="455" height="240" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">COMPLETE</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Dining +18%</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">chart + table + sources</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">accessible text summary</text></g><g transform="translate(75 470)"><rect width="455" height="240" rx="26" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">EMPTY</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">No matches</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">not an error</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">deterministic fixture</text></g><g transform="translate(585 470)"><rect width="455" height="240" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">ERROR</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Search unavailable</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">bounded retry + preserved query</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">deterministic fixture</text></g><g transform="translate(1095 470)"><rect width="455" height="240" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">HISTORICAL</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">