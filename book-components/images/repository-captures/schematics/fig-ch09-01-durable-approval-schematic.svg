<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Approval as a durable state transition</title><desc id="desc">Proposal v7 pauses before consequence and resumes only after a trusted decision.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Approval as a durable state transition</text><text x="80" y="120" class="subtitle">Proposal v7 pauses before consequence and resumes only after a trusted decision.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(55 235)"><rect width="260" height="300" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PROPOSAL V7</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Canonical record</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">amount · account · merchant</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">digest · expiry</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">operation key</text></g><g transform="translate(375 235)"><rect width="260" height="300" rx="26" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">INTERRUPT</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Checkpointed wait</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">thread + interrupt ID</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">no side effect yet</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">client may disconnect</text></g><g transform="translate(695 235)"><rect width="260" height="300" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">REVIEWER</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Authenticate again</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">eligible principal</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">version + policy current</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">decision consumed once</text></g><g transform="translate(1015 235)"><rect width="260" height="300" rx="26" fill="#010507" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">COMMIT</text><text x="26" y="76" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Idempotent write</text><text x="26" y="112" class="small" fill="#FFFFFF" style="fill:#FFFFFF">same operation key</text><text x="26" y="140" class="small" fill="#FFFFFF" style="fill:#FFFFFF">authorize resource</text><text x="26" y="168" class="small" fill="#FFFFFF" style="fill:#FFFFFF">persist receipt</text></g><g transform="translate(1335 235)"><rect width="210" height="300" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">RESULT</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Receipt</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">one effect</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">or unknown</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">→ reconcile</text></g><path d="M 315 385 L 375 385" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 635 385 L 695 385" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 955 385 L 1015 385" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 1275 385 L 1335 385" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><text x="800" y="856" class="body" text-anchor="middle">Target architecture grounded in the tested interrupt excerpt; persistent restart remains unverified.</text></svg>