<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Disconnect and resume test</title><desc id="desc">The proof target is one authorized thread, one logical operation, one effect, and one receipt.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Disconnect and resume test</text><text x="80" y="120" class="subtitle">The proof target is one authorized thread, one logical operation, one effect, and one receipt.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(65 210)"><rect width="270" height="330" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">1 · PAUSED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Proposal v7</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">persistent checkpoint</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">client disconnects</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">no commit</text></g><g transform="translate(385 210)"><rect width="270" height="330" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">2 · RESTART</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Worker stops</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">new process starts</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">loads same thread</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">fencing prevents duplicate</text></g><g transform="translate(705 210)"><rect width="270" height="330" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">3 · RESUME</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Reviewer re-authenticates</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">thread authorized</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">proposal still current</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">decision single-use</text></g><g transform="translate(1025 210)"><rect width="270" height="330" rx="26" fill="#010507" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">4 · COMMIT</text><text x="26" y="76" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Same operation key</text><text x="26" y="112" class="small" fill="#FFFFFF" style="fill:#FFFFFF">external response may drop</text><text x="26" y="140" class="small" fill="#FFFFFF" style="fill:#FFFFFF">query by key</text><text x="26" y="168" class="small" fill="#FFFFFF" style="fill:#FFFFFF">no blind replay</text></g><g transform="translate(1345 210)"><rect width="200" height="330" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">5 · PROOF</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Receipt</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">one effect</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">one receipt</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">trace linked</text></g><path d="M 335 375 L 385 375" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 655 375 L 705 375" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 975 375 L 1025 375" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 1295 375 L 1345 375" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><text x="800" y="856" class="body" text-anchor="middle">Test design only: current companion uses an in-memory checkpointer and does not establish this runtime claim.</text></svg>