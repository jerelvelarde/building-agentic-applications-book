<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Honest offline state for the machine agent</title><desc id="desc">The application shell can be available while the machine runtime is unreachable.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Honest offline state for the machine agent</text><text x="80" y="120" class="subtitle">The application shell can be available while the machine runtime is unreachable.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(180 190)"><rect width="1240" height="480" rx="26" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">LEDGER · SOURCE-FAITHFUL WIREFRAME</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Agent unavailable</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Dashboard shell: available</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">CopilotKit route: available</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">Hermes adapter: unreachable</text><text x="26" y="196" class="small" fill="#010507" style="fill:#010507">Machine tools: not executed</text><text x="26" y="224" class="small" fill="#010507" style="fill:#010507">Safe user action: keep draft · retry connection later</text><text x="26" y="252" class="small" fill="#010507" style="fill:#010507">Forbidden claim: no file edit, diff, command, PDF, approval, or rollback ran</text></g><rect x="230" y="565" width="1140" height="70" rx="24" fill="#FFF1F2" stroke="#FA5F67"/><text x="800" y="608" class="heading" text-anchor="middle">Do not translate “configured” into “ready.”</text><text x="800" y="856" class="body" text-anchor="middle">HTTP shell verified; browser capture unavailable; external Hermes adapter absent.</text></svg>