<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">From progress to receipt</title><desc id="desc">Four truthful product states for one synthetic ledger task.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">From progress to receipt</text><text x="80" y="120" class="subtitle">Four truthful product states for one synthetic ledger task.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(55 190)"><rect width="350" height="470" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">1 · PROGRESS</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Inspecting July</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">scope accepted</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">7 cited observations</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">no product effect</text></g><g transform="translate(435 190)"><rect width="350" height="470" rx="26" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">2 · ARTIFACT</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Spending breakdown</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">reviewable draft</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">source IDs + retrieval time</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">user can inspect</text></g><g transform="translate(815 190)"><rect width="350" height="470" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">3 · PROPOSAL</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Add $42 expense?</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">exact account + merchant</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">proposal v7 · expires 4:30</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">Approve · Edit · Reject</text></g><g transform="translate(1195 190)"><rect width="350" height="470" rx="26" fill="#010507" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">4 · RECEIPT</text><text x="26" y="76" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Transaction created</text><text x="26" y="112" class="small" fill="#FFFFFF" style="fill:#FFFFFF">transaction txn_88</text><text x="26" y="140" class="small" fill="#FFFFFF" style="fill:#FFFFFF">operation key consumed</text><text x="26" y="168" class="small" fill="#FFFFFF" style="fill:#FFFFFF">compensation available</text></g><path d="M 405 425 L 435 425" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 785 425 L 815 425" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 1165 425 L 1195 425" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><text x="800" y="856" class="body" text-anchor="middle">Proposal and receipt remain visually and semantically distinct.</text></svg>