<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Failure and recovery are product states</title><desc id="desc">Each panel says what changed, whether retry is safe, and which control remains.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Failure and recovery are product states</text><text x="80" y="120" class="subtitle">Each panel says what changed, whether retry is safe, and which control remains.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(75 185)"><rect width="455" height="235" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">TOOL DENIED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">No change</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Use scoped read</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">completed effects stay visible</text></g><g transform="translate(585 185)"><rect width="455" height="235" rx="26" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">FAILED SAFELY</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">No mutation</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Retry bounded action</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">completed effects stay visible</text></g><g transform="translate(1095 185)"><rect width="455" height="235" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">OUTCOME UNKNOWN</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">May have committed</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Reconcile by operation key</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">completed effects stay visible</text></g><g transform="translate(75 470)"><rect width="455" height="235" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PARTIALLY COMPLETE</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">3 of 5 artifacts</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Accept, narrow, or resume</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">completed effects stay visible</text></g><g transform="translate(585 470)"><rect width="455" height="235" rx="26" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">DISCONNECTED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Stream lost</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Rejoin same thread</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">completed effects stay visible</text></g><g transform="translate(1095 470)"><rect width="455" height="235" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">CANCEL REQUESTED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Work winding down</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">Wait for terminal evidence</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">completed effects stay visible</text></g></svg>