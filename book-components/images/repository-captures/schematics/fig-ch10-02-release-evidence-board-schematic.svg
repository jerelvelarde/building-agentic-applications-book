<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Level 1 release evidence board</title><desc id="desc">Every panel keeps its evidence status instead of collapsing into “working.”</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Level 1 release evidence board</text><text x="80" y="120" class="subtitle">Every panel keeps its evidence status instead of collapsing into “working.”</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(60 180)"><rect width="350" height="250" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PASS</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">COMPONENT FIXTURE</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">deterministic</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><g transform="translate(445 180)"><rect width="350" height="250" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">BLOCKED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">WEB RUNTIME</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">not captured</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><g transform="translate(830 180)"><rect width="350" height="250" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">BLOCKED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">MOBILE RUNTIME</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">repo reference only</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><g transform="translate(1215 180)"><rect width="350" height="250" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PASS</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">STATE CONFLICT</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">unit-tested</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><g transform="translate(60 480)"><rect width="350" height="250" rx="26" fill="#FFF1F2" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">BLOCKED</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">DURABLE RESTART</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">not implemented</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><g transform="translate(445 480)"><rect width="350" height="250" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PASS</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">IDEMPOTENT RECEIPT</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">deterministic test</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><g transform="translate(830 480)"><rect width="350" height="250" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PENDING</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">EVALUATION REPORT</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">dataset pending</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><g transform="translate(1215 480)"><rect width="350" height="250" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PARTIAL</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">RELEASE MANIFEST</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">pinned dependencies</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">evidence label retained</text></g><text x="800" y="856" class="body" text-anchor="middle">Evidence board for the current book workspace—not a claim that blocked scenarios ran.</text></svg>