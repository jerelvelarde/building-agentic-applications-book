<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Why no fresh Channels screenshot exists</title><desc id="desc">A truthful channel run requires a dedicated synthetic workspace and a complete credentialed path.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="context-stroke"/></marker></defs><style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:.8px;fill:#57575B}</style><rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Why no fresh Channels screenshot exists</text><text x="80" y="120" class="subtitle">A truthful channel run requires a dedicated synthetic workspace and a complete credentialed path.</text><rect x="1080" y="56" width="440" height="44" rx="22" fill="#FFF388"/><text x="1300" y="84" class="label" text-anchor="middle">SCHEMATIC · NOT A RUNTIME SCREENSHOT</text><g transform="translate(70 210)"><rect width="300" height="340" rx="26" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PLATFORM</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Synthetic workspace</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">bot/app tokens</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">scoped channel</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">synthetic identities</text></g><g transform="translate(430 210)"><rect width="300" height="340" rx="26" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">CHANNELS</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Adapter + ingress</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">event dedup</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">thread correlation</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">acknowledgement</text></g><g transform="translate(790 210)"><rect width="300" height="340" rx="26" fill="#010507" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">AGENT</text><text x="26" y="76" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Pinned runtime</text><text x="26" y="112" class="small" fill="#FFFFFF" style="fill:#FFFFFF">authenticated URL</text><text x="26" y="140" class="small" fill="#FFFFFF" style="fill:#FFFFFF">model configuration</text><text x="26" y="168" class="small" fill="#FFFFFF" style="fill:#FFFFFF">read-only first run</text></g><g transform="translate(1150 210)"><rect width="380" height="340" rx="26" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="26" y="36" class="label">PROOF</text><text x="26" y="76" class="heading" fill="#010507" style="fill:#010507">Governed result</text><text x="26" y="112" class="small" fill="#010507" style="fill:#010507">structured response</text><text x="26" y="140" class="small" fill="#010507" style="fill:#010507">wrong-user denial</text><text x="26" y="168" class="small" fill="#010507" style="fill:#010507">proposal + receipt</text><text x="26" y="196" class="small" fill="#010507" style="fill:#010507">privacy/rights record</text></g><path d="M 370 380 L 430 380" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 730 380 L 790 380" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><path d="M 1090 380 L 1150 380" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#a)"/><text x="800" y="856" class="body" text-anchor="middle">Current state: credentials and dedicated workspace unavailable; repository frames remain reference-only.</text></svg>