<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Treat skills like executable supply-chain artifacts</title><desc id="desc">Eight-step pipeline for promoting an agent skill from discovery through integrity verification, capability inventory, disposable testing, ownership, registry publication, and controlled runtime resolution.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Treat skills like executable supply-chain artifacts</text><text x="80" y="122" class="subtitle">Discovery, review, promotion, use, and revocation are separate authority phases.</text><rect x="70" y="270" width="220" height="300" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="92" y="290" width="140" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="162" y="315" class="label" text-anchor="middle" style="fill:#57575B">01 DISCOVER</text>
  <text x="94" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Candidate</tspan></text>
  <text x="94" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">source + license</tspan><tspan x="94" dy="26">never auto-run</tspan></text><path d="M290 420 L314 420" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="318" y="270" width="220" height="300" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="340" y="290" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="395" y="315" class="label" text-anchor="middle" style="fill:#57575B">02 PIN</text>
  <text x="342" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="342" dy="0">Integrity</tspan></text>
  <text x="342" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="342" dy="0">commit · digest</tspan><tspan x="342" dy="26">immutable input</tspan></text><path d="M538 420 L562 420" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="566" y="270" width="220" height="300" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="588" y="290" width="130" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="653" y="315" class="label" text-anchor="middle" style="fill:#57575B">03 INSPECT</text>
  <text x="590" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="590" dy="0">Contents</tspan></text>
  <text x="590" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="590" dy="0">scripts · hooks</tspan><tspan x="590" dy="26">deps · tools</tspan></text><path d="M786 420 L810 420" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="814" y="270" width="220" height="300" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="836" y="290" width="110" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="891" y="315" class="label" text-anchor="middle" style="fill:#57575B">04 TEST</text>
  <text x="838" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="838" dy="0">Disposable run</tspan></text>
  <text x="838" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="838" dy="0">static checks</tspan><tspan x="838" dy="26">adversarial fixtures</tspan></text><path d="M1034 420 L1058 420" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1062" y="270" width="220" height="300" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="1084" y="290" width="130" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1149" y="315" class="label" text-anchor="middle" style="fill:#57575B">05 PROMOTE</text>
  <text x="1086" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1086" dy="0">Registry</tspan></text>
  <text x="1086" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1086" dy="0">owner · expiry</tspan><tspan x="1086" dy="26">approved capability</tspan></text><path d="M1282 420 L1306 420" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1310" y="270" width="220" height="300" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1332" y="290" width="130" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1397" y="315" class="label" text-anchor="middle" style="fill:#57575B">06 RESOLVE</text>
  <text x="1334" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1334" dy="0">Runtime use</tspan></text>
  <text x="1334" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1334" dy="0">ID + version</tspan><tspan x="1334" dy="26">policy-bound</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">A privileged persistent agent must never search, install, and execute an unreviewed skill in one step.</text></svg>