<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Capabilities change by trusted phase</title><desc id="desc">Four-phase capability staircase for research, proposal, approved mutation, and verification, with tools, credentials, writes, and network constraints at each phase.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Capabilities change by trusted phase</text><text x="80" y="122" class="subtitle">Retrieved content cannot promote itself into a more powerful execution profile.</text><rect x="80" y="540" width="330" height="180" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="102" y="560" width="140" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="172" y="585" class="label" text-anchor="middle" style="fill:#57575B">01 RESEARCH</text>
  <text x="104" y="632" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="104" dy="0">Read evidence</tspan></text>
  <text x="104" y="668" class="small" style="fill:#57575B" text-anchor="start"><tspan x="104" dy="0">tools: repo read + web GET</tspan><tspan x="104" dy="26">credentials: none</tspan><tspan x="104" dy="26">writes: none</tspan><tspan x="104" dy="26">network: allowlisted docs</tspan></text><rect x="430" y="430" width="330" height="290" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="452" y="450" width="140" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="522" y="475" class="label" text-anchor="middle" style="fill:#57575B">02 PROPOSAL</text>
  <text x="454" y="522" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="454" dy="0">Build intent</tspan></text>
  <text x="454" y="558" class="small" style="fill:#57575B" text-anchor="start"><tspan x="454" dy="0">tools: semantic diff</tspan><tspan x="454" dy="26">credentials: none</tspan><tspan x="454" dy="26">writes: task state only</tspan><tspan x="454" dy="26">network: none</tspan></text><rect x="780" y="300" width="350" height="420" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="802" y="320" width="230" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="917" y="345" class="label" text-anchor="middle" style="fill:#57575B">03 APPROVED MUTATION</text>
  <text x="804" y="392" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="804" dy="0">Change candidate</tspan></text>
  <text x="804" y="428" class="small" style="fill:#57575B" text-anchor="start"><tspan x="804" dy="0">tools: install + patch broker</tspan><tspan x="804" dy="26">credential: one-use lease</tspan><tspan x="804" dy="26">writes: scoped worktree</tspan><tspan x="804" dy="26">network: pinned registry</tspan></text><rect x="1150" y="190" width="370" height="530" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1172" y="210" width="180" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1262" y="235" class="label" text-anchor="middle" style="fill:#57575B">04 VERIFICATION</text>
  <text x="1174" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1174" dy="0">Prove outcome</tspan></text>
  <text x="1174" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1174" dy="0">tools: fixed check pipeline</tspan><tspan x="1174" dy="26">credentials: none</tspan><tspan x="1174" dy="26">writes: verifier artifacts</tspan><tspan x="1174" dy="26">network: off by default</tspan></text><path d="M240 250 L850 250" fill="none" stroke="#FA5F67" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-FA5F67)"/><text x="545" y="240" class="small" text-anchor="middle">injected document cannot skip phases</text><path d="M850 250L825 235L825 265Z" fill="#FA5F67"/><text x="545" y="215" class="small" text-anchor="middle">Trusted runtime state and policy move the run forward.</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">The model can request a phase change. It cannot grant the capability set to itself.</text></svg>