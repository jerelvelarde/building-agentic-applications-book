<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Filesystem scope must survive path tricks</title><desc id="desc">Three filesystem panels show an in-root read allowed, an outward symlink denied, and a symlinked write parent denied, plus a check-then-open race warning.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Filesystem scope must survive path tricks</text><text x="78" y="126" class="subtitle" text-anchor="start">Resolve the real object, constrain the parent, and rely on an OS boundary for stronger assurance.</text><rect x="70" y="220" width="420" height="390" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="92" y="240" width="162" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="173" y="271" class="label" text-anchor="middle" style="fill:#57575B">SAFE READ</text><text x="96" y="324" class="heading" text-anchor="start" style="fill:#11143D">realpath stays in root</text><text x="96" y="374" class="small" text-anchor="start" style="fill:#57575B"><tspan x="96" dy="0">/work/report.csv</tspan><tspan x="96" dy="38">open by broker</tspan><tspan x="96" dy="38">receipt: allowed</tspan></text><rect x="555" y="220" width="420" height="390" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="577" y="240" width="190" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="672" y="271" class="label" text-anchor="middle" style="fill:#57575B">DENIED READ</text><text x="581" y="324" class="heading" text-anchor="start" style="fill:#11143D">symlink leaves root</text><text x="581" y="374" class="small" text-anchor="start" style="fill:#57575B"><tspan x="581" dy="0">/work/vendor → /etc</tspan><tspan x="581" dy="38">resolved target outside</tspan><tspan x="581" dy="38">receipt: denied</tspan></text><rect x="1040" y="220" width="420" height="390" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="1062" y="240" width="204" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="1164" y="271" class="label" text-anchor="middle" style="fill:#57575B">DENIED WRITE</text><text x="1066" y="324" class="heading" text-anchor="start" style="fill:#11143D">parent leaves root</text><text x="1066" y="374" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1066" dy="0">/work/out → /tmp</tspan><tspan x="1066" dy="38">resolve existing parent</tspan><tspan x="1066" dy="38">receipt: denied</tspan></text><rect x="260" y="660" width="1080" height="92" rx="24" fill="#FFF5E8" stroke="#FFAC4D" stroke-width="2"/><text x="800" y="700" class="heading" text-anchor="middle">Check → attacker swaps path → open</text><text x="800" y="735" class="small" text-anchor="middle">Use brokered file descriptors, mount boundaries, and no ambient terminal escape.</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">A lexical prefix check is input validation—not filesystem containment.</text></svg>