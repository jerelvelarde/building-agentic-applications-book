<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">One enforced action chain</title><desc id="desc">Eight numbered steps move a model proposal through canonicalization, trusted context, risk classification, policy, persisted approval, reauthorization, narrow execution, and a verified receipt.</desc><defs><style>.h{font:700 48px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 22px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 15px 'Spline Sans Mono',monospace;fill:#6857D9}.n{font:700 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff}.l{font:700 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="70" y="62">CONSEQUENTIAL ACTION</text><text class="h" x="70" y="120">The proposal crosses eight enforced gates</text><text class="s" x="70" y="160">Approval is persisted evidence; current policy is checked again before execution.</text>
  <path d="M165 315 H1435 M1435 315 V625 H165" fill="none" stroke="#DBDBE5" stroke-width="8"/>
  <g transform="translate(70 225)">
    <g transform="translate(0)"><circle cx="95" cy="90" r="34" fill="#6857D9"/><text class="n" x="95" y="99" text-anchor="middle">1</text><text class="l" x="95" y="150" text-anchor="middle">Normalize</text><text class="t" x="95" y="178" text-anchor="middle">canonical action</text></g>
    <g transform="translate(190)"><circle cx="95" cy="90" r="34" fill="#6857D9"/><text class="n" x="95" y="99" text-anchor="middle">2</text><text class="l" x="95" y="150" text-anchor="middle">Resolve</text><text class="t" x="95" y="178" text-anchor="middle">trusted context</text></g>
    <g transform="translate(380)"><circle cx="95" cy="90" r="34" fill="#6857D9"/><text class="n" x="95" y="99" text-anchor="middle">3</text><text class="l" x="95" y="150" text-anchor="middle">Classify</text><text class="t" x="95" y="178" text-anchor="middle">risk + target</text></g>
    <g transform="translate(570)"><circle cx="95" cy="90" r="34" fill="#6857D9"/><text class="n" x="95" y="99" text-anchor="middle">4</text><text class="l" x="95" y="150" text-anchor="middle">Decide</text><text class="t" x="95" y="178" text-anchor="middle">deny / allow / pause</text></g>
    <g transform="translate(760)"><circle cx="95" cy="90" r="34" fill="#189370"/><text class="n" x="95" y="99" text-anchor="middle">5</text><text class="l" x="95" y="150" text-anchor="middle">Persist</text><text class="t" x="95" y="178" text-anchor="middle">proposal + digest</text></g>
    <g transform="translate(950)"><circle cx="95" cy="90" r="34" fill="#189370"/><text class="n" x="95" y="99" text-anchor="middle">6</text><text class="l" x="95" y="150" text-anchor="middle">Reauthorize</text><text class="t" x="95" y="178" text-anchor="middle">identity + policy now</text></g>
    <g transform="translate(1140)"><circle cx="95" cy="90" r="34" fill="#11143D"/><text class="n" x="95" y="99" text-anchor="middle">7</text><text class="l" x="95" y="150" text-anchor="middle">Execute</text><text class="t" x="95" y="178" text-anchor="middle">narrow credential</text></g>
    <g transform="translate(1330)"><circle cx="95" cy="90" r="34" fill="#11143D"/><text class="n" x="95" y="99" text-anchor="middle">8</text><text class="l" x="95" y="150" text-anchor="middle">Verify</text><text class="t" x="95" y="178" text-anchor="middle">receipt + effect</text></g>
  </g>
  <g transform="translate(120 560)"><rect width="1360" height="210" rx="28" fill="#fff" stroke="#DBDBE5"/><text class="k" x="35" y="45">RECORDS THAT SURVIVE THE MODEL TURN</text><text class="l" x="35" y="95">Canonical action</text><text class="t" x="35" y="128">schema · target · revision</text><text class="l" x="350" y="95">Policy decision</text><text class="t" x="350" y="128">reason · version · expiry</text><text class="l" x="665" y="95">Approval evidence</text><text class="t" x="665" y="128">principal · digest · nonce</text><text class="l" x="980" y="95">Action ledger</text><text class="t" x="980" y="128">operation ID · result · compensation</text><text class="t" x="35" y="175">A denial cannot be reframed through an equivalent tool. An ambiguous target outcome is reconciled before retry.</text></g>
</svg>
