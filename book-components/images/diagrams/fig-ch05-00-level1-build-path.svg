<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">The Level 1 build path</text><text x="78" y="126" class="subtitle" text-anchor="start">Six chapters turn a chat surface into a production application control plane.</text><rect x="70" y="190" width="430" height="240" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="92" y="210" width="162" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="173" y="241" class="label" text-anchor="middle" style="fill:#57575B">CHAPTER 5</text><text x="96" y="294" class="heading" text-anchor="start" style="fill:#11143D">Trace the run</text><text x="96" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="96" dy="0">identity + events</tspan><tspan x="96" dy="38">terminal evidence</tspan></text><rect x="585" y="190" width="430" height="240" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="607" y="210" width="162" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="688" y="241" class="label" text-anchor="middle" style="fill:#57575B">CHAPTER 6</text><text x="611" y="294" class="heading" text-anchor="start" style="fill:#11143D">Place tools</text><text x="611" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="611" dy="0">client vs server</tspan><tspan x="611" dy="38">effects + receipts</tspan></text><rect x="1100" y="190" width="430" height="240" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="1122" y="210" width="162" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="1203" y="241" class="label" text-anchor="middle" style="fill:#57575B">CHAPTER 7</text><text x="1126" y="294" class="heading" text-anchor="start" style="fill:#11143D">Render artifacts</text><text x="1126" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1126" dy="0">semantic object</tspan><tspan x="1126" dy="38">platform-native UI</tspan></text><rect x="1100" y="500" width="430" height="240" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1122" y="520" width="162" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1203" y="551" class="label" text-anchor="middle" style="fill:#57575B">CHAPTER 8</text><text x="1126" y="604" class="heading" text-anchor="start" style="fill:#11143D">Share state</text><text x="1126" y="654" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1126" dy="0">ownership + revision</tspan><tspan x="1126" dy="38">durable stores</tspan></text><rect x="585" y="500" width="430" height="240" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="607" y="520" width="162" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="688" y="551" class="label" text-anchor="middle" style="fill:#57575B">CHAPTER 9</text><text x="611" y="604" class="heading" text-anchor="start" style="fill:#11143D">Pause safely</text><text x="611" y="654" class="small" text-anchor="start" style="fill:#57575B"><tspan x="611" dy="0">bound approval</tspan><tspan x="611" dy="38">resume + reconcile</tspan></text><rect x="70" y="500" width="430" height="240" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="92" y="520" width="176" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="180" y="551" class="label" text-anchor="middle" style="fill:#57575B">CHAPTER 10</text><text x="96" y="604" class="heading" text-anchor="start" style="fill:#11143D">Ship the system</text><text x="96" y="654" class="small" text-anchor="start" style="fill:#57575B"><tspan x="96" dy="0">compatibility + evals</tspan><tspan x="96" dy="38">operations + rollout</tspan></text><path d="M500 310 L580 310" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M1015 310 L1095 310" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M1315 430 L1315 495" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M1100 620 L1020 620" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M585 620 L505 620" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Every chapter adds an enforcement point, evidence, and failure behavior—not another chat feature.</text></svg>