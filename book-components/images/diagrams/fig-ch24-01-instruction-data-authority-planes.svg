<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Instructions, data, and authority are separate planes</title><desc id="desc">Instructions and untrusted data can influence a proposal, but only a trusted authority plane can resolve identity, policy, scope, and credentials before an isolated executor reaches a target.</desc>
  <defs><style>.h{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 16px 'Spline Sans Mono',monospace;fill:#6857D9;letter-spacing:1px}.l{font:700 26px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 19px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.x{font:700 18px 'Spline Sans Mono',monospace;fill:#11143D}</style></defs>
  <rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="70" y="65">SECURITY MODEL</text><text class="h" x="70" y="125">Prompt control is not authority control</text><text class="s" x="70" y="165">The model may propose. A trusted boundary decides whether anything may act.</text>
  <g transform="translate(80 205)"><rect width="420" height="190" rx="28" fill="#EDEDF5" stroke="#BEC2FF"/><text class="l" x="28" y="48">Instruction plane</text><text class="t" x="28" y="88">System policy and task guidance</text><text class="t" x="28" y="122">shape model behavior.</text><text class="x" x="28" y="166">MAY INFORM A PROPOSAL</text>
    <rect y="250" width="420" height="190" rx="28" fill="#EEE6FE" stroke="#BEC2FF"/><text class="l" x="28" y="298">Data plane</text><text class="t" x="28" y="338">Receipts, pages, repos, messages</text><text class="t" x="28" y="372">are inspectable but untrusted.</text><text class="x" x="28" y="416">NEVER GRANTS PERMISSION</text>
    <path d="M440 95 H590 M440 345 H590" stroke="#6857D9" stroke-width="4" marker-end="url(#a)"/>
    <rect x="610" y="120" width="330" height="260" rx="32" fill="#fff" stroke="#DBDBE5" stroke-width="2"/><text class="l" x="775" y="175" text-anchor="middle">Model + runtime</text><text class="t" x="775" y="225" text-anchor="middle">Interpret context</text><text class="t" x="775" y="260" text-anchor="middle">Select a proposed action</text><rect x="665" y="305" width="220" height="45" rx="22" fill="#EDEDF5"/><text class="x" x="775" y="334" text-anchor="middle">CAN PROPOSE</text>
    <path d="M960 250 H1075" stroke="#6857D9" stroke-width="4" marker-end="url(#a)"/>
    <rect x="1090" y="40" width="390" height="500" rx="32" fill="#E7FBF5" stroke="#85ECCE" stroke-width="3"/><text class="l" x="1125" y="95">Authority plane</text><text class="t" x="1125" y="142">1. Resolve requester + tenant</text><text class="t" x="1125" y="182">2. Canonicalize target + action</text><text class="t" x="1125" y="222">3. Evaluate current policy</text><text class="t" x="1125" y="262">4. Bind exact approval</text><text class="t" x="1125" y="302">5. Mint narrow credential</text><line x1="1125" y1="340" x2="1445" y2="340" stroke="#85ECCE"/><text class="x" x="1125" y="382">TRUSTED ENFORCEMENT</text><text class="t" x="1125" y="425">Deny by default when identity,</text><text class="t" x="1125" y="458">policy, or evidence is missing.</text>
    <path d="M1285 530 V585 H850" stroke="#189370" stroke-width="5" fill="none" marker-end="url(#g)"/><rect x="500" y="555" width="330" height="100" rx="26" fill="#11143D"/><text x="665" y="597" text-anchor="middle" style="font:700 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">Isolated executor</text><text x="665" y="627" text-anchor="middle" style="font:400 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">smallest credential · one target</text><path d="M480 605 H330" stroke="#189370" stroke-width="5" marker-end="url(#g)"/><rect x="40" y="555" width="270" height="100" rx="26" fill="#fff" stroke="#85ECCE"/><text class="l" x="175" y="615" text-anchor="middle">Target + receipt</text>
  </g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#6857D9"/></marker><marker id="g" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#189370"/></marker></defs>
</svg>
