<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">A machine agent is a ten-part harness</title><desc id="desc">Ten connected harness components from run intake and context assembly through execution, persistence, observability, verification, and recovery.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">A machine agent is a ten-part harness</text><text x="80" y="122" class="subtitle">The model supplies adaptive judgment inside a system that owns authority, evidence, and recovery.</text><rect x="55" y="190" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="77" y="210" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="132" y="235" class="label" text-anchor="middle" style="fill:#57575B">01</text>
  <text x="79" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="79" dy="0">Run intake</tspan></text>
  <text x="79" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="79" dy="0">identity · workspace</tspan><tspan x="79" dy="26">policy · budget</tspan></text><rect x="363" y="190" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="385" y="210" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="440" y="235" class="label" text-anchor="middle" style="fill:#57575B">02</text>
  <text x="387" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="387" dy="0">Context assembly</tspan></text>
  <text x="387" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="387" dy="0">instructions · memory</tspan><tspan x="387" dy="26">retrieved evidence</tspan></text><rect x="671" y="190" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="693" y="210" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="748" y="235" class="label" text-anchor="middle" style="fill:#57575B">03</text>
  <text x="695" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="695" dy="0">Model adapter</tspan></text>
  <text x="695" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="695" dy="0">provider · stream</tspan><tspan x="695" dy="26">structured proposals</tspan></text><rect x="979" y="190" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="1001" y="210" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1056" y="235" class="label" text-anchor="middle" style="fill:#57575B">04</text>
  <text x="1003" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1003" dy="0">Control loop</tspan></text>
  <text x="1003" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1003" dy="0">act · ask · retry</tspan><tspan x="1003" dy="26">delegate · stop</tspan></text><rect x="1287" y="190" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1309" y="210" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1364" y="235" class="label" text-anchor="middle" style="fill:#57575B">05</text>
  <text x="1311" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1311" dy="0">Capability registry</tspan></text>
  <text x="1311" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1311" dy="0">files · shell · browser</tspan><tspan x="1311" dy="26">CLI · MCP · services</tspan></text><rect x="55" y="455" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="77" y="475" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="132" y="500" class="label" text-anchor="middle" style="fill:#57575B">10</text>
  <text x="79" y="547" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="79" dy="0">Verification +</tspan><tspan x="79" dy="28">recovery</tspan></text>
  <text x="79" y="611" class="small" style="fill:#57575B" text-anchor="start"><tspan x="79" dy="0">postconditions · evidence</tspan><tspan x="79" dy="26">discard · revert · compensate</tspan></text><rect x="363" y="455" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="385" y="475" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="440" y="500" class="label" text-anchor="middle" style="fill:#57575B">09</text>
  <text x="387" y="547" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="387" dy="0">Interaction + evidence</tspan></text>
  <text x="387" y="583" class="small" style="fill:#57575B" text-anchor="start"><tspan x="387" dy="0">plan · approval · diff</tspan><tspan x="387" dy="26">denial · cost · result</tspan></text><rect x="671" y="455" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="693" y="475" width="110" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="748" y="500" class="label" text-anchor="middle" style="fill:#57575B">08</text>
  <text x="695" y="547" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="695" dy="0">Persistence</tspan></text>
  <text x="695" y="583" class="small" style="fill:#57575B" text-anchor="start"><tspan x="695" dy="0">checkpoint · worktree</tspan><tspan x="695" dy="26">artifact · operation ID</tspan></text><rect x="979" y="455" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1001" y="475" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1056" y="500" class="label" text-anchor="middle" style="fill:#57575B">07</text>
  <text x="1003" y="547" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1003" dy="0">Execution broker</tspan></text>
  <text x="1003" y="583" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1003" dy="0">identity · sandbox</tspan><tspan x="1003" dy="26">lease · network · budget</tspan></text><rect x="1287" y="455" width="270" height="205" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="1309" y="475" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1364" y="500" class="label" text-anchor="middle" style="fill:#57575B">06</text>
  <text x="1311" y="547" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1311" dy="0">Policy + approval</tspan></text>
  <text x="1311" y="583" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1311" dy="0">allow · deny · narrow</tspan><tspan x="1311" dy="26">pause · bind grant</tspan></text><path d="M325 292 L347 292" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M633 292 L655 292" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M941 292 L963 292" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M1249 292 L1271 292" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M325 557 L347 557" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M633 557 L655 557" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M941 557 L963 557" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M1249 557 L1271 557" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><path d="M1440 395 L1440 455" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1270" y="407" width="145" height="36" rx="18" fill="#EEE6FE" stroke="#EEE6FE" stroke-width="1" /><text x="1342.5" y="432" class="label" text-anchor="middle" style="fill:#57575B">EFFECT BOUNDARY</text><path d="M160 455 L160 395" fill="none" stroke="#85ECCE" stroke-width="4"  marker-end="url(#arrow-85ECCE)"/><rect x="185" y="407" width="140" height="36" rx="18" fill="#E7FBF5" stroke="#E7FBF5" stroke-width="1" /><text x="255" y="432" class="label" text-anchor="middle" style="fill:#57575B">EVIDENCE LOOP</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">The harness—not the model—decides what enters, what can execute, what proves success, and what survives failure.</text></svg>