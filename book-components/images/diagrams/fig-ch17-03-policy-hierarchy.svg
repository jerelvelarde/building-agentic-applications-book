<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Organizational policy can narrow authority, never expand it</title><desc id="desc">Descending policy hierarchy from organization through workspace, agent, channel, task, and requester action, with a denied payroll-access example.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Organizational policy can narrow authority, never expand it</text><text x="78" y="126" class="subtitle" text-anchor="start">Each lower scope inherits the ceiling above it and may only remove capability.</text><rect x="130" y="185" width="1340" height="72" rx="22" fill="#11143D" stroke="#11143D" stroke-width="3"/><text x="154" y="230" class="label" text-anchor="start" style="fill:#FFFFFF">ORGANIZATION</text><text x="1446" y="231" class="small" text-anchor="end" style="fill:#FFFFFF">global prohibited data + actions</text><rect x="210" y="275" width="1180" height="72" rx="22" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><text x="234" y="320" class="label" text-anchor="start" style="fill:#57575B">WORKSPACE</text><text x="1366" y="321" class="small" text-anchor="end" style="fill:#57575B">installed tools + tenant boundaries</text><rect x="290" y="365" width="1020" height="72" rx="22" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><text x="314" y="410" class="label" text-anchor="start" style="fill:#57575B">AGENT PROFILE</text><text x="1286" y="411" class="small" text-anchor="end" style="fill:#57575B">owned capabilities + credential modes</text><rect x="370" y="455" width="860" height="72" rx="22" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><text x="394" y="500" class="label" text-anchor="start" style="fill:#57575B">CHANNEL</text><text x="1206" y="501" class="small" text-anchor="end" style="fill:#57575B">destination disclosure + guest limits</text><rect x="450" y="545" width="700" height="72" rx="22" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><text x="474" y="590" class="label" text-anchor="start" style="fill:#57575B">THREAD / TASK</text><text x="1126" y="591" class="small" text-anchor="end" style="fill:#57575B">purpose + expiry + budget</text><rect x="450" y="635" width="700" height="72" rx="22" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><text x="474" y="680" class="label" text-anchor="start" style="fill:#57575B">REQUESTER ACTION</text><text x="1126" y="681" class="small" text-anchor="end" style="fill:#57575B">principal + exact resource</text><path d="M1510 250 L1510 690" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><text x="1544" y="470" class="label" text-anchor="middle" style="fill:#6857D9" transform="rotate(90 1544 470)">ONLY NARROWS</text><text x="800" y="760" class="small" text-anchor="middle" style="fill:#FA5F67">DENY: public channel cannot add payroll scope</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Context may suggest a request. Only the effective policy intersection grants an action.</text></svg>