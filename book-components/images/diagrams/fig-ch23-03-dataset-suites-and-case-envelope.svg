<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Maintain a portfolio of six evaluation suites</title><desc id="desc">Six evaluation suite cards above a reusable case envelope containing ownership, sensitivity, fixture and component versions, expected and forbidden outcomes, evaluator, repetitions, and retirement.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Maintain a portfolio of six evaluation suites</text><text x="78" y="126" class="subtitle" text-anchor="start">Every capability change adds cases; every case carries a reproducible envelope.</text><rect x="52" y="190" width="225" height="210" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="74" y="210" width="134" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="141" y="241" class="label" text-anchor="middle" style="fill:#57575B">SUITE 1</text><text x="78" y="294" class="heading" text-anchor="start" style="fill:#11143D">GOLDEN</text><text x="78" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="78" dy="0">safe success</tspan></text><rect x="307" y="190" width="225" height="210" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="329" y="210" width="134" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="396" y="241" class="label" text-anchor="middle" style="fill:#57575B">SUITE 2</text><text x="333" y="294" class="heading" text-anchor="start" style="fill:#11143D">BOUNDARY</text><text x="333" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="333" dy="0">edge inputs</tspan></text><rect x="562" y="190" width="225" height="210" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="584" y="210" width="134" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="651" y="241" class="label" text-anchor="middle" style="fill:#57575B">SUITE 3</text><text x="588" y="294" class="heading" text-anchor="start" style="fill:#11143D">POLICY</text><text x="588" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="588" dy="0">allow · deny</tspan></text><rect x="817" y="190" width="225" height="210" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="839" y="210" width="134" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="906" y="241" class="label" text-anchor="middle" style="fill:#57575B">SUITE 4</text><text x="843" y="294" class="heading" text-anchor="start" style="fill:#11143D">ADVERSARIAL</text><text x="843" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="843" dy="0">injection</tspan></text><rect x="1072" y="190" width="225" height="210" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="1094" y="210" width="134" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="1161" y="241" class="label" text-anchor="middle" style="fill:#57575B">SUITE 5</text><text x="1098" y="294" class="heading" text-anchor="start" style="fill:#11143D">RELIABILITY</text><text x="1098" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1098" dy="0">timeout · replay</tspan></text><rect x="1327" y="190" width="225" height="210" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1349" y="210" width="134" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1416" y="241" class="label" text-anchor="middle" style="fill:#57575B">SUITE 6</text><text x="1353" y="294" class="heading" text-anchor="start" style="fill:#11143D">REGRESSION</text><text x="1353" y="344" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1353" dy="0">known failures</tspan></text><rect x="100" y="470" width="1400" height="250" rx="28" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><rect x="130" y="495" width="250" height="46" rx="23" fill="#11143D" stroke="#11143D" stroke-width="1"/><text x="255" y="526" class="label" text-anchor="middle" style="fill:#FFFFFF">CASE ENVELOPE</text><text x="140" y="585" class="small" text-anchor="start">□ owner + sensitivity</text><text x="600" y="585" class="small" text-anchor="start">□ fixture + dataset version</text><text x="1060" y="585" class="small" text-anchor="start">□ model · prompt · tool · policy</text><text x="140" y="655" class="small" text-anchor="start">□ expected + forbidden outcomes</text><text x="600" y="655" class="small" text-anchor="start">□ evaluator + repetitions</text><text x="1060" y="655" class="small" text-anchor="start">□ retirement reason</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">A score without the case envelope cannot explain why it changed.</text></svg>