<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Zero-failure release gates by authority level</title>
  <desc id="desc">A three-column matrix compares the hard release gates for application, machine, and organizational agents. Semantic quality is evaluated only after every authority gate passes.</desc>
  <defs><style>.h{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.c{font:700 28px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.r{font:600 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 16px 'Spline Sans Mono',monospace;fill:#6857D9;letter-spacing:1px}</style></defs>
  <rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="70" y="65">RELEASE GATES</text><text class="h" x="70" y="125">Authority changes the zero-failure suite</text><text class="s" x="70" y="165">Quality can be thresholded. Unauthorized authority cannot be averaged away.</text>
  <g transform="translate(70 215)"><rect width="1460" height="560" rx="28" fill="#fff" stroke="#DBDBE5"/><rect x="230" width="410" height="82" rx="20" fill="#E7FBF5"/><rect x="650" width="390" height="82" rx="20" fill="#EDEDF5"/><rect x="1050" width="390" height="82" rx="20" fill="#EEE6FE"/><text class="c" x="435" y="50" text-anchor="middle">Level 1 · application</text><text class="c" x="845" y="50" text-anchor="middle">Level 2 · machine</text><text class="c" x="1245" y="50" text-anchor="middle">Level 3 · organization</text>
    <g transform="translate(0 110)"><text class="r" x="28" y="34">Identity + scope</text><text class="t" x="250" y="34">No cross-user / tenant access</text><text class="t" x="670" y="34">Only canonical workspace + grant</text><text class="t" x="1070" y="34">Requester and tenant preserved</text><line x1="25" y1="56" x2="1435" y2="56" stroke="#DBDBE5"/>
    <text class="r" x="28" y="104">Effect</text><text class="t" x="250" y="104">One authorized domain mutation</text><text class="t" x="670" y="104">No escaped process or denied egress</text><text class="t" x="1070" y="104">No replayed organizational write</text><line x1="25" y1="126" x2="1435" y2="126" stroke="#DBDBE5"/>
    <text class="r" x="28" y="174">Human gate</text><text class="t" x="250" y="174">Exact proposal before write</text><text class="t" x="670" y="174">Scope, diff, publish, deploy</text><text class="t" x="1070" y="174">Eligible principal or quorum</text><line x1="25" y1="196" x2="1435" y2="196" stroke="#DBDBE5"/>
    <text class="r" x="28" y="244">Recovery</text><text class="t" x="250" y="244">No stale overwrite / duplicate</text><text class="t" x="670" y="244">Lease loss stops later writes</text><text class="t" x="1070" y="244">Delegation cannot amplify scope</text><line x1="25" y1="266" x2="1435" y2="266" stroke="#DBDBE5"/>
    <text class="r" x="28" y="314">Proof</text><text class="t" x="250" y="314">Server effect + receipt</text><text class="t" x="670" y="314">FS, process, network, verifier</text><text class="t" x="1070" y="314">Actor chain + target receipt</text></g>
  </g>
  <rect x="270" y="800" width="1060" height="58" rx="29" fill="#11143D"/><text x="800" y="837" text-anchor="middle" style="font:700 22px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">Only after every hard gate passes → evaluate usefulness, tone, and completeness</text>
</svg>
