<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Preserve the organizational actor chain</title><desc id="desc">Flow from authenticated channel event through stable application principal, agent proposal, policy and credential mode, target operation, and authoritative receipt, with a blocked confused-deputy route.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Preserve the organizational actor chain</text><text x="80" y="122" class="subtitle">Every consequential operation must retain who asked, who acted, what policy applied, and what the target accepted.</text><rect x="70" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="92" y="290" width="170" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="177" y="315" class="label" text-anchor="middle" style="fill:#57575B">PLATFORM EVENT</text>
  <text x="94" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Who asked?</tspan></text>
  <text x="94" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">tenant · user ID</tspan><tspan x="94" dy="26">channel · thread</tspan></text><path d="M339.6 425 L363.6 425" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="367.6" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="389.6" y="290" width="150" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="464.6" y="315" class="label" text-anchor="middle" style="fill:#57575B">IDENTITY MAP</text>
  <text x="391.6" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="391.6" dy="0">Stable principal</tspan></text>
  <text x="391.6" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="391.6" dy="0">current roles</tspan><tspan x="391.6" dy="26">tenant attributes</tspan></text><path d="M637.2 425 L661.2 425" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="665.2" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="687.2" y="290" width="160" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="767.2" y="315" class="label" text-anchor="middle" style="fill:#57575B">AGENT PROFILE</text>
  <text x="689.2" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="689.2" dy="0">Who proposes?</tspan></text>
  <text x="689.2" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="689.2" dy="0">owner · tools</tspan><tspan x="689.2" dy="26">policy version</tspan></text><path d="M934.8000000000001 425 L958.8000000000001 425" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="962.8000000000001" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="984.8000000000001" y="290" width="160" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1064.8000000000002" y="315" class="label" text-anchor="middle" style="fill:#57575B">POLICY + MODE</text>
  <text x="986.8000000000001" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="986.8000000000001" dy="0">Who may act?</tspan></text>
  <text x="986.8000000000001" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="986.8000000000001" dy="0">agent-owned · OBO</tspan><tspan x="986.8000000000001" dy="26">approval-minted</tspan></text><path d="M1232.4 425 L1256.4 425" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1260.4" y="270" width="269.6" height="310" rx="28" fill="#11143D" stroke="#11143D" stroke-width="0" /><rect x="1282.4" y="290" width="110" height="36" rx="18" fill="#11143D" stroke="#11143D" stroke-width="1" /><text x="1337.4" y="315" class="label" text-anchor="middle" style="fill:#11143D">TARGET</text>
  <text x="1284.4" y="362" class="heading" style="fill:#FFFFFF" text-anchor="start"><tspan x="1284.4" dy="0">What accepted?</tspan></text>
  <text x="1284.4" y="398" class="small" style="fill:#FFFFFF" text-anchor="start"><tspan x="1284.4" dy="0">resource · operation ID</tspan><tspan x="1284.4" dy="26">result receipt</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">A cheerful channel response is not proof that the target accepted the operation.</text></svg>