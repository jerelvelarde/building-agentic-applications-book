<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Architecture decision matrix</title><desc id="desc">A matrix compares deterministic workflow, application agent, bounded machine worker, and organizational agent by environment need, identity, tools, isolation, human gates, evidence, operator duty, and selection rule.</desc><defs><style>.h{font:700 46px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 15px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 14px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="55" y="55">ARCHITECTURE DECISION</text><text class="h" x="55" y="108">Choose by operating obligation, not feature count</text><text class="s" x="55" y="145">Start left. Move right only when the outcome inherently requires the additional authority.</text>
  <g transform="translate(50 190)"><rect width="1500" height="610" rx="24" fill="#fff" stroke="#DBDBE5"/><g><rect x="225" width="300" height="76" fill="#F0F0F4"/><rect x="525" width="300" height="76" fill="#E7FBF5"/><rect x="825" width="330" height="76" fill="#EDEDF5"/><rect x="1155" width="345" height="76" fill="#EEE6FE"/></g><g class="l" text-anchor="middle"><text x="375" y="46">Deterministic workflow</text><text x="675" y="46">Level 1 · application</text><text x="990" y="46">Bounded Level 2 worker</text><text x="1327" y="46">Level 3 · organization</text></g>
    <g class="l"><text x="20" y="120">Environment need</text><text x="20" y="185">Identity</text><text x="20" y="250">Tools</text><text x="20" y="315">Isolation</text><text x="20" y="380">Human gate</text><text x="20" y="445">Evidence</text><text x="20" y="510">Operator duty</text><text x="20" y="575">Choose when</text></g>
    <g class="t" text-anchor="middle"><text x="375" y="120">Known path and rules</text><text x="675" y="120">Typed product objects</text><text x="990" y="120">Files, commands, tests</text><text x="1327" y="120">Shared invocation + policy</text>
    <text x="375" y="185">Authenticated user</text><text x="675" y="185">User + app agent</text><text x="990" y="185">Operator + worker grant</text><text x="1327" y="185">Requester + agent + approver</text>
    <text x="375" y="250">Fixed functions</text><text x="675" y="250">Domain APIs</text><text x="990" y="250">FS / process / network / CLI</text><text x="1327" y="250">Org systems + delegation</text>
    <text x="375" y="315">Service boundary</text><text x="675" y="315">Tenant / thread / resource</text><text x="990" y="315">Workspace / sandbox / secrets</text><text x="1327" y="315">Tenant / channel / stores</text>
    <text x="375" y="380">Exceptional only</text><text x="675" y="380">Exact consequential write</text><text x="990" y="380">Scope / diff / publish</text><text x="1327" y="380">Policy-bound principal / quorum</text>
    <text x="375" y="445">State transition</text><text x="675" y="445">Server effect + receipt</text><text x="990" y="445">Diff + verifier + denied egress</text><text x="1327" y="445">Actor chain + target receipt</text>
    <text x="375" y="510">App/service owner</text><text x="675" y="510">Product + runtime</text><text x="990" y="510">Worker, sandbox, recovery</text><text x="1327" y="510">Identity, policy, memory, audit</text>
    <text x="375" y="575">Variation is bounded</text><text x="675" y="575">APIs can create outcome</text><text x="990" y="575">Environment discovery is essential</text><text x="1327" y="575">Shared accountability creates value</text></g>
    <g stroke="#DBDBE5"><line x1="15" y1="140" x2="1485" y2="140"/><line x1="15" y1="205" x2="1485" y2="205"/><line x1="15" y1="270" x2="1485" y2="270"/><line x1="15" y1="335" x2="1485" y2="335"/><line x1="15" y1="400" x2="1485" y2="400"/><line x1="15" y1="465" x2="1485" y2="465"/><line x1="15" y1="530" x2="1485" y2="530"/></g></g><rect x="250" y="825" width="1100" height="48" rx="24" fill="#11143D"/><text x="800" y="856" text-anchor="middle" style="font:700 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">If the team cannot own the operating duty, reduce the authority until ownership is real.</text>
</svg>
