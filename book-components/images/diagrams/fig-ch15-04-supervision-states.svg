<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Design the supervision surface by durable state</title><desc id="desc">Six schematic CopilotKit panels for planning, intent proposed, waiting for approval, executing, verifying, and review or terminal states.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Design the supervision surface by durable state</text><text x="80" y="122" class="subtitle">One task changes what the user must know and what controls are safe to offer.</text><rect x="55" y="175" width="480" height="245" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="77" y="195" width="140" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="147" y="220" class="label" text-anchor="middle" style="fill:#57575B">01 PLANNING</text>
  <text x="79" y="267" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="79" dy="0">Scope before authority</tspan></text>
  <text x="79" y="303" class="small" style="fill:#57575B" text-anchor="start"><tspan x="79" dy="0">repo: ledger · base abc123</tspan><tspan x="79" dy="26">budget: 12 min · read-only</tspan><tspan x="79" dy="26">[ Narrow scope ]</tspan></text><rect x="570" y="175" width="480" height="245" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="592" y="195" width="210" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="697" y="220" class="label" text-anchor="middle" style="fill:#57575B">02 INTENT PROPOSED</text>
  <text x="594" y="267" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="594" dy="0">Canonical action</tspan></text>
  <text x="594" y="303" class="small" style="fill:#57575B" text-anchor="start"><tspan x="594" dy="0">npm install chart-helper@2.1</tspan><tspan x="594" dy="26">network: pinned registry</tspan><tspan x="594" dy="26">policy: review required</tspan></text><rect x="1085" y="175" width="480" height="245" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="1107" y="195" width="130" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1172" y="220" class="label" text-anchor="middle" style="fill:#57575B">03 WAITING</text>
  <text x="1109" y="267" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1109" dy="0">Bound approval</tspan></text>
  <text x="1109" y="303" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1109" dy="0">digest: 91b… · expires 14:32</tspan><tspan x="1109" dy="26">eligible: repository maintainer</tspan><tspan x="1109" dy="26">[ Approve ]  [ Reject ]</tspan></text><rect x="55" y="460" width="480" height="245" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="77" y="480" width="150" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="152" y="505" class="label" text-anchor="middle" style="fill:#57575B">04 EXECUTING</text>
  <text x="79" y="552" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="79" dy="0">Broker evidence</tspan></text>
  <text x="79" y="588" class="small" style="fill:#57575B" text-anchor="start"><tspan x="79" dy="0">attempt 02 · heartbeat 8s</tspan><tspan x="79" dy="26">tool: package broker</tspan><tspan x="79" dy="26">cancel scope: current tool</tspan></text><rect x="570" y="460" width="480" height="245" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="592" y="480" width="150" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="667" y="505" class="label" text-anchor="middle" style="fill:#57575B">05 VERIFYING</text>
  <text x="594" y="552" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="594" dy="0">Independent checks</tspan></text>
  <text x="594" y="588" class="small" style="fill:#57575B" text-anchor="start"><tspan x="594" dy="0">lint ✓ · tests running</tspan><tspan x="594" dy="26">network assertion ✓</tspan><tspan x="594" dy="26">artifact digest pending</tspan></text><rect x="1085" y="460" width="480" height="245" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1107" y="480" width="120" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1167" y="505" class="label" text-anchor="middle" style="fill:#57575B">06 REVIEW</text>
  <text x="1109" y="552" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1109" dy="0">Effect + recovery</tspan></text>
  <text x="1109" y="588" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1109" dy="0">content-addressed diff</tspan><tspan x="1109" dy="26">target receipts + known effects</tspan><tspan x="1109" dy="26">[ Discard ]  [ Merge ]</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Historical controls are read-only unless the server confirms a current pending decision.</text></svg>