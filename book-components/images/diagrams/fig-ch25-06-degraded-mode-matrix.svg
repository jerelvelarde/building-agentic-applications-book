<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Design the lower-authority product before the outage</title><desc id="desc">Four dependency cards map provider, fresh data, write service, and enforcement failure to safe reduced-authority behavior.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Design the lower-authority product before the outage</text><text x="78" y="126" class="subtitle" text-anchor="start">A degraded mode states what remains, what is stale, which effects did not run, and how work resumes.</text><rect x="70" y="225" width="320" height="410" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="92" y="245" width="260" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="222" y="276" class="label" text-anchor="middle" style="fill:#57575B">MODEL / PROVIDER</text><text x="96" y="329" class="heading" text-anchor="start" style="fill:#11143D">Use cached artifact</text><text x="96" y="379" class="small" text-anchor="start" style="fill:#57575B"><tspan x="96" dy="0">label age + source</tspan><tspan x="96" dy="38">disable fresh claims</tspan></text><rect x="455" y="225" width="320" height="410" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="477" y="245" width="176" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="565" y="276" class="label" text-anchor="middle" style="fill:#57575B">FRESH DATA</text><text x="481" y="329" class="heading" text-anchor="start" style="fill:#11143D">Read cached snapshot</text><text x="481" y="379" class="small" text-anchor="start" style="fill:#57575B"><tspan x="481" dy="0">mark stale / unverified</tspan><tspan x="481" dy="38">no automatic publish</tspan></text><rect x="840" y="225" width="320" height="410" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="862" y="245" width="218" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="971" y="276" class="label" text-anchor="middle" style="fill:#57575B">WRITE SERVICE</text><text x="866" y="329" class="heading" text-anchor="start" style="fill:#11143D">Draft only</text><text x="866" y="379" class="small" text-anchor="start" style="fill:#57575B"><tspan x="866" dy="0">queue or stop effects</tspan><tspan x="866" dy="38">show no receipt</tspan></text><rect x="1225" y="225" width="320" height="410" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="1247" y="245" width="190" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="1342" y="276" class="label" text-anchor="middle" style="fill:#57575B">ENFORCEMENT</text><text x="1251" y="329" class="heading" text-anchor="start" style="fill:#11143D">Stop authority</text><text x="1251" y="379" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1251" dy="0">inspect-only if safe</tspan><tspan x="1251" dy="38">never bypass control</tspan></text><text x="800" y="730" class="body" text-anchor="middle">Resume automatically only when the control contract explicitly permits it.</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">The correct response to lost authorization, audit, sandbox, or credentials is less authority.</text></svg>