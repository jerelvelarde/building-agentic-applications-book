<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">State by authority and lifespan</title><desc id="desc">Do not draw view state, product truth, run state, memory, and telemetry as one generic database.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker>
  <linearGradient id="wash" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#BEC2FF" stop-opacity=".22"/><stop offset=".48" stop-color="#85ECCE" stop-opacity=".18"/><stop offset="1" stop-color="#FFAC4D" stop-opacity=".10"/></linearGradient></defs>
  <style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 19px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}.mono{font:500 16px 'Spline Sans Mono',monospace;fill:#57575B}</style>
  <rect width="1600" height="900" fill="#FAFAFC"/><ellipse cx="1260" cy="100" rx="430" ry="230" fill="url(#wash)"/>
  <text x="80" y="86" class="title">State by authority and lifespan</text><text x="80" y="124" class="subtitle">Do not draw view state, product truth, run state, memory, and telemetry as one generic database.</text>
  <g transform="translate(95 185)"><rect width="1410" height="560" rx="30" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
  <text x="35" y="52" class="label">STATE CLASS</text><text x="365" y="52" class="label">SOURCE OF TRUTH</text><text x="755" y="52" class="label">TYPICAL LIFESPAN</text><text x="1065" y="52" class="label">AUTHORITY / CAUTION</text>
  <g transform="translate(0 78)"><rect width="1410" height="64" fill="#F2F2FF"/><text x="35" y="40" class="body">View state</text><text x="365" y="40" class="small">Current client</text><text x="755" y="40" class="small">Session / device</text><text x="1065" y="40" class="small">UI-owned; often local</text></g>
<g transform="translate(0 154)"><rect width="1410" height="64" fill="#FAFAFC"/><text x="35" y="40" class="body">Product data</text><text x="365" y="40" class="small">Product service</text><text x="755" y="40" class="small">Business retention</text><text x="1065" y="40" class="small">Authoritative records</text></g>
<g transform="translate(0 230)"><rect width="1410" height="64" fill="#F2F2FF"/><text x="35" y="40" class="body">Run state</text><text x="365" y="40" class="small">Runtime/checkpoint</text><text x="755" y="40" class="small">One run</text><text x="1065" y="40" class="small">Agent + policy transitions</text></g>
<g transform="translate(0 306)"><rect width="1410" height="64" fill="#FAFAFC"/><text x="35" y="40" class="body">Thread state</text><text x="365" y="40" class="small">Thread store</text><text x="755" y="40" class="small">Related runs</text><text x="1065" y="40" class="small">Authorize every join</text></g>
<g transform="translate(0 382)"><rect width="1410" height="64" fill="#F2F2FF"/><text x="35" y="40" class="body">User / org memory</text><text x="365" y="40" class="small">Governed store</text><text x="755" y="40" class="small">Cross-thread / policy</text><text x="1065" y="40" class="small">Provenance + expiry + delete</text></g>
<g transform="translate(0 458)"><rect width="1410" height="64" fill="#FAFAFC"/><text x="35" y="40" class="body">Trace</text><text x="365" y="40" class="small">Observability</text><text x="755" y="40" class="small">Short operational</text><text x="1065" y="40" class="small">Redact; never product truth</text></g></g>
  <text x="800" y="858" class="body" text-anchor="middle">A snapshot is not a ledger database. A trace is not memory. A transcript is not durable task state.</text>
</svg>