<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Operation outcome state machine</title><desc id="desc">An operation moves from not started to dispatched, then committed, known failure, or outcome unknown. Unknown outcomes must be reconciled as committed, not committed, or manual review before retry.</desc><defs><style>.h{font:700 48px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 22px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 16px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#6857D9"/></marker></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="70" y="62">EXTERNAL EFFECT STATE</text><text class="h" x="70" y="120">Unknown is a state, not a retry instruction</text><text class="s" x="70" y="160">Only target reconciliation can settle whether the operation committed.</text>
  <g transform="translate(90 250)"><g fill="#fff" stroke="#DBDBE5" stroke-width="3"><rect x="0" y="130" width="240" height="100" rx="28"/><rect x="350" y="130" width="240" height="100" rx="28"/><rect x="760" y="0" width="270" height="100" rx="28" fill="#E7FBF5" stroke="#85ECCE"/><rect x="760" y="130" width="270" height="100" rx="28" fill="#EEE6FE" stroke="#BEC2FF"/><rect x="760" y="260" width="270" height="100" rx="28"/><rect x="1160" y="80" width="300" height="90" rx="26" fill="#E7FBF5" stroke="#85ECCE"/><rect x="1160" y="215" width="300" height="90" rx="26"/><rect x="1160" y="350" width="300" height="90" rx="26" fill="#EEE6FE" stroke="#BEC2FF"/></g>
    <g class="l" text-anchor="middle"><text x="120" y="190">not_started</text><text x="470" y="190">dispatched</text><text x="895" y="60">committed</text><text x="895" y="190">outcome_unknown</text><text x="895" y="320">failed_known</text><text x="1310" y="135">reconciled_committed</text><text x="1310" y="270">reconciled_not_committed</text><text x="1310" y="405">manual_review</text></g>
    <g stroke="#6857D9" stroke-width="5" fill="none" marker-end="url(#a)"><path d="M240 180H350"/><path d="M590 170C680 150 680 70 760 55"/><path d="M590 180H760"/><path d="M590 195C680 220 680 300 760 310"/><path d="M1030 180C1090 160 1090 130 1160 125"/><path d="M1030 190C1090 210 1090 250 1160 260"/><path d="M1030 205C1080 285 1090 385 1160 395"/></g>
    <text class="t" x="300" y="160" text-anchor="middle">persist before call</text><text class="t" x="630" y="112">receipt</text><text class="t" x="648" y="170">timeout / lost response</text><text class="t" x="640" y="280">known denial or error</text><rect x="340" y="500" width="780" height="94" rx="26" fill="#11143D"/><text x="730" y="540" text-anchor="middle" style="font:700 22px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">Retry eligibility begins only after reconciled_not_committed</text><text x="730" y="570" text-anchor="middle" style="font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">Compensation is a separate post-commit operation—not a rewind arrow.</text>
  </g>
</svg>
