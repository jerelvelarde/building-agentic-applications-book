<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Verification belongs to an independent producer</text><text x="78" y="126" class="subtitle" text-anchor="start">The model may propose success. A fixed verifier emits the terminal evidence.</text><rect x="58" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="80" y="265" width="130" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="145" y="296" class="label" text-anchor="middle" style="fill:#57575B">GATE 1</text><text x="84" y="349" class="heading" text-anchor="start" style="fill:#11143D">Static quality</text><text x="84" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="84" dy="0">format · lint</tspan><tspan x="84" dy="38">typecheck</tspan></text><path d="M335.6 420 L355.6 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="359.6" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="381.6" y="265" width="130" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="446.6" y="296" class="label" text-anchor="middle" style="fill:#57575B">GATE 2</text><text x="385.6" y="349" class="heading" text-anchor="start" style="fill:#11143D">Behavior</text><text x="385.6" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="385.6" dy="0">tests · build</tspan><tspan x="385.6" dy="38">negative assertions</tspan></text><path d="M637.2 420 L657.2 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="661.2" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="683.2" y="265" width="130" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="748.2" y="296" class="label" text-anchor="middle" style="fill:#57575B">GATE 3</text><text x="687.2" y="349" class="heading" text-anchor="start" style="fill:#11143D">Artifact policy</text><text x="687.2" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="687.2" dy="0">diff · secret scan</tspan><tspan x="687.2" dy="38">digest · inventory</tspan></text><path d="M938.8000000000001 420 L958.8000000000001 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="962.8000000000001" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="984.8000000000001" y="265" width="130" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="1049.8000000000002" y="296" class="label" text-anchor="middle" style="fill:#57575B">GATE 4</text><text x="988.8000000000001" y="349" class="heading" text-anchor="start" style="fill:#11143D">Containment</text><text x="988.8000000000001" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="988.8000000000001" dy="0">denied path + egress</tspan><tspan x="988.8000000000001" dy="38">canary + leftovers</tspan></text><path d="M1240.4 420 L1260.4 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="1264.4" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1286.4" y="265" width="148" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1360.4" y="296" class="label" text-anchor="middle" style="fill:#57575B">VERIFIER</text><text x="1290.4" y="349" class="heading" text-anchor="start" style="fill:#11143D">Evidence bundle</text><text x="1290.4" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1290.4" dy="0">argv · env · exit</tspan><tspan x="1290.4" dy="38">digest + terminal state</tspan></text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">A passing assistant message is narration. A verifier result is evidence with a producer and artifact digest.</text></svg>