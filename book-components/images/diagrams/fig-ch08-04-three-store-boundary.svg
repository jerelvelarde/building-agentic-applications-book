<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Checkpoint, memory, and product truth are different stores</title><desc id="desc">Three-store boundary diagram separating thread checkpoint state, cross-thread memory, and the authoritative ledger database.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Checkpoint, memory, and product truth are different stores</text><text x="78" y="126" class="subtitle" text-anchor="start">Duplicate the reference, not the authoritative business record.</text><rect x="55" y="230" width="380" height="430" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="77" y="250" width="274" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="214" y="281" class="label" text-anchor="middle" style="fill:#57575B">THREAD CHECKPOINT</text><text x="81" y="334" class="heading" text-anchor="start" style="fill:#11143D">Resume this run</text><text x="81" y="384" class="small" text-anchor="start" style="fill:#57575B"><tspan x="81" dy="0">messages + graph state</tspan><tspan x="81" dy="38">interrupt + cursor</tspan><tspan x="81" dy="38">retention by thread</tspan></text><rect x="610" y="230" width="380" height="430" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="632" y="250" width="204" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="734" y="281" class="label" text-anchor="middle" style="fill:#57575B">MEMORY STORE</text><text x="636" y="334" class="heading" text-anchor="start" style="fill:#11143D">Reuse scoped context</text><text x="636" y="384" class="small" text-anchor="start" style="fill:#57575B"><tspan x="636" dy="0">preference + provenance</tspan><tspan x="636" dy="38">scope + expiry</tspan><tspan x="636" dy="38">not task truth</tspan></text><rect x="1165" y="230" width="380" height="430" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1187" y="250" width="260" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1317" y="281" class="label" text-anchor="middle" style="fill:#57575B">PRODUCT DATABASE</text><text x="1191" y="334" class="heading" text-anchor="start" style="fill:#11143D">Own the ledger</text><text x="1191" y="384" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1191" dy="0">accounts + transactions</tspan><tspan x="1191" dy="38">versions + receipts</tspan><tspan x="1191" dy="38">authoritative effect</tspan></text><rect x="447" y="374" width="151" height="72" rx="18" fill="#FAFAFC" stroke="#DBDBE5" stroke-width="1"/><text x="522.5" y="401" class="label" text-anchor="middle" style="fill:#57575B"><tspan x="522.5" dy="0">SCOPED</tspan><tspan x="522.5" dy="24">REFERENCE</tspan></text><path d="M447 480 L598 480" fill="none" stroke="#6857D9" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow)"/><rect x="1002" y="374" width="151" height="72" rx="18" fill="#FAFAFC" stroke="#DBDBE5" stroke-width="1"/><text x="1077.5" y="401" class="label" text-anchor="middle" style="fill:#57575B"><tspan x="1077.5" dy="0">STABLE ID</tspan><tspan x="1077.5" dy="24">+ VERSION</tspan></text><path d="M1002 480 L1153 480" fill="none" stroke="#6857D9" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow)"/><text x="800" y="740" class="body" text-anchor="middle">A trace observes all three. It replaces none of them.</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Recover runtime state without silently recreating or overwriting product state.</text></svg>