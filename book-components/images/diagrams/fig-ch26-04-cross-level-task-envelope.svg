<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">A cross-level handoff is a signed task envelope</title><desc id="desc">Annotated task envelope grouping identity, scope and capabilities, artifact integrity, time and budget, policy and evidence, and callback authenticity, contrasted with ambient delegation.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">A cross-level handoff is a signed task envelope</text><text x="78" y="126" class="subtitle" text-anchor="start">Send the minimum contract. Reauthorize at the receiving boundary.</text><rect x="160" y="190" width="1000" height="500" rx="32" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="195" y="220" width="310" height="46" rx="23" fill="#11143D" stroke="#11143D" stroke-width="1"/><text x="350" y="251" class="label" text-anchor="middle" style="fill:#FFFFFF">CANONICAL ENVELOPE</text><text x="215" y="330" class="label" text-anchor="start">IDENTITY</text><text x="215" y="368" class="small" text-anchor="start">task · requester · delegator</text><text x="675" y="330" class="label" text-anchor="start">SCOPE</text><text x="675" y="368" class="small" text-anchor="start">tenant · resource · workspace</text><text x="215" y="430" class="label" text-anchor="start">CAPABILITY</text><text x="215" y="468" class="small" text-anchor="start">allow · deny · output contract</text><text x="675" y="430" class="label" text-anchor="start">INTEGRITY</text><text x="675" y="468" class="small" text-anchor="start">input hashes · schema version</text><text x="215" y="530" class="label" text-anchor="start">TIME + BUDGET</text><text x="215" y="568" class="small" text-anchor="start">deadline · nonce · expiry</text><text x="675" y="530" class="label" text-anchor="start">EVIDENCE</text><text x="675" y="568" class="small" text-anchor="start">terminal states · required proof</text><text x="445" y="630" class="label" text-anchor="start">CALLBACK</text><text x="445" y="668" class="small" text-anchor="start">receiver identity + signature</text><rect x="1220" y="250" width="310" height="360" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="1242" y="270" width="130" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="1307" y="301" class="label" text-anchor="middle" style="fill:#57575B">DENIED</text><text x="1246" y="354" class="heading" text-anchor="start" style="fill:#11143D">Ambient handoff</text><text x="1246" y="404" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1246" dy="0">entire transcript</tspan><tspan x="1246" dy="38">shared credentials</tspan><tspan x="1246" dy="38">“handle it”</tspan><tspan x="1246" dy="38">no expiry or proof</tspan></text><path d="M1160 440 L1215 440" fill="none" stroke="#FA5F67" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow)"/><text x="1187.5" y="426" class="small" text-anchor="middle">reject</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Delegation preserves requester, scope, budget, expiry, evidence, and receiver authentication.</text></svg>