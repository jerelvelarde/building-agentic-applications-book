<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Severity controls release behavior before scoring begins</title><desc id="desc">Four severity tiers with release actions above a safe-task-success formula requiring result, path, policy, verified effect, and budget adherence.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Severity controls release behavior before scoring begins</text><text x="78" y="126" class="subtitle" text-anchor="start">Safe task success is a conjunction; critical failure cannot be averaged away.</text><rect x="55" y="200" width="335" height="260" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="77" y="220" width="150" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="152" y="251" class="label" text-anchor="middle" style="fill:#FFFFFF">CRITICAL</text><text x="81" y="304" class="heading" text-anchor="start"><tspan x="81" dy="0">unauthorized</tspan><tspan x="81" dy="36">effect</tspan></text><text x="81" y="400" class="small" text-anchor="start"><tspan x="81" dy="0">zero tolerance</tspan><tspan x="81" dy="34">stop release</tspan></text><rect x="430" y="200" width="335" height="260" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="452" y="220" width="150" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="527" y="251" class="label" text-anchor="middle" style="fill:#FFFFFF">HIGH</text><text x="456" y="304" class="heading" text-anchor="start"><tspan x="456" dy="0">duplicate effect</tspan></text><text x="456" y="370" class="small" text-anchor="start"><tspan x="456" dy="0">disable capability</tspan><tspan x="456" dy="34">owned exception</tspan></text><rect x="805" y="200" width="335" height="260" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="827" y="220" width="150" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="902" y="251" class="label" text-anchor="middle" style="fill:#57575B">MEDIUM</text><text x="831" y="304" class="heading" text-anchor="start"><tspan x="831" dy="0">contained</tspan><tspan x="831" dy="36">failure</tspan></text><text x="831" y="400" class="small" text-anchor="start"><tspan x="831" dy="0">threshold by</tspan><tspan x="831" dy="34">task slice</tspan></text><rect x="1180" y="200" width="335" height="260" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1202" y="220" width="150" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1277" y="251" class="label" text-anchor="middle" style="fill:#57575B">LOW</text><text x="1206" y="304" class="heading" text-anchor="start"><tspan x="1206" dy="0">presentation</tspan><tspan x="1206" dy="36">defect</tspan></text><text x="1206" y="400" class="small" text-anchor="start"><tspan x="1206" dy="0">product-quality</tspan><tspan x="1206" dy="34">threshold</tspan></text><rect x="120" y="535" width="1360" height="180" rx="30" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="590" class="label" text-anchor="middle" style="fill:#FFFFFF">SAFE TASK SUCCESS</text><text x="800" y="645" class="body" text-anchor="middle" style="fill:#FFFFFF">correct result  AND  acceptable path  AND  policy compliance</text><text x="800" y="690" class="body" text-anchor="middle" style="fill:#FFFFFF">AND  verified effect  AND  budget adherence</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Report rescue, rejection, recovery, duplicates, cost, and time—not completion alone.</text></svg>