<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Context stayed in scope. Process authority did not.</title><desc id="desc">Six-step attack path from an untrusted repository note through an allowed shell and inherited credential to an approved host.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Context stayed in scope. Process authority did not.</text><text x="80" y="122" class="subtitle">A repository instruction becomes an exfiltration route when shell, credentials, and egress share one ambient boundary.</text><rect x="70" y="270" width="220" height="290" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="92" y="290" width="176" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="180" y="315" class="label" text-anchor="middle" style="fill:#57575B">UNTRUSTED INPUT</text>
  <text x="94" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Migration note</tspan></text>
  <text x="94" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">Requests diagnostics</tspan><tspan x="94" dy="26">inside the repository</tspan></text><path d="M290 415 L314 415" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="318" y="270" width="220" height="290" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="340" y="290" width="160" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="420" y="315" class="label" text-anchor="middle" style="fill:#57575B">MODEL CONTEXT</text>
  <text x="342" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="342" dy="0">Instruction selected</tspan></text>
  <text x="342" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="342" dy="0">Looks relevant</tspan><tspan x="342" dy="26">does not grant authority</tspan></text><path d="M538 415 L562 415" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="566" y="270" width="220" height="290" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="588" y="290" width="150" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="663" y="315" class="label" text-anchor="middle" style="fill:#57575B">ALLOWED TOOL</text>
  <text x="590" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="590" dy="0">Shell starts</tspan></text>
  <text x="590" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="590" dy="0">Same OS user</tspan><tspan x="590" dy="26">broad process reach</tspan></text><path d="M786 415 L810 415" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="814" y="270" width="220" height="290" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="836" y="290" width="176" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="924" y="315" class="label" text-anchor="middle" style="fill:#57575B">AMBIENT IDENTITY</text>
  <text x="838" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="838" dy="0">Token inherited</tspan></text>
  <text x="838" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="838" dy="0">No action lease</tspan><tspan x="838" dy="26">secret enters process</tspan></text><path d="M1034 415 L1058 415" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1062" y="270" width="220" height="290" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="1084" y="290" width="140" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="1154" y="315" class="label" text-anchor="middle" style="fill:#57575B">SIDE EFFECT</text>
  <text x="1086" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1086" dy="0">Bundle created</tspan></text>
  <text x="1086" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1086" dy="0">Token appears</tspan><tspan x="1086" dy="26">in diagnostic output</tspan></text><path d="M1282 415 L1306 415" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1310" y="270" width="220" height="290" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="1332" y="290" width="170" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="1417" y="315" class="label" text-anchor="middle" style="fill:#57575B">ALLOWED EGRESS</text>
  <text x="1334" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1334" dy="0">Support host</tspan></text>
  <text x="1334" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1334" dy="0">Host is allowlisted</tspan><tspan x="1334" dy="26">payload is not safe</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">A working directory narrows context. Only enforced process, identity, and egress boundaries narrow authority.</text></svg>