<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Persist the proposal before rendering the button</text><text x="80" y="122" class="subtitle">The approval card is a projection of a trusted record, never the authorization record itself.</text><rect x="80" y="180" width="620" height="540" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="102" y="200" width="210" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="207" y="225" class="label" text-anchor="middle" style="fill:#57575B">CHANNEL PROJECTION</text>
  <text x="104" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="104" dy="0">Post synthetic ledger adjustment</tspan></text>
  <text x="104" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="104" dy="0">Requested by: Maya Chen</tspan><tspan x="104" dy="26">Acting principal: Finance Ledger Agent</tspan><tspan x="104" dy="26">Credential mode: agent service identity</tspan><tspan x="104" dy="26">Target: Ledger / synthetic-1042</tspan><tspan x="104" dy="26">Action: adjustment of $24.00</tspan><tspan x="104" dy="26">Rule: finance manager ≠ requester</tspan><tspan x="104" dy="26">Expires: 14:32 UTC</tspan><tspan x="104" dy="26">opaque action reference only</tspan><tspan x="104" dy="26">[ Approve ]    [ Reject ]</tspan></text><rect x="820" y="180" width="700" height="540" rx="28" fill="#E7FBF5" stroke="#85ECCE" stroke-width="2" /><rect x="842" y="200" width="260" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="972" y="225" class="label" text-anchor="middle" style="fill:#57575B">TRUSTED PROPOSAL RECORD</text>
  <text x="844" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="844" dy="0">proposal_7f2 · revision 3</tspan></text>
  <text x="844" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="844" dy="0">tenant · workspace · channel · thread</tspan><tspan x="844" dy="26">requester principal + agent principal</tspan><tspan x="844" dy="26">tool name/version + canonical arguments</tspan><tspan x="844" dy="26">action digest + target sensitivity</tspan><tspan x="844" dy="26">credential mode + policy version</tspan><tspan x="844" dy="26">eligible approver rule + quorum</tspan><tspan x="844" dy="26">expiry + one-use status</tspan><tspan x="844" dy="26">idempotency key + target operation ID</tspan><tspan x="844" dy="26">authoritative status: proposed</tspan></text><path d="M700 450 L815 450" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><text x="757.5" y="440" class="small" text-anchor="middle">render</text><path d="M815 530 L700 530" fill="none" stroke="#85ECCE" stroke-width="4"  marker-end="url(#arrow-85ECCE)"/><text x="757.5" y="520" class="small" text-anchor="middle">reload + reauthorize</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">A button carries an opaque routing value. A trusted service binds identity, policy, proposal, grant, and effect.</text></svg>