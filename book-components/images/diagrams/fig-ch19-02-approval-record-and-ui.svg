<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Persist the proposal before rendering the button</title><desc id="desc">Side-by-side schematic shows a human-readable approval card and the server-side canonical proposal record containing identity, digest, target sensitivity, policy, eligibility, expiry, idempotency, and authoritative status.</desc><defs>
