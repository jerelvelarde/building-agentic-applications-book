<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Readiness is a chain of different claims</title><desc id="desc">Six-stage staircase from registered through reachable, authenticated, authorized, contained, and verified, with the evidence required at each transition.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Readiness is a chain of different claims</text><text x="80" y="122" class="subtitle">Each stage requires new evidence; no label silently inherits the meaning of the next.</text><rect x="70" y="570" width="220" height="190" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="92" y="590" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="147" y="615" class="label" text-anchor="middle" style="fill:#57575B">01</text>
  <text x="94" y="662" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Registered</tspan></text>
  <text x="94" y="698" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">registry entry</tspan><tspan x="94" dy="26">source/config</tspan><tspan x="94" dy="26">evidence</tspan></text><rect x="318" y="500" width="220" height="260" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="340" y="520" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="395" y="545" class="label" text-anchor="middle" style="fill:#57575B">02</text>
  <text x="342" y="592" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="342" dy="0">Reachable</tspan></text>
  <text x="342" y="628" class="small" style="fill:#57575B" text-anchor="start"><tspan x="342" dy="0">bounded health</tspan><tspan x="342" dy="26">call succeeds</tspan><tspan x="342" dy="26">runtime evidence</tspan></text><rect x="566" y="430" width="220" height="330" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="588" y="450" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="643" y="475" class="label" text-anchor="middle" style="fill:#57575B">03</text>
  <text x="590" y="522" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="590" dy="0">Authenticated</tspan></text>
  <text x="590" y="558" class="small" style="fill:#57575B" text-anchor="start"><tspan x="590" dy="0">caller identity</tspan><tspan x="590" dy="26">verified</tspan><tspan x="590" dy="26">denial evidence</tspan></text><rect x="814" y="360" width="220" height="400" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="836" y="380" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="891" y="405" class="label" text-anchor="middle" style="fill:#57575B">04</text>
  <text x="838" y="452" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="838" dy="0">Authorized</tspan></text>
  <text x="838" y="488" class="small" style="fill:#57575B" text-anchor="start"><tspan x="838" dy="0">canonical action</tspan><tspan x="838" dy="26">allowed</tspan><tspan x="838" dy="26">grant evidence</tspan></text><rect x="1062" y="290" width="220" height="470" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="1084" y="310" width="110" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="1139" y="335" class="label" text-anchor="middle" style="fill:#57575B">05</text>
  <text x="1086" y="382" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1086" dy="0">Contained</tspan></text>
  <text x="1086" y="418" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1086" dy="0">process stays</tspan><tspan x="1086" dy="26">inside scope</tspan><tspan x="1086" dy="26">proxy denial</tspan></text><rect x="1310" y="220" width="220" height="540" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="1332" y="240" width="110" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="1387" y="265" class="label" text-anchor="middle" style="fill:#57575B">06</text>
  <text x="1334" y="312" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1334" dy="0">Verified</tspan></text>
  <text x="1334" y="348" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1334" dy="0">postconditions</tspan><tspan x="1334" dy="26">actually pass</tspan><tspan x="1334" dy="26">verifier artifacts</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Configured-ready and HTTP-reachable are useful facts. Neither means ready to execute safely.</text></svg>