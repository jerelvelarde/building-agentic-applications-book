<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Inventory the whole agentic supply chain</title><desc id="desc">Supply-chain inventory grouping eight asset families and the metadata required before promotion or change.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Inventory the whole agentic supply chain</text><text x="78" y="126" class="subtitle" text-anchor="start">Packages are one row; prompts, models, tools, skills, servers, indexes, policies, and evaluators also execute trust.</text><rect x="70" y="205" width="340" height="240" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="92" y="225" width="204" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="194" y="256" class="label" text-anchor="middle" style="fill:#57575B">MODEL INPUTS</text><text x="96" y="309" class="heading" text-anchor="start" style="fill:#11143D">prompts</text><text x="96" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="96" dy="0">models</tspan><tspan x="96" dy="38">owner + provenance</tspan></text><rect x="450" y="205" width="340" height="240" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="472" y="225" width="176" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="560" y="256" class="label" text-anchor="middle" style="fill:#57575B">CAPABILITY</text><text x="476" y="309" class="heading" text-anchor="start" style="fill:#11143D">tools</text><text x="476" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="476" dy="0">skills</tspan><tspan x="476" dy="38">owner + provenance</tspan></text><rect x="830" y="205" width="340" height="240" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="852" y="225" width="190" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="947" y="256" class="label" text-anchor="middle" style="fill:#57575B">INTEGRATION</text><text x="856" y="309" class="heading" text-anchor="start" style="fill:#11143D">MCP servers</text><text x="856" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="856" dy="0">indexes</tspan><tspan x="856" dy="38">owner + provenance</tspan></text><rect x="1210" y="205" width="340" height="240" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1232" y="225" width="134" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1299" y="256" class="label" text-anchor="middle" style="fill:#57575B">CONTROL</text><text x="1236" y="309" class="heading" text-anchor="start" style="fill:#11143D">policies</text><text x="1236" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1236" dy="0">evaluators</tspan><tspan x="1236" dy="38">owner + provenance</tspan></text><rect x="90" y="485" width="1420" height="285" rx="28" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><rect x="120" y="505" width="300" height="46" rx="23" fill="#11143D" stroke="#11143D" stroke-width="1"/><text x="270" y="536" class="label" text-anchor="middle" style="fill:#FFFFFF">PROMOTION RECORD</text><rect x="120" y="570" width="430" height="76" rx="14" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1"/><text x="138" y="598" class="label" text-anchor="start" style="fill:#57575B">□ SOURCE</text><text x="138" y="628" style="font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:500;fill:#11143D">immutable source + digest</text><rect x="585" y="570" width="430" height="76" rx="14" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1"/><text x="603" y="598" class="label" text-anchor="start" style="fill:#57575B">□ OWNERSHIP</text><text x="603" y="628" style="font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:500;fill:#11143D">publisher + review owner</text><rect x="1050" y="570" width="430" height="76" rx="14" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1"/><text x="1068" y="598" class="label" text-anchor="start" style="fill:#57575B">□ REACH</text><text x="1068" y="628" style="font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:500;fill:#11143D">capability + data classes</text><rect x="120" y="662" width="430" height="76" rx="14" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1"/><text x="138" y="690" class="label" text-anchor="start" style="fill:#57575B">□ PROVENANCE</text><text x="138" y="720" style="font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:500;fill:#11143D">signature + origin</text><rect x="585" y="662" width="430" height="76" rx="14" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1"/><text x="603" y="690" class="label" text-anchor="start" style="fill:#57575B">□ LIFECYCLE</text><text x="603" y="720" style="font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:500;fill:#11143D">install · update · rollback · revoke</text><rect x="1050" y="662" width="430" height="76" rx="14" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1"/><text x="1068" y="690" class="label" text-anchor="start" style="fill:#57575B">□ EVALUATION</text><text x="1068" y="720" style="font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:500;fill:#11143D">post-change regression suite</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Procedural input may request a tool. It cannot grant itself permission to use one.</text></svg>