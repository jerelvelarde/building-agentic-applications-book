<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Conversation is not institutional memory</title><desc id="desc">Seven storage lanes distinguish platform history, run state, transcript, working artifact, candidate memory, reviewed institutional memory, and audit; an explicit promotion path links candidate to institutional memory.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Conversation is not institutional memory</text><text x="80" y="122" class="subtitle">Each store has a different owner, purpose, retention policy, and deletion path.</text><rect x="42" y="230" width="195" height="300" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="64" y="250" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="119" y="275" class="label" text-anchor="middle" style="fill:#57575B">PLATFORM</text>
  <text x="66" y="322" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="66" dy="0">History</tspan></text>
  <text x="66" y="358" class="small" style="fill:#57575B" text-anchor="start"><tspan x="66" dy="0">workspace retention</tspan><tspan x="66" dy="26">editable/deletable</tspan></text><rect x="262" y="230" width="195" height="300" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="284" y="250" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="339" y="275" class="label" text-anchor="middle" style="fill:#57575B">RUN</text>
  <text x="286" y="322" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="286" dy="0">State</tspan></text>
  <text x="286" y="358" class="small" style="fill:#57575B" text-anchor="start"><tspan x="286" dy="0">pause · resume</tspan><tspan x="286" dy="26">task-scoped</tspan></text><rect x="482" y="230" width="195" height="300" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="504" y="250" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="559" y="275" class="label" text-anchor="middle" style="fill:#57575B">PRODUCT</text>
  <text x="506" y="322" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="506" dy="0">Transcript</tspan></text>
  <text x="506" y="358" class="small" style="fill:#57575B" text-anchor="start"><tspan x="506" dy="0">interaction review</tspan><tspan x="506" dy="26">separate retention</tspan></text><rect x="702" y="230" width="195" height="300" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="724" y="250" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="779" y="275" class="label" text-anchor="middle" style="fill:#57575B">WORK</text>
  <text x="726" y="322" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="726" dy="0">Artifact</tspan></text>
  <text x="726" y="358" class="small" style="fill:#57575B" text-anchor="start"><tspan x="726" dy="0">report · plan · diff</tspan><tspan x="726" dy="26">candidate output</tspan></text><rect x="922" y="230" width="195" height="300" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="944" y="250" width="120" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1004" y="275" class="label" text-anchor="middle" style="fill:#57575B">CANDIDATE</text>
  <text x="946" y="322" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="946" dy="0">Memory</tspan></text>
  <text x="946" y="358" class="small" style="fill:#57575B" text-anchor="start"><tspan x="946" dy="0">source + scope</tspan><tspan x="946" dy="26">not yet trusted</tspan></text><rect x="1142" y="230" width="195" height="300" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="1164" y="250" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1219" y="275" class="label" text-anchor="middle" style="fill:#57575B">REVIEWED</text>
  <text x="1166" y="322" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1166" dy="0">Institutional</tspan></text>
  <text x="1166" y="358" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1166" dy="0">owner · effective</tspan><tspan x="1166" dy="26">date</tspan><tspan x="1166" dy="26">access · correction</tspan><tspan x="1166" dy="26">· expiry</tspan></text><rect x="1362" y="230" width="195" height="300" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="1384" y="250" width="110" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="1439" y="275" class="label" text-anchor="middle" style="fill:#57575B">SECURITY</text>
  <text x="1386" y="322" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1386" dy="0">Audit</tspan></text>
  <text x="1386" y="358" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1386" dy="0">operational events</tspan><tspan x="1386" dy="26">not conversation</tspan><tspan x="1386" dy="26">memory</tspan></text><path d="M1020 570 L1240 570" fill="none" stroke="#85ECCE" stroke-width="4"  marker-end="url(#arrow-85ECCE)"/><text x="1130" y="560" class="small" text-anchor="middle">evidence · classify · review · promote</text><path d="M1460 550 L1460 680" fill="none" stroke="#FA5F67" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-FA5F67)"/><text x="1460" y="605" class="small" text-anchor="middle">separate retention</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Deleting a thread does not automatically delete derived memory, artifacts, checkpoints, or audit records.</text></svg>