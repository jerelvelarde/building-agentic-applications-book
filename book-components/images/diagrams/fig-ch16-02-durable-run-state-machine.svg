<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">A durable run cannot jump over evidence</text><text x="80" y="122" class="subtitle">The connection can disappear. State guards remain server-side.</text><rect x="60" y="260" width="190" height="110" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="82" y="280" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="137" y="305" class="label" text-anchor="middle" style="fill:#57575B">STATE</text>
  <text x="84" y="352" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="84" dy="0">Queued</tspan></text>
  <text x="84" y="388" class="small" style="fill:#57575B" text-anchor="start"><tspan x="84" dy="0">lease required</tspan></text><path d="M250 315 L285 315" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="290" y="260" width="190" height="110" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="312" y="280" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="367" y="305" class="label" text-anchor="middle" style="fill:#57575B">STATE</text>
  <text x="314" y="352" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="314" dy="0">Planning</tspan></text>
  <text x="314" y="388" class="small" style="fill:#57575B" text-anchor="start"><tspan x="314" dy="0">scope fixed</tspan></text><path d="M480 315 L515 315" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="520" y="260" width="220" height="110" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="542" y="280" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="597" y="305" class="label" text-anchor="middle" style="fill:#57575B">STATE</text>
  <text x="544" y="352" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="544" dy="0">Waiting</tspan></text>
  <text x="544" y="388" class="small" style="fill:#57575B" text-anchor="start"><tspan x="544" dy="0">live grant required</tspan></text><path d="M740 315 L775 315" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="780" y="260" width="210" height="110" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="802" y="280" width="110" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="857" y="305" class="label" text-anchor="middle" style="fill:#57575B">STATE</text>
  <text x="804" y="352" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="804" dy="0">Executing</tspan></text>
  <text x="804" y="388" class="small" style="fill:#57575B" text-anchor="start"><tspan x="804" dy="0">receipt required</tspan></text><path d="M990 315 L1025 315" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1030" y="260" width="210" height="110" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1052" y="280" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1107" y="305" class="label" text-anchor="middle" style="fill:#57575B">STATE</text>
  <text x="1054" y="352" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1054" dy="0">Verifying</tspan></text>
  <text x="1054" y="388" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1054" dy="0">verifier result</tspan></text><path d="M1240 315 L1275 315" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1280" y="260" width="240" height="110" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1302" y="280" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1357" y="305" class="label" text-anchor="middle" style="fill:#57575B">STATE</text>
  <text x="1304" y="352" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1304" dy="0">Review</tspan></text>
  <text x="1304" y="388" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1304" dy="0">effect reconciled</tspan></text><rect x="80" y="510" width="450" height="70" rx="20" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><text x="305" y="553" class="label" text-anchor="middle">COMPLETED_VERIFIED</text><rect x="580" y="510" width="450" height="70" rx="20" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><text x="805" y="553" class="label" text-anchor="middle">COMPLETED_UNVERIFIED</text><rect x="1080" y="510" width="450" height="70" rx="20" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><text x="1305" y="553" class="label" text-anchor="middle">FAILED_NO_EFFECT</text><rect x="80" y="605" width="450" height="70" rx="20" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><text x="305" y="648" class="label" text-anchor="middle">FAILED_PARTIAL_EFFECT</text><rect x="580" y="605" width="450" height="70" rx="20" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><text x="805" y="648" class="label" text-anchor="middle">OUTCOME_UNKNOWN</text><rect x="1080" y="605" width="450" height="70" rx="20" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><text x="1305" y="648" class="label" text-anchor="middle">CANCELLED_WITH_EFFECT</text><path d="M1400 370 L1280 510" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1035" y="425" width="205" height="36" rx="18" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1" /><text x="1137.5" y="450" class="label" text-anchor="middle" style="fill:#57575B">TERMINAL FROM EVIDENCE</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">A cancelled stream is not a cancelled worker, and a “done” message is not a verifier result.</text></svg>