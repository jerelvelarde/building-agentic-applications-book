<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Capabilities should exist only when the phase needs them</title><desc id="desc">Timing chart across understand, propose, wait, commit, and complete phases showing read, render, approval, write, and verification capabilities appearing only when needed.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Capabilities should exist only when the phase needs them</text><text x="78" y="126" class="subtitle" text-anchor="start">A version-bound approval opens one narrow mutation window; completion closes it.</text><rect x="174" y="190" width="210" height="46" rx="23" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1"/><text x="279" y="221" class="label" text-anchor="middle" style="fill:#57575B">UNDERSTAND</text><rect x="432" y="190" width="210" height="46" rx="23" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1"/><text x="537" y="221" class="label" text-anchor="middle" style="fill:#57575B">PROPOSE</text><rect x="690" y="190" width="210" height="46" rx="23" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1"/><text x="795" y="221" class="label" text-anchor="middle" style="fill:#57575B">WAIT</text><rect x="948" y="190" width="210" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1053" y="221" class="label" text-anchor="middle" style="fill:#57575B">COMMIT</text><rect x="1206" y="190" width="210" height="46" rx="23" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1"/><text x="1311" y="221" class="label" text-anchor="middle" style="fill:#57575B">COMPLETE</text><text x="45" y="306" class="label" text-anchor="start">READ</text><rect x="150" y="270" width="1290" height="58" rx="18" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><rect x="162" y="279" width="492" height="40" rx="15" fill="#EEE6FE" stroke="#BEC2FF" stroke-width="2"/><text x="45" y="396" class="label" text-anchor="start">RENDER</text><rect x="150" y="360" width="1290" height="58" rx="18" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><rect x="162" y="369" width="1266" height="40" rx="15" fill="#EEE6FE" stroke="#BEC2FF" stroke-width="2"/><text x="45" y="486" class="label" text-anchor="start">APPROVE</text><rect x="150" y="450" width="1290" height="58" rx="18" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><rect x="678" y="459" width="234" height="40" rx="15" fill="#EEE6FE" stroke="#BEC2FF" stroke-width="2"/><text x="45" y="576" class="label" text-anchor="start">WRITE</text><rect x="150" y="540" width="1290" height="58" rx="18" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><rect x="936" y="549" width="234" height="40" rx="15" fill="#E7FBF5" stroke="#85ECCE" stroke-width="2"/><text x="45" y="666" class="label" text-anchor="start">VERIFY</text><rect x="150" y="630" width="1290" height="58" rx="18" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><rect x="936" y="639" width="492" height="40" rx="15" fill="#E7FBF5" stroke="#85ECCE" stroke-width="2"/><text x="795" y="488" class="small" text-anchor="middle" style="font-size:18px;fill:#11143D">digest-bound approval</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Retrieved content may request a capability; only trusted phase state can make it available.</text></svg>