<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Least privilege is the intersection—not the sum—of controls</title><desc id="desc">Attack tree showing how an outward symlink, an unconstrained terminal, ambient data, and an allowlisted GET host combine into exfiltration, alongside independent controls that break the route.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Least privilege is the intersection—not the sum—of controls</text><text x="80" y="122" class="subtitle">Every individual rule can say “allowed” while the combined route still leaks data.</text><rect x="70" y="190" width="300" height="500" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="92" y="210" width="120" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="152" y="235" class="label" text-anchor="middle" style="fill:#57575B">OBJECTIVE</text>
  <text x="94" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Exfiltrate outside file</tspan></text>
  <text x="94" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">docs/vendor → symlink</tspan><tspan x="94" dy="26">terminal reads target</tspan><tspan x="94" dy="26">content enters query</tspan><tspan x="94" dy="26">GET reaches allowed host</tspan></text><rect x="430" y="190" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="448" y="202" width="92" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="494" y="227" class="label" text-anchor="middle" style="fill:#57575B">CHECK 1</text><text x="454" y="268" class="body">Path allowlist</text><rect x="610" y="202" width="158" height="36" rx="18" fill="#FFF0F1" stroke="#FFF0F1" stroke-width="1" /><text x="689" y="227" class="label" text-anchor="middle" style="fill:#57575B">REPORTS SUCCESS</text><circle cx="370" cy="245" r="6" fill="#FA5F67"/><path d="M382 245 L418 245" fill="none" stroke="#FA5F67" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-FA5F67)"/><rect x="430" y="315" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="448" y="327" width="92" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="494" y="352" class="label" text-anchor="middle" style="fill:#57575B">CHECK 2</text><text x="454" y="393" class="body">Read-only classification</text><rect x="610" y="327" width="158" height="36" rx="18" fill="#FFF0F1" stroke="#FFF0F1" stroke-width="1" /><text x="689" y="352" class="label" text-anchor="middle" style="fill:#57575B">REPORTS SUCCESS</text><circle cx="370" cy="370" r="6" fill="#FA5F67"/><path d="M382 370 L418 370" fill="none" stroke="#FA5F67" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-FA5F67)"/><rect x="430" y="440" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="448" y="452" width="92" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="494" y="477" class="label" text-anchor="middle" style="fill:#57575B">CHECK 3</text><text x="454" y="518" class="body">GET-only egress</text><rect x="610" y="452" width="158" height="36" rx="18" fill="#FFF0F1" stroke="#FFF0F1" stroke-width="1" /><text x="689" y="477" class="label" text-anchor="middle" style="fill:#57575B">REPORTS SUCCESS</text><circle cx="370" cy="495" r="6" fill="#FA5F67"/><path d="M382 495 L418 495" fill="none" stroke="#FA5F67" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-FA5F67)"/><rect x="430" y="565" width="360" height="110" rx="24" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="448" y="577" width="92" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="494" y="602" class="label" text-anchor="middle" style="fill:#57575B">CHECK 4</text><text x="454" y="643" class="body">No write tool</text><rect x="610" y="577" width="158" height="36" rx="18" fill="#FFF0F1" stroke="#FFF0F1" stroke-width="1" /><text x="689" y="602" class="label" text-anchor="middle" style="fill:#57575B">REPORTS SUCCESS</text><circle cx="370" cy="620" r="6" fill="#FA5F67"/><path d="M382 620 L418 620" fill="none" stroke="#FA5F67" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-FA5F67)"/><rect x="860" y="190" width="670" height="500" rx="28" fill="#E7FBF5" stroke="#85ECCE" stroke-width="2" /><rect x="882" y="210" width="220" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="992" y="235" class="label" text-anchor="middle" style="fill:#57575B">INDEPENDENT REPAIRS</text>
  <text x="884" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="884" dy="0">Break the route at several boundaries</tspan></text>
  <text x="884" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="884" dy="0">1  Mount does not expose outside directory</tspan><tspan x="884" dy="26">2  Path broker rejects resolved symlink</tspan><tspan x="884" dy="26">3  Terminal shares filesystem containment</tspan><tspan x="884" dy="26">4  Worker starts without ambient tokens</tspan><tspan x="884" dy="26">5  Fetch service limits path, query, and credentials</tspan><tspan x="884" dy="26">6  Sensitive reads and egress cannot coexist by default</tspan><tspan x="884" dy="26">7  Canary telemetry observes read and outbound paths</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Two checks in the same process and identity are not independent enforcement points.</text></svg>