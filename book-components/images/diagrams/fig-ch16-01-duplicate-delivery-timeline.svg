<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">One logical run can have several process attempts</title><desc id="desc">Timeline where a browser disconnects, worker A completes a package script, the gateway restarts, the lease expires, worker B claims the run, and worker A's late state write is rejected by fencing.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">One logical run can have several process attempts</text><text x="80" y="122" class="subtitle">Leases, fencing, idempotency, and reconciliation—not model memory—settle failure.</text><text x="70" y="191" class="label">Browser</text><line x1="240" y1="185" x2="1515" y2="185" stroke="#DBDBE5" stroke-width="2"/><text x="70" y="276" class="label">Gateway</text><line x1="240" y1="270" x2="1515" y2="270" stroke="#DBDBE5" stroke-width="2"/><text x="70" y="361" class="label">Queue + lease</text><line x1="240" y1="355" x2="1515" y2="355" stroke="#DBDBE5" stroke-width="2"/><text x="70" y="446" class="label">Worker A</text><line x1="240" y1="440" x2="1515" y2="440" stroke="#DBDBE5" stroke-width="2"/><text x="70" y="531" class="label">Worker B</text><line x1="240" y1="525" x2="1515" y2="525" stroke="#DBDBE5" stroke-width="2"/><text x="70" y="616" class="label">Target filesystem</text><line x1="240" y1="610" x2="1515" y2="610" stroke="#DBDBE5" stroke-width="2"/><circle cx="320" cy="185" r="13" fill="#FA5F67"/><text x="320" y="167" class="small" text-anchor="middle">disconnect</text><path d="M334 185 L466 440" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><circle cx="480" cy="440" r="13" fill="#FFAC4D"/><text x="480" y="422" class="small" text-anchor="middle">script commits</text><path d="M494 440 L606 270" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><circle cx="620" cy="270" r="13" fill="#FA5F67"/><text x="620" y="252" class="small" text-anchor="middle">restart</text><path d="M634 270 L766 355" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><circle cx="780" cy="355" r="13" fill="#FA5F67"/><text x="780" y="337" class="small" text-anchor="middle">lease expires</text><path d="M794 355 L936 525" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><circle cx="950" cy="525" r="13" fill="#85ECCE"/><text x="950" y="507" class="small" text-anchor="middle">claim token 2</text><path d="M964 525 L1116 440" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><circle cx="1130" cy="440" r="13" fill="#FA5F67"/><text x="1130" y="422" class="small" text-anchor="middle">late write token 1</text><path d="M1144 440 L1306 355" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><circle cx="1320" cy="355" r="13" fill="#11143D"/><text x="1320" y="337" class="small" text-anchor="middle">reject stale fence</text><path d="M1334 355 L1436 610" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><circle cx="1450" cy="610" r="13" fill="#85ECCE"/><text x="1450" y="592" class="small" text-anchor="middle">reconcile receipt</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Run ID stays stable. Attempt IDs, fencing tokens, and operation receipts tell operators what actually repeated.</text></svg>