<title id="title">What the Hermes–CopilotKit source proves</title><desc id="desc">Architecture flow from CopilotKit React UI through Next.js and the Hermes AG-UI client to an absent external adapter and Hermes loop, returning events to cards, diffs, and a PDF renderer.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">What the Hermes–CopilotKit source proves</text><text x="80" y="122" class="subtitle">Solid edges are tracked in the pinned repository. Dashed edges cross into the absent external runtime.</text><rect x="70" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="92" y="290" width="170" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="177" y="315" class="label" text-anchor="middle" style="fill:#57575B">SOURCE-PRESENT</text>
  <text x="94" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">CopilotKit UI</tspan></text>
  <text x="94" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">shared ledger context</tspan><tspan x="94" dy="26">cards · diff · PDF</tspan></text><path d="M339.6 425 L363.6 425" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="367.6" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="389.6" y="290" width="170" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="474.6" y="315" class="label" text-anchor="middle" style="fill:#57575B">SOURCE-PRESENT</text>
  <text x="391.6" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="391.6" dy="0">Next.js route</tspan></text>
  <text x="391.6" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="391.6" dy="0">registered default agent</tspan><tspan x="391.6" dy="26">AGENT_URL client</tspan></text><path d="M637.2 425 L661.2 425" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="665.2" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="687.2" y="290" width="170" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="772.2" y="315" class="label" text-anchor="middle" style="fill:#57575B">SOURCE-PRESENT</text>
  <text x="689.2" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="689.2" dy="0">@ag-ui/hermes</tspan></text>
  <text x="689.2" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="689.2" dy="0">protocol client</tspan><tspan x="689.2" dy="26">not the worker</tspan></text><path d="M934.8000000000001 425 L958.8000000000001 425" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="962.8000000000001" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="984.8000000000001" y="290" width="110" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="1039.8000000000002" y="315" class="label" text-anchor="middle" style="fill:#57575B">ABSENT</text>
  <text x="986.8000000000001" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="986.8000000000001" dy="0">External adapter</tspan></text>
  <text x="986.8000000000001" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="986.8000000000001" dy="0">fork not pinned</tspan><tspan x="986.8000000000001" dy="26">runtime unavailable</tspan></text><path d="M1232.4 425 L1256.4 425" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrow-6857D9)"/><rect x="1260.4" y="270" width="269.6" height="310" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="1282.4" y="290" width="110" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="1337.4" y="315" class="label" text-anchor="middle" style="fill:#57575B">ABSENT</text>
  <text x="1284.4" y="362" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1284.4" dy="0">Hermes loop</tspan></text>
  <text x="1284.4" y="398" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1284.4" dy="0">model + tools</tspan><tspan x="1284.4" dy="26">machine operations</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">The repository proves an inspectable UI/protocol seam. It does not prove an end-to-end machine run.</text></svg>