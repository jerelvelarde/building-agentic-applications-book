<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Three operating surfaces of agentic applications</title>
  <desc id="desc">Three equal cards compare application, machine, and organizational agents by reachable surface, authority, and required controls. A shared handoff rail emphasizes that the levels compose but are not a maturity ladder.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#85ECCE"/>
      <stop offset="0.55" stop-color="#BEC2FF"/>
      <stop offset="1" stop-color="#EEE6FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#11143D" flood-opacity="0.08"/>
    </filter>
    <style>
      .title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.cardTitle{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.label{font:700 17px 'Spline Sans Mono',monospace;letter-spacing:1.5px;fill:#57575B}.body{font:500 22px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 19px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.level{font:700 18px 'Spline Sans Mono',monospace;fill:#11143D}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#FAFAFC"/>
  <circle cx="1440" cy="80" r="210" fill="#BEC2FF" opacity="0.12"/>
  <circle cx="80" cy="840" r="230" fill="#85ECCE" opacity="0.12"/>
  <text x="90" y="96" class="title">Three operating surfaces</text>
  <text x="90" y="136" class="subtitle">Classify the agent by what the surrounding system allows it to reach and change.</text>

  <g transform="translate(90 200)" filter="url(#shadow)">
    <rect width="440" height="500" rx="30" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <rect x="28" y="28" width="112" height="40" rx="20" fill="#85ECCE" opacity="0.55"/>
    <text x="84" y="55" text-anchor="middle" class="level">LEVEL 1</text>
    <text x="28" y="118" class="cardTitle">Application agent</text>
    <text x="28" y="164" class="label">SURFACE</text>
    <text x="28" y="199" class="body">Web or mobile product</text>
    <text x="28" y="244" class="label">REACH</text>
    <text x="28" y="279" class="body">Typed app state and tools</text>
    <text x="28" y="324" class="label">CONTROL CENTER</text>
    <text x="28" y="359" class="small">Tenant scope · server authorization</text>
    <text x="28" y="390" class="small">Shared state · human intervention</text>
    <line x1="28" y1="430" x2="412" y2="430" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="467" class="label">BLAST RADIUS</text>
    <rect x="190" y="450" width="200" height="14" rx="7" fill="#F0F0F4"/>
    <rect x="190" y="450" width="66" height="14" rx="7" fill="#189370"/>
    <circle cx="256" cy="457" r="10" fill="#FFFFFF" stroke="#189370" stroke-width="3"/>
  </g>

  <g transform="translate(580 200)" filter="url(#shadow)">
    <rect width="440" height="500" rx="30" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <rect x="28" y="28" width="112" height="40" rx="20" fill="#BEC2FF" opacity="0.65"/>
    <text x="84" y="55" text-anchor="middle" class="level">LEVEL 2</text>
    <text x="28" y="118" class="cardTitle">Machine agent</text>
    <text x="28" y="164" class="label">SURFACE</text>
    <text x="28" y="199" class="body">Workspace or host</text>
    <text x="28" y="244" class="label">REACH</text>
    <text x="28" y="279" class="body">Files · shell · process · network</text>
    <text x="28" y="324" class="label">CONTROL CENTER</text>
    <text x="28" y="359" class="small">Policy · sandbox · credentials</text>
    <text x="28" y="390" class="small">Verification · recovery</text>
    <line x1="28" y1="430" x2="412" y2="430" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="467" class="label">BLAST RADIUS</text>
    <rect x="190" y="450" width="200" height="14" rx="7" fill="#F0F0F4"/>
    <rect x="190" y="450" width="132" height="14" rx="7" fill="#6857D9"/>
    <circle cx="322" cy="457" r="10" fill="#FFFFFF" stroke="#6857D9" stroke-width="3"/>
  </g>

  <g transform="translate(1070 200)" filter="url(#shadow)">
    <rect width="440" height="500" rx="30" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <rect x="28" y="28" width="112" height="40" rx="20" fill="#EEE6FE"/>
    <text x="84" y="55" text-anchor="middle" class="level">LEVEL 3</text>
    <text x="28" y="118" class="cardTitle">Organizational agent</text>
    <text x="28" y="164" class="label">SURFACE</text>
    <text x="28" y="199" class="body">Channels and shared systems</text>
    <text x="28" y="244" class="label">REACH</text>
    <text x="28" y="279" class="body">Team context and delegation</text>
    <text x="28" y="324" class="label">CONTROL CENTER</text>
    <text x="28" y="359" class="small">Actor chain · organizational policy</text>
    <text x="28" y="390" class="small">Approvals · memory · audit</text>
    <line x1="28" y1="430" x2="412" y2="430" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="467" class="label">BLAST RADIUS</text>
    <rect x="190" y="450" width="200" height="14" rx="7" fill="#F0F0F4"/>
    <rect x="190" y="450" width="192" height="14" rx="7" fill="#8D5BE8"/>
    <circle cx="382" cy="457" r="10" fill="#FFFFFF" stroke="#8D5BE8" stroke-width="3"/>
  </g>

  <rect x="280" y="752" width="1040" height="84" rx="42" fill="url(#accent)" opacity="0.72"/>
  <text x="800" y="788" text-anchor="middle" class="body">Independent surfaces · composable through typed, authenticated handoffs</text>
  <text x="800" y="816" text-anchor="middle" class="small">Higher authority is a cost, not a badge of maturity.</text>
</svg>
