<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Reliability failure-injection matrix</title><desc id="desc">A runbook matrix maps representative provider, queue, worker, budget, cancellation, tenant, and compensation failures to expected task state, retry owner, effect evidence, and user-visible truth.</desc><defs><style>.h{font:700 46px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 15px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 18px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="60" y="58">GAME-DAY RUNBOOK</text><text class="h" x="60" y="112">Inject failure; assert the truthful outcome</text><text class="s" x="60" y="150">Every row must prove one retry owner, bounded attempts, at most one effect, retained evidence, and an owned response.</text>
  <g transform="translate(60 200)"><rect width="1480" height="590" rx="25" fill="#fff" stroke="#DBDBE5"/><rect width="1480" height="64" rx="25" fill="#11143D"/><g style="font:700 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff"><text x="25" y="40">INJECTION</text><text x="275" y="40">EXPECTED TASK STATE</text><text x="560" y="40">RETRY OWNER</text><text x="760" y="40">EFFECT EVIDENCE</text><text x="1040" y="40">USER-VISIBLE TRUTH</text><text x="1330" y="40">OWNER</text></g>
    <g class="t"><text x="25" y="108">429 / provider 5xx</text><text x="275" y="108">retrying, inside deadline</text><text x="560" y="108">chosen caller</text><text x="760" y="108">no target operation</text><text x="1040" y="108">delayed; next attempt known</text><text x="1330" y="108">runtime</text>
    <text x="25" y="168">timeout before dispatch</text><text x="275" y="168">safe to retry</text><text x="560" y="168">chosen caller</text><text x="760" y="168">dispatch absent</text><text x="1040" y="168">no effect occurred</text><text x="1330" y="168">gateway</text>
    <text x="25" y="228">timeout after commit</text><text x="275" y="228">outcome_unknown</text><text x="560" y="228">none until reconcile</text><text x="760" y="228">operation lookup / receipt</text><text x="1040" y="228">result is being verified</text><text x="1330" y="228">domain service</text>
    <text x="25" y="288">lease expiry / redelivery</text><text x="275" y="288">new fenced attempt</text><text x="560" y="288">queue policy</text><text x="760" y="288">fence + effect count</text><text x="1040" y="288">work resumed once</text><text x="1330" y="288">worker platform</text>
    <text x="25" y="348">stale worker writes</text><text x="275" y="348">write rejected</text><text x="560" y="348">no retry</text><text x="760" y="348">version/fence denial</text><text x="1040" y="348">candidate superseded</text><text x="1330" y="348">worker platform</text>
    <text x="25" y="408">budget exhausted</text><text x="275" y="408">partial / limited</text><text x="560" y="408">no retry</text><text x="760" y="408">budget ledger</text><text x="1040" y="408">what finished + what did not</text><text x="1330" y="408">product</text>
    <text x="25" y="468">tool ignores cancellation</text><text x="275" y="468">cancel_requested</text><text x="560" y="468">no retry</text><text x="760" y="468">executor acknowledgement</text><text x="1040" y="468">stop pending; prior effects shown</text><text x="1330" y="468">executor</text>
    <text x="25" y="528">compensation fails</text><text x="275" y="528">manual_review</text><text x="560" y="528">owned runbook</text><text x="760" y="528">target + compensation receipts</text><text x="1040" y="528">effect remains; help engaged</text><text x="1330" y="528">incident lead</text></g>
    <g stroke="#DBDBE5"><line x1="20" y1="125" x2="1460" y2="125"/><line x1="20" y1="185" x2="1460" y2="185"/><line x1="20" y1="245" x2="1460" y2="245"/><line x1="20" y1="305" x2="1460" y2="305"/><line x1="20" y1="365" x2="1460" y2="365"/><line x1="20" y1="425" x2="1460" y2="425"/><line x1="20" y1="485" x2="1460" y2="485"/></g></g>
  <rect x="250" y="820" width="1100" height="50" rx="25" fill="#EDEDF5"/><text x="800" y="852" text-anchor="middle" class="l">Record task ID · attempt IDs · idempotency key · target receipt · total time · total cost</text>
</svg>
