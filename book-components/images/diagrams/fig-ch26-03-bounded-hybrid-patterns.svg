<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Three bounded hybrid patterns</title><desc id="desc">Three panels show an application control plane delegating to a machine worker, an organizational front door calling a typed domain API, and an organizational supervisor delegating to an approved isolated worker with a separate publication grant.</desc><defs><style>.h{font:700 46px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 15px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#6857D9"/></marker></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="60" y="58">COMPOSE WITH CONTRACTS</text><text class="h" x="60" y="112">A narrow handoff can be safer than one overpowered agent</text><text class="s" x="60" y="150">Each receiver gets explicit identity, scope, expiry, budget, and an evidence contract.</text>
  <g transform="translate(55 205)"><g><rect width="470" height="585" rx="28" fill="#fff" stroke="#DBDBE5"/><rect x="505" width="470" height="585" rx="28" fill="#fff" stroke="#DBDBE5"/><rect x="1010" width="470" height="585" rx="28" fill="#fff" stroke="#DBDBE5"/></g>
    <g transform="translate(25 0)"><text class="k" x="20" y="48">PATTERN A</text><text class="l" x="20" y="85">Application → machine worker</text><rect x="55" y="130" width="310" height="70" rx="20" fill="#E7FBF5"/><text class="l" x="210" y="173" text-anchor="middle">Level 1 control plane</text><path d="M210 205V270" stroke="#6857D9" stroke-width="5" marker-end="url(#a)"/><text class="t" x="230" y="240">signed · expiring spec</text><rect x="55" y="280" width="310" height="95" rx="22" fill="#EDEDF5"/><text class="l" x="210" y="320" text-anchor="middle">Disposable Level 2</text><text class="t" x="210" y="350" text-anchor="middle">narrow workspace + capability</text><path d="M210 380V445" stroke="#189370" stroke-width="5" marker-end="url(#a)"/><rect x="55" y="455" width="310" height="78" rx="20" fill="#fff" stroke="#85ECCE"/><text class="t" x="210" y="486" text-anchor="middle">diff · logs · tests · hashes</text><text class="t" x="210" y="512" text-anchor="middle">separate merge/publish approval</text></g>
    <g transform="translate(530 0)"><text class="k" x="20" y="48">PATTERN B</text><text class="l" x="20" y="85">Organization → domain API</text><rect x="55" y="130" width="310" height="80" rx="20" fill="#EEE6FE"/><text class="l" x="210" y="165" text-anchor="middle">Level 3 front door</text><text class="t" x="210" y="190" text-anchor="middle">authenticate + channel policy</text><path d="M210 215V300" stroke="#6857D9" stroke-width="5" marker-end="url(#a)"/><text class="t" x="230" y="260">constrained identity</text><rect x="55" y="310" width="310" height="95" rx="22" fill="#E7FBF5"/><text class="l" x="210" y="350" text-anchor="middle">Typed Level 1 service</text><text class="t" x="210" y="380" text-anchor="middle">reauthorize resource</text><path d="M210 410V455" stroke="#189370" stroke-width="5" marker-end="url(#a)"/><rect x="55" y="465" width="310" height="68" rx="20" fill="#fff" stroke="#85ECCE"/><text class="t" x="210" y="505" text-anchor="middle">domain result + receipt</text></g>
    <g transform="translate(1035 0)"><text class="k" x="20" y="48">PATTERN C</text><text class="l" x="20" y="85">Organization → bounded worker</text><rect x="55" y="120" width="310" height="72" rx="20" fill="#EEE6FE"/><text class="l" x="210" y="164" text-anchor="middle">Policy-bound task envelope</text><path d="M210 197V245" stroke="#6857D9" stroke-width="5" marker-end="url(#a)"/><rect x="90" y="255" width="240" height="60" rx="20" fill="#fff" stroke="#BEC2FF"/><text class="t" x="210" y="292" text-anchor="middle">eligible scope approval</text><path d="M210 320V365" stroke="#6857D9" stroke-width="5" marker-end="url(#a)"/><rect x="55" y="375" width="310" height="78" rx="20" fill="#EDEDF5"/><text class="l" x="210" y="409" text-anchor="middle">Isolated Level 2</text><text class="t" x="210" y="434" text-anchor="middle">returns evidence only</text><path d="M210 458V495" stroke="#189370" stroke-width="5" marker-end="url(#a)"/><rect x="55" y="505" width="310" height="50" rx="20" fill="#11143D"/><text x="210" y="536" text-anchor="middle" style="font:700 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">new grant for publication</text></g>
  </g><text class="s" x="800" y="845" text-anchor="middle">Never forward the whole conversation, ambient credentials, or vague permission to “handle it.”</text>
</svg>
