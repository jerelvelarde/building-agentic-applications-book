<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Production readiness scorecard</title><desc id="desc">A maturity matrix scores core agent-system controls from zero to three while marking identity, security, state, persistence, reliability, and observability as hard blockers when zero.</desc><defs><style>.h{font:700 46px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 15px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 13px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="55" y="55">PRODUCTION READINESS</text><text class="h" x="55" y="108">Maturity does not average away a missing control</text><text class="s" x="55" y="145">Score 0–3 by category. A zero in a hard-gate row blocks the affected authority surface.</text>
  <g transform="translate(55 190)"><rect width="1490" height="590" rx="24" fill="#fff" stroke="#DBDBE5"/><rect width="1490" height="58" rx="24" fill="#11143D"/><g style="font:700 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff"><text x="25" y="37">CATEGORY</text><text x="330" y="37">0 · ABSENT</text><text x="600" y="37">1 · IMPLICIT</text><text x="870" y="37">2 · ENFORCED</text><text x="1160" y="37">3 · RECOVERY-TESTED</text></g>
    <g class="l"><text x="25" y="96">Identity + authorization ★</text><text x="25" y="139">State + persistence ★</text><text x="25" y="182">Tools + effects</text><text x="25" y="225">Human control</text><text x="25" y="268">Isolation + secrets ★</text><text x="25" y="311">Reliability + idempotency ★</text><text x="25" y="354">Evaluation</text><text x="25" y="397">Observability + ledger ★</text><text x="25" y="440">Memory + delegation</text><text x="25" y="483">Budgets + degraded modes</text><text x="25" y="526">Incident + retirement</text></g>
    <g class="t"><text x="330" y="96">ambient / shared</text><text x="600" y="96">basic login</text><text x="870" y="96">scoped, current policy</text><text x="1160" y="96">revocation + replay tested</text><text x="330" y="139">message only</text><text x="600" y="139">thread memory</text><text x="870" y="139">typed checkpoints</text><text x="1160" y="139">conflict + restart tested</text><text x="330" y="182">unvalidated</text><text x="600" y="182">schema only</text><text x="870" y="182">risk classified</text><text x="1160" y="182">receipt + compensation</text><text x="330" y="225">none</text><text x="600" y="225">generic confirm</text><text x="870" y="225">exact proposal</text><text x="1160" y="225">edit / expiry / resume</text><text x="330" y="268">shared host keys</text><text x="600" y="268">logical scope</text><text x="870" y="268">sandbox + broker</text><text x="1160" y="268">escape / egress tested</text><text x="330" y="311">blind retry</text><text x="600" y="311">timeouts</text><text x="870" y="311">one owner + keys</text><text x="1160" y="311">ambiguity reconciled</text><text x="330" y="354">manual</text><text x="600" y="354">prompt tests</text><text x="870" y="354">trajectory suites</text><text x="1160" y="354">production regressions</text><text x="330" y="397">console logs</text><text x="600" y="397">traces</text><text x="870" y="397">correlated records</text><text x="1160" y="397">alerts + drills</text><text x="330" y="440">unbounded transcript</text><text x="600" y="440">informal retention</text><text x="870" y="440">scope + provenance</text><text x="1160" y="440">delete / revoke / review</text><text x="330" y="483">unbounded</text><text x="600" y="483">telemetry only</text><text x="870" y="483">pre-step enforcement</text><text x="1160" y="483">safe reduced product</text><text x="330" y="526">unknown owner</text><text x="600" y="526">manual response</text><text x="870" y="526">owned runbook</text><text x="1160" y="526">game-day + cleanup</text></g>
    <g stroke="#DBDBE5"><line x1="18" y1="110" x2="1470" y2="110"/><line x1="18" y1="153" x2="1470" y2="153"/><line x1="18" y1="196" x2="1470" y2="196"/><line x1="18" y1="239" x2="1470" y2="239"/><line x1="18" y1="282" x2="1470" y2="282"/><line x1="18" y1="325" x2="1470" y2="325"/><line x1="18" y1="368" x2="1470" y2="368"/><line x1="18" y1="411" x2="1470" y2="411"/><line x1="18" y1="454" x2="1470" y2="454"/><line x1="18" y1="497" x2="1470" y2="497"/></g></g><text class="s" x="800" y="835" text-anchor="middle">★ Hard gate: a zero blocks release for the authority surface that depends on it. Do not compute one aggregate score.</text>
</svg>
