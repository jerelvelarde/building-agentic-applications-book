<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Validate tools in layers</title><desc id="desc">Shape validation is the first gate—not authorization.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker>
  <linearGradient id="wash" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#BEC2FF" stop-opacity=".22"/><stop offset=".48" stop-color="#85ECCE" stop-opacity=".18"/><stop offset="1" stop-color="#FFAC4D" stop-opacity=".10"/></linearGradient></defs>
  <style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 19px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}.mono{font:500 16px 'Spline Sans Mono',monospace;fill:#57575B}</style>
  <rect width="1600" height="900" fill="#FAFAFC"/><ellipse cx="1260" cy="100" rx="430" ry="230" fill="url(#wash)"/>
  <text x="80" y="86" class="title">Validate tools in layers</text><text x="80" y="124" class="subtitle">Shape validation is the first gate—not authorization.</text>
  <g transform="translate(140 185)"><rect width="1320" height="64" rx="20" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="28" y="40" class="label" style="fill:#57575B">1 · SYNTACTIC</text><text x="330" y="40" class="body" style="fill:#010507">types · required fields · bounds</text></g>
  <g transform="translate(185 263)"><rect width="1230" height="64" rx="20" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="28" y="40" class="label" style="fill:#57575B">2 · SEMANTIC</text><text x="330" y="40" class="body" style="fill:#010507">currency · dates · domain invariants</text></g>
  <g transform="translate(230 341)"><rect width="1140" height="64" rx="20" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/><text x="28" y="40" class="label" style="fill:#57575B">3 · IDENTITY</text><text x="330" y="40" class="body" style="fill:#010507">authenticated principal + tenant</text></g>
  <g transform="translate(275 419)"><rect width="1050" height="64" rx="20" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="28" y="40" class="label" style="fill:#57575B">4 · AUTHORIZATION</text><text x="330" y="40" class="body" style="fill:#010507">operation on this resource</text></g>
  <g transform="translate(320 497)"><rect width="960" height="64" rx="20" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="28" y="40" class="label" style="fill:#57575B">5 · STATE</text><text x="330" y="40" class="body" style="fill:#010507">proposal + approval + resource version</text></g>
  <g transform="translate(365 575)"><rect width="870" height="64" rx="20" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/><text x="28" y="40" class="label" style="fill:#57575B">6 · POLICY</text><text x="330" y="40" class="body" style="fill:#010507">risk · budget · destination · data class</text></g>
  <g transform="translate(410 653)"><rect width="780" height="64" rx="20" fill="#010507" stroke="#010507" stroke-width="2"/><text x="28" y="40" class="label" style="fill:#FFFFFF">7 · EXECUTION</text><text x="330" y="40" class="body" style="fill:#FFFFFF">idempotency · timeout · receipt</text></g>
  <text x="800" y="858" class="body" text-anchor="middle">A perfectly shaped request can still be forbidden, stale, duplicated, or unsafe.</text>
</svg>
