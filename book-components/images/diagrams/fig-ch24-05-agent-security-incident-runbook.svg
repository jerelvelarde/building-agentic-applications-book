<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Contain, preserve, reconcile, and regress</title><desc id="desc">Four-phase incident runbook from detection and scheduling stop through revocation and isolation, evidence preservation and effect reconciliation, trusted rebuild, regression, and monitoring.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Contain, preserve, reconcile, and regress</text><text x="78" y="126" class="subtitle" text-anchor="start">An agent-security incident needs an order of operations with an evidence product at every phase.</text><rect x="55" y="220" width="270" height="410" rx="24" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="79" y="242" width="142" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="150" y="273" class="label" text-anchor="middle" style="fill:#FFFFFF">PHASE 1</text><text x="79" y="332" class="heading" text-anchor="start"><tspan x="79" dy="0">Detect + stop</tspan></text><text x="79" y="404" class="small" text-anchor="start"><tspan x="79" dy="0">stop scheduling</tspan><tspan x="79" dy="38">freeze risky capability</tspan></text><path d="M329 425 L350 425" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="360" y="220" width="270" height="410" rx="24" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="384" y="242" width="142" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="455" y="273" class="label" text-anchor="middle" style="fill:#FFFFFF">PHASE 2</text><text x="384" y="332" class="heading" text-anchor="start"><tspan x="384" dy="0">Revoke +</tspan><tspan x="384" dy="38">isolate</tspan></text><text x="384" y="440" class="small" text-anchor="start"><tspan x="384" dy="0">credentials · workers</tspan><tspan x="384" dy="38">tool / asset block</tspan></text><path d="M634 425 L655 425" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="665" y="220" width="270" height="410" rx="24" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="689" y="242" width="142" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="760" y="273" class="label" text-anchor="middle" style="fill:#57575B">PHASE 3</text><text x="689" y="332" class="heading" text-anchor="start"><tspan x="689" dy="0">Preserve +</tspan><tspan x="689" dy="38">scope</tspan></text><text x="689" y="440" class="small" text-anchor="start"><tspan x="689" dy="0">hashes · receipts</tspan><tspan x="689" dy="38">tenants · targets</tspan></text><path d="M939 425 L960 425" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="970" y="220" width="270" height="410" rx="24" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="994" y="242" width="142" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1065" y="273" class="label" text-anchor="middle" style="fill:#57575B">PHASE 4</text><text x="994" y="332" class="heading" text-anchor="start"><tspan x="994" dy="0">Reconcile +</tspan><tspan x="994" dy="38">rebuild</tspan></text><text x="994" y="440" class="small" text-anchor="start"><tspan x="994" dy="0">effect count</tspan><tspan x="994" dy="38">trusted image + policy</tspan></text><path d="M1244 425 L1265 425" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="1275" y="220" width="270" height="410" rx="24" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="1299" y="242" width="142" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="1370" y="273" class="label" text-anchor="middle" style="fill:#57575B">PERMANENT</text><text x="1299" y="332" class="heading" text-anchor="start"><tspan x="1299" dy="0">Regress +</tspan><tspan x="1299" dy="38">monitor</tspan></text><text x="1299" y="440" class="small" text-anchor="start"><tspan x="1299" dy="0">minimized fixture</tspan><tspan x="1299" dy="38">release gate + slice</tspan></text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">The invariant is the authoritative effect count and receipt—not the last assistant message.</text></svg>