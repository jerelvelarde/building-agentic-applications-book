<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Agency can move up—and should move down</title><desc id="desc">Bidirectional lifecycle from instrumenting a current path through isolating higher authority and measuring trajectories to converting stable branches into deterministic nodes and narrower tools.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Agency can move up—and should move down</text><text x="78" y="126" class="subtitle" text-anchor="start">Add authority for a real environmental or organizational requirement; remove it when trajectories stabilize.</text><rect x="55" y="220" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="77" y="240" width="176" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="165" y="271" class="label" text-anchor="middle" style="fill:#57575B">INSTRUMENT</text><text x="81" y="324" class="heading" text-anchor="start" style="fill:#11143D">current path</text><text x="81" y="374" class="small" text-anchor="start" style="fill:#57575B"></text><path d="M315 315 L355 315" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="360" y="220" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="382" y="240" width="134" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="449" y="271" class="label" text-anchor="middle" style="fill:#57575B">UPGRADE</text><text x="386" y="324" class="heading" text-anchor="start" style="fill:#11143D">real trigger</text><text x="386" y="374" class="small" text-anchor="start" style="fill:#57575B"></text><path d="M620 315 L660 315" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="665" y="220" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="687" y="240" width="134" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="754" y="271" class="label" text-anchor="middle" style="fill:#57575B">ISOLATE</text><text x="691" y="324" class="heading" text-anchor="start" style="fill:#11143D">higher authority</text><text x="691" y="374" class="small" text-anchor="start" style="fill:#57575B"></text><path d="M925 315 L965 315" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="970" y="220" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="992" y="240" width="134" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="1059" y="271" class="label" text-anchor="middle" style="fill:#57575B">MEASURE</text><text x="996" y="324" class="heading" text-anchor="start" style="fill:#11143D">trajectories</text><text x="996" y="374" class="small" text-anchor="start" style="fill:#57575B"></text><path d="M1230 315 L1270 315" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="1275" y="220" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="1297" y="240" width="130" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="1362" y="271" class="label" text-anchor="middle" style="fill:#57575B">STABLE</text><text x="1301" y="324" class="heading" text-anchor="start" style="fill:#11143D">stable branch</text><text x="1301" y="374" class="small" text-anchor="start" style="fill:#57575B"></text><rect x="970" y="535" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="992" y="555" width="162" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1073" y="586" class="label" text-anchor="middle" style="fill:#57575B">DOWNSHIFT</text><text x="996" y="639" class="heading" text-anchor="start" style="fill:#11143D">deterministic node</text><text x="996" y="689" class="small" text-anchor="start" style="fill:#57575B"></text><path d="M970 630 L930 630" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="665" y="535" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="687" y="555" width="130" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="752" y="586" class="label" text-anchor="middle" style="fill:#57575B">NARROW</text><text x="691" y="639" class="heading" text-anchor="start" style="fill:#11143D">tool + context</text><text x="691" y="689" class="small" text-anchor="start" style="fill:#57575B"></text><path d="M665 630 L625 630" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="360" y="535" width="260" height="190" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="382" y="555" width="130" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="447" y="586" class="label" text-anchor="middle" style="fill:#57575B">VERIFY</text><text x="386" y="639" class="heading" text-anchor="start" style="fill:#11143D">lower cost + risk</text><text x="386" y="689" class="small" text-anchor="start" style="fill:#57575B"></text><path d="M1405 410 L1100 535" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><text x="1252.5" y="458.5" class="small" text-anchor="middle">stable</text><path d="M360 630 L185 415" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><text x="272.5" y="508.5" class="small" text-anchor="middle">repeat</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Downshifting reduces authority, variance, latency, cost, and evaluation surface.</text></svg>