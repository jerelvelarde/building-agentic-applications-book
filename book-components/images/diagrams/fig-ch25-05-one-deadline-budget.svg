<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Allocate one user deadline exactly once</title><desc id="desc">Horizontal journey deadline partitioned into acceptance, queue, model, tool and retry, human wait, verification, and terminal-state reserve, contrasted with stacked fresh timeouts.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Allocate one user deadline exactly once</text><text x="78" y="126" class="subtitle" text-anchor="start">Every downstream call receives remaining time—not a fresh timeout.</text><rect x="70" y="260" width="100" height="145" rx="8" fill="#BEC2FF" stroke="#DBDBE5" stroke-width="1"/><text x="120" y="330" class="label" text-anchor="middle" style="fill:#57575B">ACK</text><rect x="170" y="260" width="150" height="145" rx="8" fill="#85ECCE" stroke="#DBDBE5" stroke-width="1"/><text x="245" y="330" class="label" text-anchor="middle" style="fill:#57575B">QUEUE</text><rect x="320" y="260" width="200" height="145" rx="8" fill="#BEC2FF" stroke="#DBDBE5" stroke-width="1"/><text x="420" y="330" class="label" text-anchor="middle" style="fill:#57575B">MODEL</text><rect x="520" y="260" width="330" height="145" rx="8" fill="#FFAC4D" stroke="#DBDBE5" stroke-width="1"/><text x="685" y="330" class="label" text-anchor="middle" style="fill:#57575B">TOOL + RETRY</text><rect x="850" y="260" width="230" height="145" rx="8" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1"/><text x="965" y="330" class="label" text-anchor="middle" style="fill:#57575B">HUMAN WAIT</text><rect x="1080" y="260" width="190" height="145" rx="8" fill="#85ECCE" stroke="#DBDBE5" stroke-width="1"/><text x="1175" y="330" class="label" text-anchor="middle" style="fill:#57575B">VERIFY</text><rect x="1270" y="260" width="200" height="145" rx="8" fill="#11143D" stroke="#11143D" stroke-width="1"/><text x="1370" y="330" class="label" text-anchor="middle" style="fill:#FFFFFF">RECEIPT RESERVE</text><path d="M70 455 L1530 455" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><text x="800" y="441" class="small" text-anchor="middle">remaining budget moves forward</text><rect x="150" y="555" width="1300" height="130" rx="26" fill="#FFF0F1" stroke="#FA5F67" stroke-width="2"/><text x="800" y="605" class="label" text-anchor="middle" style="fill:#FA5F67">ANTI-PATTERN</text><text x="800" y="650" class="body" text-anchor="middle">gateway timeout + queue timeout + model timeout + tool timeout = journey overrun</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Reserve time to persist a truthful terminal state even when useful work must stop.</text></svg>