<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Layered retries versus one retry owner</title><desc id="desc">The unsafe side multiplies attempts across agent, gateway, queue, SDK, and worker. The safe side gives one layer ownership, propagates attempt, deadline, and budget, and reconciles ambiguous outcomes.</desc><defs><style>.h{font:700 48px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 22px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 16px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.n{font:700 18px 'Spline Sans Mono',monospace;fill:#fff}</style></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="70" y="62">RETRY POLICY</text><text class="h" x="70" y="120">Resilience at every layer becomes amplification</text><text class="s" x="70" y="160">One operation has one retry owner, one deadline, and one remaining budget.</text>
  <g transform="translate(70 220)"><rect width="700" height="570" rx="30" fill="#fff" stroke="#DBDBE5"/><text class="l" x="35" y="55">Unsafe · every layer retries</text><text class="t" x="35" y="88">2 agent × 2 gateway × 2 SDK × 2 worker = 16 attempts</text><g transform="translate(60 140)"><rect width="150" height="60" rx="20" fill="#EEE6FE"/><text class="l" x="75" y="38" text-anchor="middle">Agent ×2</text><path d="M155 30H245" stroke="#8D5BE8" stroke-width="4"/><rect x="250" width="150" height="60" rx="20" fill="#EEE6FE"/><text class="l" x="325" y="38" text-anchor="middle">Gateway ×2</text><path d="M405 30H495" stroke="#8D5BE8" stroke-width="4"/><rect x="500" width="150" height="60" rx="20" fill="#EEE6FE"/><text class="l" x="575" y="38" text-anchor="middle">SDK ×2</text><g transform="translate(0 130)"><rect width="150" height="60" rx="20" fill="#EEE6FE"/><text class="l" x="75" y="38" text-anchor="middle">Queue ×2</text><path d="M155 30H245" stroke="#8D5BE8" stroke-width="4"/><rect x="250" width="150" height="60" rx="20" fill="#EEE6FE"/><text class="l" x="325" y="38" text-anchor="middle">Worker ×2</text><path d="M405 30H495" stroke="#8D5BE8" stroke-width="4"/><rect x="500" width="150" height="60" rx="20" fill="#11143D"/><text x="575" y="38" text-anchor="middle" class="n">TARGET</text></g><path d="M75 65V125 M325 65V125 M575 65V125" stroke="#8D5BE8" stroke-width="3" stroke-dasharray="7 7"/></g><rect x="60" y="435" width="580" height="82" rx="22" fill="#EEE6FE"/><text class="l" x="350" y="470" text-anchor="middle">Duplicate effects · deadline miss · cost overrun</text><text class="t" x="350" y="500" text-anchor="middle">A policy denial may even be misclassified as provider failure.</text>
    <rect x="740" width="720" height="570" rx="30" fill="#E7FBF5" stroke="#85ECCE"/><text class="l" x="775" y="55">Safe · one operation owner</text><g transform="translate(800 135)"><rect width="220" height="75" rx="22" fill="#11143D"/><text x="110" y="34" text-anchor="middle" class="n">RETRY OWNER</text><text x="110" y="58" text-anchor="middle" style="font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">attempt 2 · 18s · $0.41</text><path d="M225 38H340" stroke="#189370" stroke-width="5"/><rect x="345" width="230" height="75" rx="22" fill="#fff" stroke="#85ECCE"/><text class="l" x="460" y="46" text-anchor="middle">Classify error</text><g class="t"><text x="0" y="145">Known invalid / denied</text><text x="0" y="180">Transient and within budget</text><text x="0" y="215">Timeout after possible commit</text></g><g class="l"><text x="385" y="145">STOP</text><text x="385" y="180">BACKOFF + JITTER</text><text x="385" y="215">RECONCILE FIRST</text></g><rect y="275" width="575" height="110" rx="24" fill="#fff" stroke="#85ECCE"/><text class="l" x="287" y="317" text-anchor="middle">Propagate, do not reset</text><text class="t" x="287" y="350" text-anchor="middle">attempt · remaining deadline · remaining budget · idempotency key</text></g>
  </g>
</svg>
