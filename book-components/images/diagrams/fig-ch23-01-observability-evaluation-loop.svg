<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Production observability and evaluation loop</title>
  <desc id="desc">A production run emits correlated events to traces, metrics, and an immutable action ledger. Deterministic contracts, node tests, trajectory evaluations, simulations, and sampled online review judge the run. Confirmed failures are minimized and redacted into regression datasets that gate the next release.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
    <style>
      .title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.label{font:700 15px 'Spline Sans Mono',monospace;letter-spacing:1.1px;fill:#57575B}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#FAFAFC"/>
  <text x="90" y="92" class="title">Evaluate the trajectory</text>
  <text x="90" y="132" class="subtitle">Observe what happened, judge the path, and turn confirmed failures into release gates.</text>

  <g transform="translate(90 210)">
    <rect width="270" height="190" rx="30" fill="#11143D"/>
    <rect x="24" y="24" width="116" height="36" rx="18" fill="#85ECCE"/><text x="82" y="49" text-anchor="middle" class="label">RUN</text>
    <text x="24" y="104" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Production task</text>
    <text x="24" y="140" class="small" fill="#FFFFFF" style="fill:#FFFFFF">goal · steps · tools · state</text><text x="24" y="168" class="small" fill="#FFFFFF" style="fill:#FFFFFF">policy · latency · cost · outcome</text>
  </g>
  <path d="M360 305H430" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(440 190)">
    <rect width="360" height="230" rx="32" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/>
    <rect x="24" y="24" width="142" height="36" rx="18" fill="#BEC2FF"/><text x="95" y="49" text-anchor="middle" class="label">CORRELATE</text>
    <text x="24" y="104" class="heading">Evidence plane</text>
    <text x="24" y="142" class="body">Trace</text><text x="140" y="142" class="small">adaptive path</text>
    <text x="24" y="174" class="body">Metrics</text><text x="140" y="174" class="small">aggregate health</text>
    <text x="24" y="206" class="body">Action ledger</text><text x="176" y="206" class="small">immutable effects</text>
  </g>
  <path d="M800 305H870" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(880 170)">
    <rect width="350" height="270" rx="32" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/>
    <rect x="24" y="24" width="126" height="36" rx="18" fill="#85ECCE"/><text x="87" y="49" text-anchor="middle" class="label">EVALUATE</text>
    <text x="24" y="100" class="heading">Evaluation pyramid</text>
    <text x="24" y="140" class="body">1 · Tool + reducer contracts</text>
    <text x="24" y="174" class="body">2 · Node + state transitions</text>
    <text x="24" y="208" class="body">3 · Trajectory + simulation</text>
    <text x="24" y="242" class="body">4 · Sampled online review</text>
  </g>
  <path d="M1230 305H1300" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(1310 210)">
    <rect width="220" height="190" rx="30" fill="#EEE6FE" stroke="#BEC2FF" stroke-width="2"/>
    <rect x="24" y="24" width="112" height="36" rx="18" fill="#11143D"/><text x="80" y="49" text-anchor="middle" class="label" fill="#FFFFFF" style="fill:#FFFFFF">TRIAGE</text>
    <text x="24" y="104" class="heading">Classify</text><text x="24" y="140" class="small">product · policy · runtime</text><text x="24" y="168" class="small">data · reliability · judge</text>
  </g>

  <path d="M1420 400V530" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(1160 540)">
    <rect width="370" height="180" rx="30" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <rect x="24" y="24" width="184" height="36" rx="18" fill="#EDEDF5"/><text x="116" y="49" text-anchor="middle" class="label">REGRESSION CASE</text>
    <text x="24" y="104" class="heading">Minimize + redact</text><text x="24" y="140" class="small">preserve failing invariant and expected path</text>
  </g>
  <path d="M1160 630H930" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(650 540)">
    <rect width="270" height="180" rx="30" fill="#11143D"/>
    <rect x="24" y="24" width="142" height="36" rx="18" fill="#85ECCE"/><text x="95" y="49" text-anchor="middle" class="label">RELEASE GATE</text>
    <text x="24" y="104" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Block regressions</text><text x="24" y="140" class="small" fill="#FFFFFF" style="fill:#FFFFFF">critical policy suite = zero failure</text>
  </g>
  <path d="M650 630H225V412" fill="none" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="300" y="780" width="1000" height="58" rx="29" fill="#EEE6FE"/>
  <text x="800" y="816" text-anchor="middle" class="body">A correct answer can still fail for the wrong tenant, forbidden tool, duplicate effect, missing approval, or budget breach.</text>
</svg>
