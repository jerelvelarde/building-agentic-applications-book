<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Four durable records and an ambiguous effect</title><desc id="desc">A write commits at the target before the response is lost and the worker crashes. Checkpoint, queue lease, action outcome, and UI projection disagree until the target operation is reconciled.</desc><defs><style>.h{font:700 48px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 22px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 16px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="70" y="62">RELIABILITY BOUNDARY</text><text class="h" x="70" y="120">One run, four records, one ambiguous effect</text><text class="s" x="70" y="160">A checkpoint can restore execution. It cannot prove whether an external target already committed.</text>
  <g transform="translate(70 220)"><text class="l" x="0" y="45">Checkpoint</text><text class="l" x="0" y="165">Queue lease</text><text class="l" x="0" y="285">Action outcome</text><text class="l" x="0" y="405">UI projection</text><g stroke="#DBDBE5" stroke-width="3"><line x1="210" y1="40" x2="1430" y2="40"/><line x1="210" y1="160" x2="1430" y2="160"/><line x1="210" y1="280" x2="1430" y2="280"/><line x1="210" y1="400" x2="1430" y2="400"/></g>
    <g class="t"><text x="235" y="25">dispatch recorded</text><text x="235" y="145">worker A · fence 41</text><text x="235" y="265">operation dispatched</text><text x="235" y="385">working…</text></g>
    <rect x="440" y="-42" width="760" height="34" rx="17" fill="#F3F0FF"/>
    <line x1="690" y1="-36" x2="690" y2="-14" stroke="#BEC2FF" stroke-width="2"/><line x1="950" y1="-36" x2="950" y2="-14" stroke="#BEC2FF" stroke-width="2"/>
    <text class="k" x="560" y="-18" text-anchor="middle">TARGET COMMITS</text><text class="k" x="820" y="-18" text-anchor="middle">RESPONSE LOST · CRASH</text><text class="k" x="1080" y="-18" text-anchor="middle">LEASE REDELIVERS</text>
    <line x1="560" y1="0" x2="560" y2="455" stroke="#6857D9" stroke-dasharray="8 8"/><rect x="575" y="235" width="210" height="62" rx="18" fill="#E7FBF5" stroke="#85ECCE"/><text class="l" x="680" y="274" text-anchor="middle">accepted · op-782</text>
    <line x1="820" y1="0" x2="820" y2="455" stroke="#8D5BE8" stroke-dasharray="8 8"/><rect x="835" y="5" width="190" height="62" rx="18" fill="#EEE6FE"/><text class="t" x="930" y="44" text-anchor="middle">still “dispatched”</text><rect x="835" y="365" width="190" height="62" rx="18" fill="#EEE6FE"/><text class="t" x="930" y="404" text-anchor="middle">still “working”</text>
    <line x1="1080" y1="0" x2="1080" y2="455" stroke="#11143D" stroke-dasharray="8 8"/><rect x="1095" y="125" width="190" height="62" rx="18" fill="#EDEDF5"/><text class="t" x="1190" y="164" text-anchor="middle">worker B · fence 42</text>
    <path d="M1285 280 H1400" stroke="#189370" stroke-width="5"/><rect x="1190" y="480" width="240" height="84" rx="22" fill="#11143D"/><text x="1310" y="515" text-anchor="middle" style="font:700 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">Reconcile op-782</text><text x="1310" y="545" text-anchor="middle" style="font:400 16px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">then checkpoint + UI converge</text>
  </g><rect x="250" y="810" width="1100" height="54" rx="27" fill="#EDEDF5"/><text x="800" y="844" text-anchor="middle" class="l">Never create a new idempotency key because the first request “felt stuck.”</text>
</svg>
