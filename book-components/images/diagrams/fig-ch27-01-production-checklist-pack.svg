<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Production checklist pack</title><desc id="desc">Six checklist cards cover application, machine, organizational, security, screenshot evidence, and launch operations. Every control records enforcement owner, evidence, failure behavior, and whether it blocks release.</desc><defs><style>.h{font:700 46px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.s{font:400 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.k{font:700 15px 'Spline Sans Mono',monospace;fill:#6857D9}.l{font:700 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.t{font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}</style></defs><rect width="1600" height="900" fill="#FAFAFC"/><text class="k" x="60" y="58">FIELD GUIDE</text><text class="h" x="60" y="112">Six checklists, one control contract</text><text class="s" x="60" y="150">A checked box is meaningful only when enforcement, evidence, failure behavior, and ownership are named.</text>
  <g transform="translate(60 205)">
    <g transform="translate(0)"><rect width="460" height="235" rx="26" fill="#E7FBF5" stroke="#85ECCE"/><text class="l" x="25" y="48">Level 1 · application</text><text class="t" x="25" y="90">□ tenant/resource authorization</text><text class="t" x="25" y="122">□ conflict-safe state + receipts</text><text class="t" x="25" y="154">□ exact write approval</text><text class="t" x="25" y="186">□ denial + recovery test</text></g>
    <g transform="translate(490)"><rect width="460" height="235" rx="26" fill="#EDEDF5" stroke="#BEC2FF"/><text class="l" x="25" y="48">Level 2 · machine</text><text class="t" x="25" y="90">□ workspace / process / egress isolation</text><text class="t" x="25" y="122">□ phased capabilities + credentials</text><text class="t" x="25" y="154">□ diff + independent verifier</text><text class="t" x="25" y="186">□ cleanup + recovery drill</text></g>
    <g transform="translate(980)"><rect width="460" height="235" rx="26" fill="#EEE6FE" stroke="#BEC2FF"/><text class="l" x="25" y="48">Level 3 · organization</text><text class="t" x="25" y="90">□ requester / agent / approver identity</text><text class="t" x="25" y="122">□ tenant / channel policy</text><text class="t" x="25" y="154">□ governed memory + delegation</text><text class="t" x="25" y="186">□ target receipt + decommissioning</text></g>
    <g transform="translate(0 270)"><rect width="460" height="235" rx="26" fill="#fff" stroke="#DBDBE5"/><text class="l" x="25" y="48">Cross-level security</text><text class="t" x="25" y="90">□ least agency + deny by default</text><text class="t" x="25" y="122">□ short-lived target credentials</text><text class="t" x="25" y="154">□ kill / revoke / reconcile</text><text class="t" x="25" y="186">□ adversarial regression suite</text></g>
    <g transform="translate(490 270)"><rect width="460" height="235" rx="26" fill="#fff" stroke="#DBDBE5"/><text class="l" x="25" y="48">Screenshot + evidence</text><text class="t" x="25" y="90">□ synthetic data + anonymized chrome</text><text class="t" x="25" y="122">□ source / command / fixture / date</text><text class="t" x="25" y="154">□ trace / scenario + redaction</text><text class="t" x="25" y="186">□ honest evidence status</text></g>
    <g transform="translate(980 270)"><rect width="460" height="235" rx="26" fill="#11143D"/><text x="25" y="48" style="font:700 21px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">Launch + operations</text><text x="25" y="90" style="font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">□ budgets / deadlines / one retry owner</text><text x="25" y="122" style="font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">□ SLOs + action ledger + alerts</text><text x="25" y="154" style="font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">□ degraded mode + incident owner</text><text x="25" y="186" style="font:400 15px 'Plus Jakarta Sans',Arial,sans-serif;fill:#fff">□ rollback / retirement / deletion</text></g>
  </g><rect x="300" y="770" width="1000" height="70" rx="28" fill="#fff" stroke="#DBDBE5"/><text class="l" x="800" y="800" text-anchor="middle">Every row records: control · enforcement owner · evidence · failure behavior</text><text class="t" x="800" y="826" text-anchor="middle">Blank owner or missing evidence keeps a blocking control open.</text>
</svg>
