<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Evidence-gated organizational-agent rollout ladder</title>
  <desc id="desc">Nine ascending stages expand from a synthetic workspace through private read-only work, narrow tools, drafts, reversible and high-impact writes, machine delegation, curated memory, and ambient scheduled work. Each transition requires evidence.</desc>
  <style>.h{font:700 43px Inter,Arial,sans-serif;fill:#11143f}.s{font:400 20px Inter,Arial,sans-serif;fill:#565a70}.t{font:700 17px Inter,Arial,sans-serif;fill:#171a48}.b{font:400 14px Inter,Arial,sans-serif;fill:#4c5066}.m{font:700 14px ui-monospace,SFMono-Regular,monospace;fill:#5b48dd;letter-spacing:1px}.n{font:800 22px Inter,Arial,sans-serif;fill:#fff}.step{stroke:#7d70ed;stroke-width:2}.gate{fill:#121542}</style>
  <rect width="1600" height="900" rx="32" fill="#fafbff"/>
  <text x="88" y="90" class="m">ROLLOUT BY AUTHORITY</text><text x="88" y="146" class="h">Earn each new capability with exit evidence</text><text x="88" y="184" class="s">Authority and persistence expand together; production gates must keep pace.</text>
  <g transform="translate(70 255)">
    <g transform="translate(0 360)"><rect width="155" height="145" rx="18" fill="#eefaf6" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">0</text><text x="18" y="78" class="t">Synthetic</text><text x="18" y="106" class="b">retry · identity</text><text x="18" y="130" class="b">deletion tests</text></g>
    <g transform="translate(165 320)"><rect width="155" height="185" rx="18" fill="#e9fbf5" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">1</text><text x="18" y="78" class="t">Private read</text><text x="18" y="106" class="b">useful artifact</text><text x="18" y="130" class="b">privacy · cost</text></g>
    <g transform="translate(330 280)"><rect width="155" height="225" rx="18" fill="#e7f7f4" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">2</text><text x="18" y="78" class="t">Narrow tools</text><text x="18" y="106" class="b">tenant + target</text><text x="18" y="130" class="b">authorization</text></g>
    <g transform="translate(495 240)"><rect width="155" height="265" rx="18" fill="#eef1ff" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">3</text><text x="18" y="78" class="t">Drafts</text><text x="18" y="106" class="b">no commit</text><text x="18" y="130" class="b">correction data</text></g>
    <g transform="translate(660 200)"><rect width="155" height="305" rx="18" fill="#eceaff" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">4</text><text x="18" y="78" class="t">Reversible write</text><text x="18" y="106" class="b">bound approval</text><text x="18" y="130" class="b">one effect</text></g>
    <g transform="translate(825 160)"><rect width="155" height="345" rx="18" fill="#e7e4ff" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">5</text><text x="18" y="78" class="t">High impact</text><text x="18" y="106" class="b">quorum + duties</text><text x="18" y="130" class="b">game day</text></g>
    <g transform="translate(990 120)"><rect width="155" height="385" rx="18" fill="#f0edff" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">6</text><text x="18" y="78" class="t">Machine delegate</text><text x="18" y="106" class="b">grant · revoke</text><text x="18" y="130" class="b">verify evidence</text></g>
    <g transform="translate(1155 80)"><rect width="155" height="425" rx="18" fill="#eee8ff" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">7</text><text x="18" y="78" class="t">Memory</text><text x="18" y="106" class="b">provenance</text><text x="18" y="130" class="b">correct · delete</text></g>
    <g transform="translate(1320 40)"><rect width="155" height="465" rx="18" fill="#e8ddff" class="step"/><circle cx="28" cy="28" r="20" class="gate"/><text x="28" y="36" text-anchor="middle" class="n">8</text><text x="18" y="78" class="t">Ambient</text><text x="18" y="106" class="b">schedules · spend</text><text x="18" y="130" class="b">kill + recovery</text></g>
  </g>
  <rect x="230" y="804" width="1140" height="54" rx="18" fill="#121542"/><text x="800" y="839" text-anchor="middle" fill="#fff" style="font:700 18px Inter,Arial,sans-serif">Do not graduate on completion rate alone. Require identity, effect, recovery, privacy, and owner evidence.</text>
</svg>
