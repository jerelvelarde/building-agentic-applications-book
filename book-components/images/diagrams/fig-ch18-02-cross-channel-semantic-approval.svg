<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Render semantics, not pixels</title><desc id="desc">Three platform-neutral schematic cards show the same semantic approval rendered for Slack, Discord, and Microsoft Teams while preserving action, target, consequence, actor, expiry, and approve or reject controls.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Render semantics, not pixels</text><text x="80" y="122" class="subtitle">One approval contract becomes platform-native UI with explicit fallbacks.</text><rect x="70" y="180" width="460" height="540" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="92" y="200" width="160" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="172" y="225" class="label" text-anchor="middle" style="fill:#57575B">SLACK ADAPTER</text>
  <text x="94" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Thread card</tspan></text>
  <text x="94" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">Action: create synthetic ticket</tspan><tspan x="94" dy="26">Target: project ONBOARDING</tspan><tspan x="94" dy="26">Consequence: organizational write</tspan><tspan x="94" dy="26">Actor: OperationsAgent</tspan><tspan x="94" dy="26">Expires: 14:32 UTC</tspan><tspan x="94" dy="26">Block-style fields</tspan><tspan x="94" dy="26">native actions</tspan><tspan x="94" dy="26">ephemeral where supported</tspan><tspan x="94" dy="26">[ Approve ]    [ Reject ]</tspan></text><rect x="580" y="180" width="460" height="540" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="602" y="200" width="180" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="692" y="225" class="label" text-anchor="middle" style="fill:#57575B">DISCORD ADAPTER</text>
  <text x="604" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="604" dy="0">Interaction response</tspan></text>
  <text x="604" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="604" dy="0">Action: create synthetic ticket</tspan><tspan x="604" dy="26">Target: project ONBOARDING</tspan><tspan x="604" dy="26">Consequence: organizational write</tspan><tspan x="604" dy="26">Actor: OperationsAgent</tspan><tspan x="604" dy="26">Expires: 14:32 UTC</tspan><tspan x="604" dy="26">fast acknowledgement</tspan><tspan x="604" dy="26">component actions</tspan><tspan x="604" dy="26">ephemeral depends on context</tspan><tspan x="604" dy="26">[ Approve ]    [ Reject ]</tspan></text><rect x="1090" y="180" width="460" height="540" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="1112" y="200" width="160" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="1192" y="225" class="label" text-anchor="middle" style="fill:#57575B">TEAMS ADAPTER</text>
  <text x="1114" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1114" dy="0">Adaptive surface</tspan></text>
  <text x="1114" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1114" dy="0">Action: create synthetic ticket</tspan><tspan x="1114" dy="26">Target: project ONBOARDING</tspan><tspan x="1114" dy="26">Consequence: organizational write</tspan><tspan x="1114" dy="26">Actor: OperationsAgent</tspan><tspan x="1114" dy="26">Expires: 14:32 UTC</tspan><tspan x="1114" dy="26">tenant + app identity</tspan><tspan x="1114" dy="26">inline card or safe web fallback</tspan><tspan x="1114" dy="26">capabilities verified per tenant</tspan><tspan x="1114" dy="26">[ Approve ]    [ Reject ]</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Required semantics stay constant. Modal, file, ephemeral, streaming, and identity behavior must be capability-gated.</text></svg>