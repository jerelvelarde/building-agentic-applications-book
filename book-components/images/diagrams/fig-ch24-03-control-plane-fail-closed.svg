<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">A missing control-plane dependency must reduce authority</title><desc id="desc">Hub-and-spoke failure map connecting execution to identity, policy, approval, credential, sandbox, and audit services, each routing loss to stop, read-only mode, or manual review.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">A missing control-plane dependency must reduce authority</text><text x="78" y="126" class="subtitle" text-anchor="start">Consequential execution is available only when every required control is current and reachable.</text><path d="M255 290 L800 460" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="12 10"/><path d="M255 605 L800 460" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="12 10"/><path d="M800 245 L800 460" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="12 10"/><path d="M800 695 L800 460" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="12 10"/><path d="M1345 290 L800 460" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="12 10"/><path d="M1345 605 L800 460" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="12 10"/><rect x="580" y="350" width="440" height="220" rx="28" fill="#11143D" stroke="#11143D" stroke-width="3"/><rect x="602" y="370" width="358" height="46" rx="23" fill="#11143D" stroke="#11143D" stroke-width="1"/><text x="781" y="401" class="label" text-anchor="middle" style="fill:#11143D">CONSEQUENTIAL EXECUTION</text><text x="606" y="454" class="heading" text-anchor="start" style="fill:#FFFFFF">All controls current</text><text x="606" y="504" class="small" text-anchor="start" style="fill:#FFFFFF"><tspan x="606" dy="0">exact action + target</tspan><tspan x="606" dy="38">narrow grant + receipt</tspan></text><rect x="60" y="205" width="390" height="170" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="82" y="225" width="148" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="156" y="256" class="label" text-anchor="middle" style="fill:#57575B">IDENTITY</text><text x="86" y="309" class="heading" text-anchor="start" style="fill:#11143D">offline → stop</text><text x="86" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="86" dy="0">monitor + alert</tspan></text><rect x="60" y="520" width="390" height="170" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="82" y="540" width="130" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="147" y="571" class="label" text-anchor="middle" style="fill:#57575B">POLICY</text><text x="86" y="624" class="heading" text-anchor="start" style="fill:#11143D">stale → stop</text><text x="86" y="674" class="small" text-anchor="start" style="fill:#57575B"><tspan x="86" dy="0">monitor + alert</tspan></text><rect x="540" y="160" width="520" height="170" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="562" y="180" width="130" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="627" y="211" class="label" text-anchor="middle" style="fill:#57575B">AUDIT</text><text x="566" y="264" class="heading" text-anchor="start" style="fill:#11143D">backpressure → stop</text><text x="566" y="314" class="small" text-anchor="start" style="fill:#57575B"><tspan x="566" dy="0">monitor + alert</tspan></text><rect x="540" y="610" width="520" height="170" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="562" y="630" width="148" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="636" y="661" class="label" text-anchor="middle" style="fill:#57575B">APPROVAL</text><text x="566" y="714" class="heading" text-anchor="start" style="fill:#11143D">store down → queue</text><text x="566" y="764" class="small" text-anchor="start" style="fill:#57575B"><tspan x="566" dy="0">monitor + alert</tspan></text><rect x="1150" y="205" width="390" height="170" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="1172" y="225" width="176" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="1260" y="256" class="label" text-anchor="middle" style="fill:#57575B">CREDENTIAL</text><text x="1176" y="309" class="heading" text-anchor="start" style="fill:#11143D">down → no write</text><text x="1176" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1176" dy="0">monitor + alert</tspan></text><rect x="1150" y="520" width="390" height="170" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="1172" y="540" width="134" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="1239" y="571" class="label" text-anchor="middle" style="fill:#57575B">SANDBOX</text><text x="1176" y="624" class="heading" text-anchor="start" style="fill:#11143D">degraded → inspect</text><text x="1176" y="674" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1176" dy="0">monitor + alert</tspan></text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Lost enforcement never routes around the control; it routes to less authority or no action.</text></svg>