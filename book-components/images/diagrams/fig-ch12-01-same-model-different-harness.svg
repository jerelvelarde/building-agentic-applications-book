<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Same model. Different product.</title><desc id="desc">Split comparison showing identical models and tasks under an ambient permissive harness and a pinned governed harness.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Same model. Different product.</text><text x="80" y="122" class="subtitle">Repeatability comes from the harness around probabilistic judgment.</text><rect x="70" y="190" width="700" height="520" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="92" y="210" width="180" height="36" rx="18" fill="#FA5F67" stroke="#FA5F67" stroke-width="1" /><text x="182" y="235" class="label" text-anchor="middle" style="fill:#57575B">AMBIENT HARNESS</text>
  <text x="94" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Looks fast. Cannot be reproduced.</tspan></text>
  <text x="94" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">Vague goal · mutable base</tspan><tspan x="94" dy="26">Always-on terminal</tspan><tspan x="94" dy="26">Policy mixed into instructions</tspan><tspan x="94" dy="26">Self-updating skills</tspan><tspan x="94" dy="26">Model decides whether tests are enough</tspan><tspan x="94" dy="26">Unknown effect and recovery state</tspan></text><rect x="830" y="190" width="700" height="520" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="852" y="210" width="190" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="947" y="235" class="label" text-anchor="middle" style="fill:#57575B">GOVERNED HARNESS</text>
  <text x="854" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="854" dy="0">Bounded enough to operate.</tspan></text>
  <text x="854" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="854" dy="0">Acceptance criteria · immutable base</tspan><tspan x="854" dy="26">Provenance on context</tspan><tspan x="854" dy="26">Pinned and reviewed skills</tspan><tspan x="854" dy="26">Capabilities change by phase</tspan><tspan x="854" dy="26">Typed intent + bound approval</tspan><tspan x="854" dy="26">Independent verifier + receipts</tspan></text><circle cx="800" cy="390" r="58" fill="#11143D"/><text x="800" y="384" class="label" text-anchor="middle" style="fill:#FFFFFF">SAME</text><text x="800" y="410" class="label" text-anchor="middle" style="fill:#FFFFFF">MODEL</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">The model proposes. The harness supplies memory, capability, restraint, proof, and recovery.</text></svg>