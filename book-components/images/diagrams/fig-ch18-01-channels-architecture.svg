<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Channels architecture from platform event to semantic response</title>
  <desc id="desc">Three generic conversation platforms feed platform-specific adapters. Verified ingress is normalized through identity correlation, durable state, locks, and event deduplication before reaching an agent runtime. Semantic channel UI is then lowered through each adapter. Side-effect idempotency remains a separate application responsibility.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
    <style>
      .title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.label{font:700 15px 'Spline Sans Mono',monospace;letter-spacing:1.1px;fill:#57575B}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#FAFAFC"/>
  <text x="90" y="92" class="title">One agent, many channels</text>
  <text x="90" y="132" class="subtitle">Normalize semantic intent; preserve platform identity, capability, and delivery realities.</text>

  <g transform="translate(70 220)">
    <rect width="230" height="500" rx="32" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <rect x="24" y="24" width="136" height="36" rx="18" fill="#EDEDF5"/><text x="92" y="49" text-anchor="middle" class="label">PLATFORMS</text>
    <g transform="translate(36 94)"><circle cx="32" cy="32" r="30" fill="#85ECCE" opacity="0.58"/><text x="82" y="39" class="body">Channel A</text></g>
    <g transform="translate(36 184)"><circle cx="32" cy="32" r="30" fill="#BEC2FF" opacity="0.68"/><text x="82" y="39" class="body">Channel B</text></g>
    <g transform="translate(36 274)"><circle cx="32" cy="32" r="30" fill="#EEE6FE"/><text x="82" y="39" class="body">Channel C</text></g>
    <line x1="24" y1="374" x2="206" y2="374" stroke="#DBDBE5"/>
    <text x="24" y="412" class="small">Different acknowledgement</text><text x="24" y="438" class="small">deadlines, scopes, files,</text><text x="24" y="464" class="small">actions, and fallbacks.</text>
  </g>

  <path d="M300 470H360" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(370 220)">
    <rect width="250" height="500" rx="32" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/>
    <rect x="24" y="24" width="126" height="36" rx="18" fill="#85ECCE"/><text x="87" y="49" text-anchor="middle" class="label">ADAPTERS</text>
    <text x="24" y="105" class="heading">Ingress</text>
    <text x="24" y="142" class="small">verify signature</text><text x="24" y="170" class="small">acknowledge quickly</text><text x="24" y="198" class="small">normalize event</text>
    <line x1="24" y1="230" x2="226" y2="230" stroke="#DBDBE5"/>
    <text x="24" y="270" class="heading">Egress</text>
    <text x="24" y="307" class="small">lower semantic UI</text><text x="24" y="335" class="small">declare fallbacks</text><text x="24" y="363" class="small">correlate actions</text>
    <rect x="24" y="410" width="202" height="56" rx="20" fill="#E7FBF5"/><text x="125" y="445" text-anchor="middle" class="label">PLATFORM-SPECIFIC</text>
  </g>

  <path d="M620 470H680" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(690 190)">
    <rect width="390" height="560" rx="36" fill="#11143D"/>
    <rect x="26" y="26" width="188" height="36" rx="18" fill="#BEC2FF"/><text x="120" y="51" text-anchor="middle" class="label">CHANNELS CORE</text>
    <text x="26" y="108" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Normalize the run boundary</text>
    <g transform="translate(26 148)"><rect width="338" height="62" rx="20" fill="#FFFFFF" opacity="0.96"/><text x="20" y="38" class="body">Identity correlation</text></g>
    <g transform="translate(26 226)"><rect width="338" height="62" rx="20" fill="#FFFFFF" opacity="0.96"/><text x="20" y="38" class="body">Durable thread + state store</text></g>
    <g transform="translate(26 304)"><rect width="338" height="62" rx="20" fill="#FFFFFF" opacity="0.96"/><text x="20" y="38" class="body">Run locks + event dedup</text></g>
    <g transform="translate(26 382)"><rect width="338" height="62" rx="20" fill="#FFFFFF" opacity="0.96"/><text x="20" y="38" class="body">Actions + transcript linkage</text></g>
    <text x="26" y="492" class="small" fill="#85ECCE" style="fill:#85ECCE">Not supplied by channel normalization:</text>
    <text x="26" y="522" class="small" fill="#FFFFFF" style="fill:#FFFFFF">business authorization · effect idempotency</text>
  </g>

  <path d="M1080 470H1140" stroke="#6857D9" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(1150 220)">
    <rect width="380" height="500" rx="32" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/>
    <rect x="24" y="24" width="150" height="36" rx="18" fill="#BEC2FF"/><text x="99" y="49" text-anchor="middle" class="label">AGENT RUNTIME</text>
    <text x="24" y="106" class="heading">Run the agent</text>
    <text x="24" y="142" class="small">model · tools · policy calls</text>
    <rect x="24" y="184" width="332" height="104" rx="22" fill="#F7F7F9" stroke="#DBDBE5" stroke-width="2"/>
    <text x="44" y="222" class="label">SEMANTIC CHANNEL UI</text><text x="44" y="258" class="body">field · table · action · chart</text>
    <rect x="24" y="318" width="332" height="122" rx="22" fill="#E7FBF5" stroke="#85ECCE" stroke-width="2"/>
    <text x="44" y="356" class="label">APPLICATION BOUNDARY</text><text x="44" y="392" class="body">authorize resource</text><text x="44" y="420" class="small">execute idempotently · audit outcome</text>
  </g>

  <path d="M1360 220V170H495V208" fill="none" stroke="#6857D9" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="930" y="166" text-anchor="middle" class="label">SEMANTIC RESPONSE RETURNS THROUGH THE SAME CORRELATED PATH</text>
  <rect x="350" y="792" width="900" height="54" rx="27" fill="#EEE6FE"/>
  <text x="800" y="826" text-anchor="middle" class="body">Event dedup ≠ run locking ≠ external side-effect idempotency</text>
</svg>
