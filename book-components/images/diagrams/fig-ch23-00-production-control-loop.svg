<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">One production discipline across three authority surfaces</title><desc id="desc">Production control loop centered on a run with trajectory evaluation, authority defense, reliability budgets, and minimum-authority selection, grounded by the control chain.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">One production discipline across three authority surfaces</text><text x="78" y="126" class="subtitle" text-anchor="start">Observe the run, enforce the boundary, operate failure, and reduce authority when evidence allows.</text><rect x="600" y="300" width="400" height="230" rx="28" fill="#11143D" stroke="#11143D" stroke-width="3"/><rect x="622" y="320" width="134" height="46" rx="23" fill="#11143D" stroke="#11143D" stroke-width="1"/><text x="689" y="351" class="label" text-anchor="middle" style="fill:#11143D">THE RUN</text><text x="626" y="404" class="heading" text-anchor="start" style="fill:#FFFFFF">Goal → action → effect</text><text x="626" y="454" class="small" text-anchor="start" style="fill:#FFFFFF"><tspan x="626" dy="0">state + identity</tspan><tspan x="626" dy="38">evidence + outcome</tspan></text><rect x="80" y="205" width="390" height="210" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="102" y="225" width="148" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="176" y="256" class="label" text-anchor="middle" style="fill:#57575B">EVALUATE</text><text x="106" y="309" class="heading" text-anchor="start" style="fill:#11143D">Trajectory</text><text x="106" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="106" dy="0">required + forbidden</tspan><tspan x="106" dy="38">regression gate</tspan></text><path d="M470 310 L595 415" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="1120" y="205" width="390" height="210" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1142" y="225" width="130" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1207" y="256" class="label" text-anchor="middle" style="fill:#57575B">DEFEND</text><text x="1146" y="309" class="heading" text-anchor="start" style="fill:#11143D">Authority</text><text x="1146" y="359" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1146" dy="0">identity + policy</tspan><tspan x="1146" dy="38">narrow credential</tspan></text><path d="M1120 310 L1005 415" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="80" y="490" width="390" height="210" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="102" y="510" width="134" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="169" y="541" class="label" text-anchor="middle" style="fill:#57575B">OPERATE</text><text x="106" y="594" class="heading" text-anchor="start" style="fill:#11143D">Reliability</text><text x="106" y="644" class="small" text-anchor="start" style="fill:#57575B"><tspan x="106" dy="0">deadline + budget</tspan><tspan x="106" dy="38">reconcile failure</tspan></text><path d="M470 595 L595 415" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="1120" y="490" width="390" height="210" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="1142" y="510" width="130" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="1207" y="541" class="label" text-anchor="middle" style="fill:#57575B">SELECT</text><text x="1146" y="594" class="heading" text-anchor="start" style="fill:#11143D">Minimum level</text><text x="1146" y="644" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1146" dy="0">outcome + harm</tspan><tspan x="1146" dy="38">upgrade or downshift</tspan></text><path d="M1120 595 L1005 415" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="260" y="718" width="1080" height="58" rx="20" fill="#EDEDF5" stroke="#BEC2FF" stroke-width="2"/><text x="800" y="756" class="small" text-anchor="middle">intent → enforcement point → evidence → failure behavior</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Observed failure feeds design change; production readiness is part of the architecture.</text></svg>