<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Choose the least adaptive architecture that works</title><desc id="desc">Decision tree routing a task from deterministic rules to a model feature, workflow, bounded assistant, or adaptive agent.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Choose the least adaptive architecture that works</text><text x="78" y="126" class="subtitle" text-anchor="start">Start with rules. Add model choice only where observation changes the path.</text><rect x="80" y="225" width="320" height="190" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="102" y="245" width="148" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="176" y="276" class="label" text-anchor="middle" style="fill:#57575B">DECISION</text><text x="106" y="329" class="heading" text-anchor="start" style="fill:#11143D">Rules are enough?</text><text x="106" y="379" class="small" text-anchor="start" style="fill:#57575B"><tspan x="106" dy="0">YES → no model</tspan></text><rect x="470" y="225" width="320" height="190" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="492" y="245" width="148" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="566" y="276" class="label" text-anchor="middle" style="fill:#57575B">DECISION</text><text x="496" y="329" class="heading" text-anchor="start" style="fill:#11143D">One model step?</text><text x="496" y="379" class="small" text-anchor="start" style="fill:#57575B"><tspan x="496" dy="0">YES → model feature</tspan></text><rect x="860" y="225" width="320" height="190" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="882" y="245" width="148" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="956" y="276" class="label" text-anchor="middle" style="fill:#57575B">DECISION</text><text x="886" y="329" class="heading" text-anchor="start" style="fill:#11143D">Steps are known?</text><text x="886" y="379" class="small" text-anchor="start" style="fill:#57575B"><tspan x="886" dy="0">YES → workflow</tspan></text><rect x="275" y="525" width="420" height="190" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="297" y="545" width="148" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="371" y="576" class="label" text-anchor="middle" style="fill:#57575B">DECISION</text><text x="301" y="629" class="heading" text-anchor="start" style="fill:#11143D">User stays in control?</text><text x="301" y="679" class="small" text-anchor="start" style="fill:#57575B"><tspan x="301" dy="0">YES → tool assistant</tspan></text><rect x="905" y="525" width="420" height="190" rx="28" fill="#FFFFFF" stroke="#FA5F67" stroke-width="3"/><rect x="927" y="545" width="148" height="46" rx="23" fill="#FA5F67" stroke="#FA5F67" stroke-width="1"/><text x="1001" y="576" class="label" text-anchor="middle" style="fill:#57575B">DECISION</text><text x="931" y="629" class="heading" text-anchor="start" style="fill:#11143D">Environment changes path?</text><text x="931" y="679" class="small" text-anchor="start" style="fill:#57575B"><tspan x="931" dy="0">YES → bounded agent</tspan></text><path d="M400 320 L470 320" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M790 320 L860 320" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M1020 415 L1115 525" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M630 415 L485 525" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><text x="800" y="755" class="body" text-anchor="middle">If acceptable trajectories cannot be defined and measured, reduce agency.</text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">The first valid stop is the architecture—not a lower rung on a maturity ladder.</text></svg>