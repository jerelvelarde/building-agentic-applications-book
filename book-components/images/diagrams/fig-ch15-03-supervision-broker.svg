<title id="title">The supervision broker owns the authority chain</title><desc id="desc">Swimlane sequence linking CopilotKit, authenticated gateway, policy and approval, isolated worker broker, verifier and artifact store, target system, and an action ledger with identity badges.</desc><defs>
