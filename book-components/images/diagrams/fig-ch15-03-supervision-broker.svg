<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">The supervision broker owns the authority chain</text><text x="80" y="122" class="subtitle">CopilotKit projects durable run state; trusted services authenticate, decide, execute, and verify.</text><rect x="50" y="180" width="230" height="520" rx="22" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1" /><rect x="68" y="192" width="194" height="36" rx="18" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1" /><text x="165" y="217" class="label" text-anchor="middle" style="fill:#57575B">CopilotKit UI</text><rect x="308" y="180" width="230" height="520" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><rect x="326" y="192" width="194" height="36" rx="18" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1" /><text x="423" y="217" class="label" text-anchor="middle" style="fill:#57575B">Auth gateway</text><rect x="566" y="180" width="230" height="520" rx="22" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1" /><rect x="584" y="192" width="194" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="681" y="217" class="label" text-anchor="middle" style="fill:#57575B">Policy + approval</text><rect x="824" y="180" width="230" height="520" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><rect x="842" y="192" width="194" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="939" y="217" class="label" text-anchor="middle" style="fill:#57575B">Worker broker</text><rect x="1082" y="180" width="230" height="520" rx="22" fill="#EDEDF5" stroke="#DBDBE5" stroke-width="1" /><rect x="1100" y="192" width="194" height="36" rx="18" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1" /><text x="1197" y="217" class="label" text-anchor="middle" style="fill:#57575B">Verifier + artifacts</text><rect x="1340" y="180" width="230" height="520" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><rect x="1358" y="192" width="194" height="36" rx="18" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1" /><text x="1455" y="217" class="label" text-anchor="middle" style="fill:#57575B">Target + ledger</text><rect x="61" y="244" width="208" height="32" rx="12" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><text x="165" y="266" class="label" text-anchor="middle">GUI + session</text><circle cx="165" cy="300" r="13" fill="#11143D"/><path d="M179 300 L409 380" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="319" y="324" width="208" height="32" rx="12" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><text x="423" y="346" class="label" text-anchor="middle">resolve run/workspace</text><circle cx="423" cy="380" r="13" fill="#11143D"/><path d="M437 380 L667 460" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="577" y="404" width="208" height="32" rx="12" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><text x="681" y="426" class="label" text-anchor="middle">canonical intent + grant</text><circle cx="681" cy="460" r="13" fill="#85ECCE"/><path d="M695 460 L925 540" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="835" y="484" width="208" height="32" rx="12" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><text x="939" y="506" class="label" text-anchor="middle">isolated attempt + lease</text><circle cx="939" cy="540" r="13" fill="#BEC2FF"/><path d="M953 540 L1183 620" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1093" y="564" width="208" height="32" rx="12" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><text x="1197" y="586" class="label" text-anchor="middle">checks + artifacts</text><circle cx="1197" cy="620" r="13" fill="#11143D"/><path d="M1211 620 L1441 690" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1351" y="634" width="208" height="32" rx="12" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="1" /><text x="1455" y="656" class="label" text-anchor="middle">receipt + audit</text><circle cx="1455" cy="690" r="13" fill="#11143D"/><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Visibility requests control. Only the broker’s trusted path grants and spends machine authority.</text></svg>