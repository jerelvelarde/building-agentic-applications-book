<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Build the first vertical slice in five milestones</title><desc id="desc">Five-milestone quickstart from UI and typed state through read tools and semantic artifacts, governed writes and interrupts, durability and recovery, and evaluation and operations.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Build the first vertical slice in five milestones</text><text x="78" y="126" class="subtitle" text-anchor="start">Each milestone ends with a visible artifact and a release gate—not merely another integration.</text><rect x="58" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="80" y="265" width="190" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="175" y="296" class="label" text-anchor="middle" style="fill:#57575B">MILESTONE 1</text><text x="84" y="349" class="heading" text-anchor="start" style="fill:#11143D">Surface + state</text><text x="84" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="84" dy="0">UI shell</tspan><tspan x="84" dy="38">typed task contract</tspan></text><path d="M335.6 420 L355.6 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="359.6" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="381.6" y="265" width="190" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="476.6" y="296" class="label" text-anchor="middle" style="fill:#57575B">MILESTONE 2</text><text x="385.6" y="349" class="heading" text-anchor="start" style="fill:#11143D">Read + render</text><text x="385.6" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="385.6" dy="0">one read tool</tspan><tspan x="385.6" dy="38">semantic artifact</tspan></text><path d="M637.2 420 L657.2 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="661.2" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="683.2" y="265" width="190" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="778.2" y="296" class="label" text-anchor="middle" style="fill:#57575B">MILESTONE 3</text><text x="687.2" y="349" class="heading" text-anchor="start" style="fill:#11143D">Write + review</text><text x="687.2" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="687.2" dy="0">trusted mutation</tspan><tspan x="687.2" dy="38">bound interrupt</tspan></text><path d="M938.8000000000001 420 L958.8000000000001 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="962.8000000000001" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="984.8000000000001" y="265" width="190" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1079.8000000000002" y="296" class="label" text-anchor="middle" style="fill:#57575B">MILESTONE 4</text><text x="988.8000000000001" y="349" class="heading" text-anchor="start" style="fill:#11143D">Resume + recover</text><text x="988.8000000000001" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="988.8000000000001" dy="0">checkpoint</tspan><tspan x="988.8000000000001" dy="38">one failure path</tspan></text><path d="M1240.4 420 L1260.4 420" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="1264.4" y="245" width="277.6" height="350" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1286.4" y="265" width="190" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1381.4" y="296" class="label" text-anchor="middle" style="fill:#57575B">MILESTONE 5</text><text x="1290.4" y="349" class="heading" text-anchor="start" style="fill:#11143D">Evaluate + operate</text><text x="1290.4" y="399" class="small" text-anchor="start" style="fill:#57575B"><tspan x="1290.4" dy="0">trace + ledger</tspan><tspan x="1290.4" dy="38">20-case suite</tspan></text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">Only after the Level 1 slice is proven should you add a bounded machine worker or organizational front door.</text></svg>