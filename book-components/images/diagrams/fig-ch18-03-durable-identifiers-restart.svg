<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Five identifiers protect different failure modes</title><desc id="desc">Identifier chain maps platform event ID, agent run ID, proposal ID, idempotency key, and target operation ID, then sequences a restart, ineligible click, eligible click, duplicate delivery, lost response, and reconciliation.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Five identifiers protect different failure modes</text><text x="80" y="122" class="subtitle">Locks and ingestion dedup do not make an external write exactly once.</text><rect x="60" y="180" width="275" height="170" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="82" y="200" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="137" y="225" class="label" text-anchor="middle" style="fill:#57575B">01</text>
  <text x="84" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="84" dy="0">EVENT ID</tspan></text>
  <text x="84" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="84" dy="0">Delivery retry</tspan></text><path d="M335 265 L360 265" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="365" y="180" width="275" height="170" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="387" y="200" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="442" y="225" class="label" text-anchor="middle" style="fill:#57575B">02</text>
  <text x="389" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="389" dy="0">RUN ID</tspan></text>
  <text x="389" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="389" dy="0">One execution</tspan></text><path d="M640 265 L665 265" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="670" y="180" width="275" height="170" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="692" y="200" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="747" y="225" class="label" text-anchor="middle" style="fill:#57575B">03</text>
  <text x="694" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="694" dy="0">PROPOSAL ID</tspan></text>
  <text x="694" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="694" dy="0">Reviewed intent</tspan></text><path d="M945 265 L970 265" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="975" y="180" width="275" height="170" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="997" y="200" width="110" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1052" y="225" class="label" text-anchor="middle" style="fill:#57575B">04</text>
  <text x="999" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="999" dy="0">IDEMPOTENCY KEY</tspan></text>
  <text x="999" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="999" dy="0">One side effect</tspan></text><path d="M1250 265 L1275 265" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1280" y="180" width="275" height="170" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1302" y="200" width="110" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1357" y="225" class="label" text-anchor="middle" style="fill:#57575B">05</text>
  <text x="1304" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1304" dy="0">TARGET OP ID</tspan></text>
  <text x="1304" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1304" dy="0">Accepted effect</tspan></text><rect x="75" y="500" width="190" height="100" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><rect x="95" y="516" width="150" height="36" rx="18" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1" /><text x="170" y="541" class="label" text-anchor="middle" style="fill:#57575B">STEP 1</text><text x="170" y="575" class="small" text-anchor="middle">render action</text><path d="M265 550 L285 550" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="290" y="500" width="190" height="100" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><rect x="310" y="516" width="150" height="36" rx="18" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1" /><text x="385" y="541" class="label" text-anchor="middle" style="fill:#57575B">STEP 2</text><text x="385" y="575" class="small" text-anchor="middle">restart bot</text><path d="M480 550 L500 550" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="505" y="500" width="190" height="100" rx="22" fill="#FFFFFF" stroke="#FA5F67" stroke-width="2" /><rect x="525" y="516" width="150" height="36" rx="18" fill="#FA5F6726" stroke="#FA5F6726" stroke-width="1" /><text x="600" y="541" class="label" text-anchor="middle" style="fill:#57575B">STEP 3</text><text x="600" y="575" class="small" text-anchor="middle">deny wrong user</text><path d="M695 550 L715 550" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="720" y="500" width="190" height="100" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><rect x="740" y="516" width="150" height="36" rx="18" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1" /><text x="815" y="541" class="label" text-anchor="middle" style="fill:#57575B">STEP 4</text><text x="815" y="575" class="small" text-anchor="middle">approve eligible user</text><path d="M910 550 L930 550" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="935" y="500" width="190" height="100" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><rect x="955" y="516" width="150" height="36" rx="18" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1" /><text x="1030" y="541" class="label" text-anchor="middle" style="fill:#57575B">STEP 5</text><text x="1030" y="575" class="small" text-anchor="middle">retry event</text><path d="M1125 550 L1145 550" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1150" y="500" width="190" height="100" rx="22" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2" /><rect x="1170" y="516" width="150" height="36" rx="18" fill="#EDEDF5" stroke="#EDEDF5" stroke-width="1" /><text x="1245" y="541" class="label" text-anchor="middle" style="fill:#57575B">STEP 6</text><text x="1245" y="575" class="small" text-anchor="middle">lost response</text><path d="M1340 550 L1360 550" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><rect x="1365" y="500" width="190" height="100" rx="22" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="1385" y="516" width="150" height="36" rx="18" fill="#E7FBF5" stroke="#E7FBF5" stroke-width="1" /><text x="1460" y="541" class="label" text-anchor="middle" style="fill:#57575B">STEP 7</text><text x="1460" y="575" class="small" text-anchor="middle">reconcile receipt</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">The channel message converges on the target receipt; the effect count—not the button click—proves idempotency.</text></svg>