<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Choose the operating model, not the logo</title><desc id="desc">Three equal non-ranking cards compare a managed coding workflow, an open provider-flexible harness, and a persistent gateway workspace.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">Choose the operating model, not the logo</text><text x="80" y="122" class="subtitle">Overlap in file and command access hides different lifecycles, trust boundaries, and ownership.</text><rect x="70" y="190" width="410" height="500" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="92" y="210" width="260" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="222" y="235" class="label" text-anchor="middle" style="fill:#57575B">MANAGED CODING WORKFLOW</text>
  <text x="94" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Claude Code</tspan></text>
  <text x="94" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">Lifecycle: terminal + IDE</tspan><tspan x="94" dy="26">Model posture: Claude product</tspan><tspan x="94" dy="26">Persistence: sessions + worktrees</tspan><tspan x="94" dy="26">Extension: hooks · MCP · subagents</tspan><tspan x="94" dy="26">Team still owns: identity · network</tspan><tspan x="94" dy="26">secrets · verification</tspan></text><rect x="545" y="190" width="410" height="500" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="567" y="210" width="260" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="697" y="235" class="label" text-anchor="middle" style="fill:#57575B">OPEN COMPOSABLE HARNESS</text>
  <text x="569" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="569" dy="0">Hermes Agent</tspan></text>
  <text x="569" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="569" dy="0">Lifecycle: CLI + custom runtime</tspan><tspan x="569" dy="26">Model posture: provider flexible</tspan><tspan x="569" dy="26">Persistence: sessions + optional checkpoints</tspan><tspan x="569" dy="26">Extension: tools · skills · MCP · backends</tspan><tspan x="569" dy="26">Team still owns: deployment · isolation</tspan><tspan x="569" dy="26">policy · adapter</tspan></text><rect x="1020" y="190" width="410" height="500" rx="28" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="2" /><rect x="1042" y="210" width="210" height="36" rx="18" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1" /><text x="1147" y="235" class="label" text-anchor="middle" style="fill:#57575B">PERSISTENT GATEWAY</text>
  <text x="1044" y="282" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1044" dy="0">OpenClaw</tspan></text>
  <text x="1044" y="318" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1044" dy="0">Lifecycle: long-lived gateway</tspan><tspan x="1044" dy="26">Model posture: configurable</tspan><tspan x="1044" dy="26">Persistence: workspace + sessions + memory</tspan><tspan x="1044" dy="26">Extension: channels · nodes · browser · tools</tspan><tspan x="1044" dy="26">Team still owns: dedicated identity</tspan><tspan x="1044" dy="26">state · egress · tenancy</tspan></text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">This is a dated shape comparison—not a benchmark, security score, or universal ranking.</text></svg>