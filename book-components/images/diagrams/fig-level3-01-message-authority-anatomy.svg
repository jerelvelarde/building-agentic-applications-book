<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">A simple channel request carries an authority chain</title><desc id="desc">Exploded anatomy of an operations-agent channel request with callouts for requester access, agent principal, delegated machine worker, target ticket authority, approver eligibility, and retention policy.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">A simple channel request carries an authority chain</text><text x="80" y="122" class="subtitle">The message is only the entry point; identity, data, delegation, approval, and retention live elsewhere.</text><rect x="435" y="300" width="730" height="230" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="457" y="320" width="170" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="542" y="345" class="label" text-anchor="middle" style="fill:#57575B">SHARED CHANNEL</text>
  <text x="459" y="392" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="459" dy="0">@OperationsAgent investigate onboarding</tspan></text>
  <text x="459" y="428" class="small" style="fill:#57575B" text-anchor="start"><tspan x="459" dy="0">Ask the repository worker to inspect releases.</tspan><tspan x="459" dy="26">Prepare a ticket if you find a likely cause.</tspan></text><rect x="60" y="185" width="330" height="150" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="82" y="205" width="130" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="147" y="230" class="label" text-anchor="middle" style="fill:#57575B">WHO ASKED?</text>
  <text x="84" y="277" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="84" dy="0">stable principal</tspan></text>
  <text x="84" y="313" class="small" style="fill:#57575B" text-anchor="start"><tspan x="84" dy="0">data access</tspan></text><path d="M390 260 L435 370" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8"/><circle cx="435" cy="370" r="7" fill="#6857D9"/><rect x="60" y="555" width="330" height="150" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="82" y="575" width="200" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="182" y="600" class="label" text-anchor="middle" style="fill:#57575B">WHAT MAY BE SEEN?</text>
  <text x="84" y="647" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="84" dy="0">customer events</tspan></text>
  <text x="84" y="683" class="small" style="fill:#57575B" text-anchor="start"><tspan x="84" dy="0">destination disclosure</tspan></text><path d="M390 630 L435 465" fill="none" stroke="#85ECCE" stroke-width="4" stroke-dasharray="10 8"/><circle cx="435" cy="465" r="7" fill="#85ECCE"/><rect x="1210" y="185" width="330" height="150" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="1232" y="205" width="120" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="1292" y="230" class="label" text-anchor="middle" style="fill:#57575B">WHO ACTS?</text>
  <text x="1234" y="277" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1234" dy="0">agent service identity</tspan></text>
  <text x="1234" y="313" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1234" dy="0">credential mode</tspan></text><path d="M1210 260 L1165 370" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8"/><circle cx="1165" cy="370" r="7" fill="#6857D9"/><rect x="1210" y="555" width="330" height="150" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="1232" y="575" width="160" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1312" y="600" class="label" text-anchor="middle" style="fill:#57575B">WHO APPROVES?</text>
  <text x="1234" y="647" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="1234" dy="0">eligible principal</tspan></text>
  <text x="1234" y="683" class="small" style="fill:#57575B" text-anchor="start"><tspan x="1234" dy="0">current policy</tspan></text><path d="M1210 630 L1165 465" fill="none" stroke="#85ECCE" stroke-width="4" stroke-dasharray="10 8"/><circle cx="1165" cy="465" r="7" fill="#85ECCE"/><rect x="435" y="140" width="330" height="150" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="457" y="160" width="180" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="547" y="185" class="label" text-anchor="middle" style="fill:#57575B">WHERE WORK RUNS</text>
  <text x="459" y="232" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="459" dy="0">Level 2 task envelope</tspan></text>
  <text x="459" y="268" class="small" style="fill:#57575B" text-anchor="start"><tspan x="459" dy="0">separate worker policy</tspan></text><path d="M600 290 L780 300" fill="none" stroke="#6857D9" stroke-width="4" stroke-dasharray="10 8"/><circle cx="780" cy="300" r="7" fill="#6857D9"/><rect x="435" y="600" width="330" height="150" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="2" /><rect x="457" y="620" width="160" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="537" y="645" class="label" text-anchor="middle" style="fill:#57575B">WHAT PERSISTS</text>
  <text x="459" y="692" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="459" dy="0">thread · transcript</tspan></text>
  <text x="459" y="728" class="small" style="fill:#57575B" text-anchor="start"><tspan x="459" dy="0">memory · audit · ticket</tspan></text><path d="M600 600 L780 530" fill="none" stroke="#85ECCE" stroke-width="4" stroke-dasharray="10 8"/><circle cx="780" cy="530" r="7" fill="#85ECCE"/><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Organizational agency begins when shared authority is explainable, enforceable, and reconstructable.</text></svg>