<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Level 1 production topology</title><desc id="desc">Every arrow has an owner, identity rule, retry contract, correlation ID, and failure state.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker>
  <linearGradient id="wash" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#BEC2FF" stop-opacity=".22"/><stop offset=".48" stop-color="#85ECCE" stop-opacity=".18"/><stop offset="1" stop-color="#FFAC4D" stop-opacity=".10"/></linearGradient></defs>
  <style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 19px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}.mono{font:500 16px 'Spline Sans Mono',monospace;fill:#57575B}</style>
  <rect width="1600" height="900" fill="#FAFAFC"/><ellipse cx="1260" cy="100" rx="430" ry="230" fill="url(#wash)"/>
  <text x="80" y="86" class="title">Level 1 production topology</text><text x="80" y="124" class="subtitle">Every arrow has an owner, identity rule, retry contract, correlation ID, and failure state.</text>
  <g transform="translate(55 180)">
    <rect width="250" height="330" rx="28" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">CLIENTS</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Web + mobile</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">product identity</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">task UI + semantic artifacts</text>
<text x="28" y="172" class="small" fill="#010507" style="fill:#010507">rejoin same thread</text>
  </g>
<g transform="translate(355 180)">
    <rect width="250" height="330" rx="28" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">GATEWAY</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Authenticated AG-UI</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">verify session</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">authorize thread + agent</text>
<text x="28" y="172" class="small" fill="#010507" style="fill:#010507">stream safe events</text>
  </g>
<g transform="translate(655 180)">
    <rect width="250" height="330" rx="28" fill="#010507" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">RUNTIME</text>
    <text x="28" y="78" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Bounded / LangGraph</text>
    <text x="28" y="116" class="small" fill="#FFFFFF" style="fill:#FFFFFF">model + phase tools</text>
<text x="28" y="144" class="small" fill="#FFFFFF" style="fill:#FFFFFF">budgets + interrupt</text>
<text x="28" y="172" class="small" fill="#FFFFFF" style="fill:#FFFFFF">checkpoint + terminal</text>
  </g>
<g transform="translate(955 150)">
    <rect width="260" height="160" rx="28" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">READ PATH</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Scoped queries</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">compact semantic result</text>
  </g>
<g transform="translate(955 360)">
    <rect width="260" height="190" rx="28" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">WRITE PATH</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Governed effects</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">approval + policy</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">idempotency + receipt</text>
  </g>
<g transform="translate(1270 180)">
    <rect width="275" height="330" rx="28" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">PRODUCT TRUTH</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Services + database</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">tenant authorization</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">domain invariants</text>
<text x="28" y="172" class="small" fill="#010507" style="fill:#010507">authoritative receipts</text>
  </g>
<path d="M 305 345 L 355 345" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M 605 345 L 655 345" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M 905 300 L 955 230" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M 905 390 L 955 455" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M 1215 230 L 1270 300" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M 1215 455 L 1270 410" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<rect x="355" y="610" width="1190" height="100" rx="28" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/><text x="390" y="648" class="label">SEPARATE STORES</text><text x="390" y="682" class="body">thread + checkpoint · action ledger · redacted traces + metrics · evaluation datasets</text>
  <text x="800" y="858" class="body" text-anchor="middle">The runtime does not receive a general database connection because the demo happens to run in one process.</text>
</svg>