<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Channel UI degrades by presentation, not by meaning</title><desc id="desc">Three-tier graceful-degradation ladder from required action semantics through structured channel UI to safe text and web fallback.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">Channel UI degrades by presentation, not by meaning</text><text x="78" y="126" class="subtitle" text-anchor="start">Required semantics survive even when a platform cannot render the preferred component.</text><rect x="150" y="215" width="1300" height="150" rx="28" fill="#11143D" stroke="#11143D" stroke-width="3"/><text x="178" y="269" class="label" text-anchor="start" style="fill:#FFFFFF">REQUIRED SEMANTICS</text><text x="800" y="320" class="body" text-anchor="middle" style="fill:#FFFFFF">action · target · consequence · actor · expiry · decision</text><rect x="260" y="410" width="1080" height="150" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><text x="288" y="464" class="label" text-anchor="start" style="fill:#57575B">PREFERRED CHANNEL UI</text><text x="800" y="515" class="body" text-anchor="middle" style="fill:#11143D">fields · buttons · selects · progress · accessible summary</text><rect x="370" y="605" width="860" height="130" rx="28" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><text x="398" y="659" class="label" text-anchor="start" style="fill:#57575B">SAFE FALLBACK</text><text x="800" y="710" class="body" text-anchor="middle" style="fill:#11143D">plain text + authenticated URL + explicit acknowledgement</text><path d="M800 365 L800 408" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><path d="M800 560 L800 603" fill="none" stroke="#6857D9" stroke-width="5" marker-end="url(#arrow)"/><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">A missing button may change interaction. It must not erase identity, consequence, or approval semantics.</text></svg>