<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">The channel card is not the audit log</title><desc id="desc">Split timeline contrasts editable channel status updates with append-oriented proposal, policy, approval, execution, target receipt, and reconciliation events.</desc><defs>
<marker id="arrow-6857D9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker><marker id="arrow-85ECCE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#85ECCE"/></marker><marker id="arrow-FA5F67" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#FA5F67"/></marker><marker id="arrow-11143D" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#11143D"/></marker>
<style>.title{font:700 50px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 23px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:500 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:700 14px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="80" y="82" class="title">The channel card is not the audit log</text><text x="80" y="122" class="subtitle">Conversation is a status surface. Governance evidence lives in an independent operational record.</text><rect x="70" y="180" width="610" height="500" rx="28" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="2" /><rect x="92" y="200" width="210" height="36" rx="18" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1" /><text x="197" y="225" class="label" text-anchor="middle" style="fill:#57575B">CHANNEL PROJECTION</text>
  <text x="94" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="94" dy="0">Useful, visible, mutable</tspan></text>
  <text x="94" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="94" dy="0">proposal card rendered</tspan><tspan x="94" dy="26">observer sees generic denial</tspan><tspan x="94" dy="26">eligible approval recorded</tspan><tspan x="94" dy="26">status changes to executing</tspan><tspan x="94" dy="26">final ticket link displayed</tspan><tspan x="94" dy="26">platform edit/delete/retention applies</tspan></text><rect x="920" y="180" width="610" height="500" rx="28" fill="#E7FBF5" stroke="#85ECCE" stroke-width="2" /><rect x="942" y="200" width="200" height="36" rx="18" fill="#85ECCE" stroke="#85ECCE" stroke-width="1" /><text x="1042" y="225" class="label" text-anchor="middle" style="fill:#57575B">OPERATIONAL AUDIT</text>
  <text x="944" y="272" class="heading" style="fill:#11143D" text-anchor="start"><tspan x="944" dy="0">Restricted, correlated evidence</tspan></text>
  <text x="944" y="308" class="small" style="fill:#57575B" text-anchor="start"><tspan x="944" dy="0">proposal.created · digest + revision</tspan><tspan x="944" dy="26">policy.decided · principal + version</tspan><tspan x="944" dy="26">approval.denied / granted</tspan><tspan x="944" dy="26">execution.dispatched · idempotency key</tspan><tspan x="944" dy="26">target.accepted · operation receipt</tspan><tspan x="944" dy="26">reconciliation.result · effect state</tspan></text><path d="M680 320 L915 320" fill="none" stroke="#6857D9" stroke-width="4"  marker-end="url(#arrow-6857D9)"/><text x="797.5" y="310" class="small" text-anchor="middle">status projection</text><path d="M915 570 L680 570" fill="none" stroke="#85ECCE" stroke-width="4"  marker-end="url(#arrow-85ECCE)"/><text x="797.5" y="560" class="small" text-anchor="middle">authoritative state</text><path d="M800 230V650" stroke="#FA5F67" stroke-width="3" stroke-dasharray="10 8"/><text x="800" y="705" class="label" text-anchor="middle">SEPARATE RETENTION · ACCESS · INTEGRITY</text><rect x="260" y="790" width="1080" height="72" rx="24" fill="#11143D" stroke="#11143D" stroke-width="0" /><text x="800" y="835" class="body" text-anchor="middle" style="fill:#FFFFFF">Do not call a channel message immutable, tamper-evident, or proof of target acceptance.</text></svg>