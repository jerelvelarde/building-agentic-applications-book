<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">One semantic artifact, platform-native renderers</title><desc id="desc">The agent chooses meaning; product code owns presentation, accessibility, and action boundaries.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker>
  <linearGradient id="wash" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#BEC2FF" stop-opacity=".22"/><stop offset=".48" stop-color="#85ECCE" stop-opacity=".18"/><stop offset="1" stop-color="#FFAC4D" stop-opacity=".10"/></linearGradient></defs>
  <style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 19px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}.mono{font:500 16px 'Spline Sans Mono',monospace;fill:#57575B}</style>
  <rect width="1600" height="900" fill="#FAFAFC"/><ellipse cx="1260" cy="100" rx="430" ry="230" fill="url(#wash)"/>
  <text x="80" y="86" class="title">One semantic artifact, platform-native renderers</text><text x="80" y="124" class="subtitle">The agent chooses meaning; product code owns presentation, accessibility, and action boundaries.</text>
  <g transform="translate(560 185)">
    <rect width="480" height="220" rx="28" fill="#010507" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">TYPED ARTIFACT</text>
    <text x="28" y="78" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">SpendingBreakdown v1</text>
    <text x="28" y="116" class="small" fill="#FFFFFF" style="fill:#FFFFFF">product IDs + retrieval time</text>
<text x="28" y="144" class="small" fill="#FFFFFF" style="fill:#FFFFFF">currency + period + provenance</text>
<text x="28" y="172" class="small" fill="#FFFFFF" style="fill:#FFFFFF">lifecycle + semantic actions</text>
  </g>
<g transform="translate(70 530)">
    <rect width="410" height="210" rx="28" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">WEB</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Chart + table</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">split-pane detail</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">keyboard + screen reader</text>
  </g>
<g transform="translate(595 530)">
    <rect width="410" height="210" rx="28" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">MOBILE</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Summary + drill-down</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">stacked card</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">native navigation + dynamic type</text>
  </g>
<g transform="translate(1120 530)">
    <rect width="410" height="210" rx="28" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">ACCESSIBLE</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Text + data table</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">same values + comparisons</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">no color-only meaning</text>
  </g>
<path d="M 700 405 L 275 530" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M 800 405 L 800 530" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<path d="M 900 405 L 1325 530" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

</svg>