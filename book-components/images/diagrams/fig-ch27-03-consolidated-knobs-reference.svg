<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">The twelve knob families</title><desc id="desc">Indexed reference grid covering model, runtime, context, tools, skills, memory, permissions, human control, evaluation, observability, deployment, and cost.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#6857D9"/></marker>
<style>.title{font:700 52px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.subtitle{font:400 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 32px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.body{font:600 30px 'Plus Jakarta Sans',Arial,sans-serif;fill:#11143D}.small{font:400 27px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.foot{font:600 25px 'Plus Jakarta Sans',Arial,sans-serif;fill:#FFFFFF}.label{font:700 20px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}</style></defs>
<rect width="1600" height="900" fill="#FAFAFC"/><text x="78" y="80" class="title" text-anchor="start">The twelve knob families</text><text x="78" y="126" class="subtitle" text-anchor="start">Every increase needs an owner, enforcement point, evidence, and rollback path.</text><rect x="55" y="170" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="75" y="186" width="92" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="121" y="217" class="label" text-anchor="middle" style="fill:#57575B">01</text><text x="77" y="266" class="heading" text-anchor="start">MODEL</text><text x="77" y="303" class="small" text-anchor="start"><tspan x="77" dy="0">default → change</tspan><tspan x="77" dy="30">risk → evidence</tspan></text><rect x="440" y="170" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="460" y="186" width="92" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="506" y="217" class="label" text-anchor="middle" style="fill:#57575B">02</text><text x="462" y="266" class="heading" text-anchor="start">RUNTIME</text><text x="462" y="303" class="small" text-anchor="start"><tspan x="462" dy="0">default → change</tspan><tspan x="462" dy="30">risk → evidence</tspan></text><rect x="825" y="170" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="845" y="186" width="92" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="891" y="217" class="label" text-anchor="middle" style="fill:#57575B">03</text><text x="847" y="266" class="heading" text-anchor="start">CONTEXT</text><text x="847" y="303" class="small" text-anchor="start"><tspan x="847" dy="0">default → change</tspan><tspan x="847" dy="30">risk → evidence</tspan></text><rect x="1210" y="170" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="1230" y="186" width="92" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="1276" y="217" class="label" text-anchor="middle" style="fill:#57575B">04</text><text x="1232" y="266" class="heading" text-anchor="start">TOOLS</text><text x="1232" y="303" class="small" text-anchor="start"><tspan x="1232" dy="0">default → change</tspan><tspan x="1232" dy="30">risk → evidence</tspan></text><rect x="55" y="365" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="75" y="381" width="92" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="121" y="412" class="label" text-anchor="middle" style="fill:#57575B">05</text><text x="77" y="461" class="heading" text-anchor="start">SKILLS</text><text x="77" y="498" class="small" text-anchor="start"><tspan x="77" dy="0">default → change</tspan><tspan x="77" dy="30">risk → evidence</tspan></text><rect x="440" y="365" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="460" y="381" width="92" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="506" y="412" class="label" text-anchor="middle" style="fill:#57575B">06</text><text x="462" y="461" class="heading" text-anchor="start">MEMORY</text><text x="462" y="498" class="small" text-anchor="start"><tspan x="462" dy="0">default → change</tspan><tspan x="462" dy="30">risk → evidence</tspan></text><rect x="825" y="365" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="845" y="381" width="92" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="891" y="412" class="label" text-anchor="middle" style="fill:#57575B">07</text><text x="847" y="461" class="heading" text-anchor="start">PERMISSIONS</text><text x="847" y="498" class="small" text-anchor="start"><tspan x="847" dy="0">default → change</tspan><tspan x="847" dy="30">risk → evidence</tspan></text><rect x="1210" y="365" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="1230" y="381" width="92" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="1276" y="412" class="label" text-anchor="middle" style="fill:#57575B">08</text><text x="1232" y="461" class="heading" text-anchor="start">HUMAN CONTROL</text><text x="1232" y="498" class="small" text-anchor="start"><tspan x="1232" dy="0">default → change</tspan><tspan x="1232" dy="30">risk → evidence</tspan></text><rect x="55" y="560" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="75" y="576" width="92" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="121" y="607" class="label" text-anchor="middle" style="fill:#57575B">09</text><text x="77" y="656" class="heading" text-anchor="start">EVALUATION</text><text x="77" y="693" class="small" text-anchor="start"><tspan x="77" dy="0">default → change</tspan><tspan x="77" dy="30">risk → evidence</tspan></text><rect x="440" y="560" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#BEC2FF" stroke-width="3"/><rect x="460" y="576" width="92" height="46" rx="23" fill="#BEC2FF" stroke="#BEC2FF" stroke-width="1"/><text x="506" y="607" class="label" text-anchor="middle" style="fill:#57575B">10</text><text x="462" y="656" class="heading" text-anchor="start">OBSERVABILITY</text><text x="462" y="693" class="small" text-anchor="start"><tspan x="462" dy="0">default → change</tspan><tspan x="462" dy="30">risk → evidence</tspan></text><rect x="825" y="560" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#85ECCE" stroke-width="3"/><rect x="845" y="576" width="92" height="46" rx="23" fill="#85ECCE" stroke="#85ECCE" stroke-width="1"/><text x="891" y="607" class="label" text-anchor="middle" style="fill:#57575B">11</text><text x="847" y="656" class="heading" text-anchor="start">DEPLOYMENT</text><text x="847" y="693" class="small" text-anchor="start"><tspan x="847" dy="0">default → change</tspan><tspan x="847" dy="30">risk → evidence</tspan></text><rect x="1210" y="560" width="350" height="180" rx="22" fill="#FFFFFF" stroke="#FFAC4D" stroke-width="3"/><rect x="1230" y="576" width="92" height="46" rx="23" fill="#FFAC4D" stroke="#FFAC4D" stroke-width="1"/><text x="1276" y="607" class="label" text-anchor="middle" style="fill:#57575B">12</text><text x="1232" y="656" class="heading" text-anchor="start">COST</text><text x="1232" y="693" class="small" text-anchor="start"><tspan x="1232" dy="0">default → change</tspan><tspan x="1232" dy="30">risk → evidence</tspan></text><rect x="100" y="804" width="1400" height="66" rx="22" fill="#11143D" stroke="#11143D" stroke-width="0"/><text x="800" y="846" class="foot" text-anchor="middle" style="fill:#FFFFFF">A knob without an enforced ceiling is ambient authority disguised as configuration.</text></svg>