<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Protocols preserve semantics; policy grants authority</title><desc id="desc">AG-UI, MCP, and channel adapters solve different boundary problems.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="context-stroke"/></marker>
  <linearGradient id="wash" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#BEC2FF" stop-opacity=".22"/><stop offset=".48" stop-color="#85ECCE" stop-opacity=".18"/><stop offset="1" stop-color="#FFAC4D" stop-opacity=".10"/></linearGradient></defs>
  <style>.title{font:700 42px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.subtitle{font:400 20px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.heading{font:700 24px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.body{font:500 19px 'Plus Jakarta Sans',Arial,sans-serif;fill:#010507}.small{font:400 17px 'Plus Jakarta Sans',Arial,sans-serif;fill:#57575B}.label{font:600 13px 'Spline Sans Mono',monospace;letter-spacing:1px;fill:#57575B}.mono{font:500 16px 'Spline Sans Mono',monospace;fill:#57575B}</style>
  <rect width="1600" height="900" fill="#FAFAFC"/><ellipse cx="1260" cy="100" rx="430" ry="230" fill="url(#wash)"/>
  <text x="80" y="86" class="title">Protocols preserve semantics; policy grants authority</text><text x="80" y="124" class="subtitle">AG-UI, MCP, and channel adapters solve different boundary problems.</text>
  <g transform="translate(70 230)">
    <rect width="260" height="300" rx="28" fill="#F2F2FF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">PEOPLE + CHANNELS</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Interaction</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">web / mobile</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">Slack / Teams / Discord</text>
<text x="28" y="172" class="small" fill="#010507" style="fill:#010507">requester context</text>
  </g>
<g transform="translate(390 230)">
    <rect width="260" height="300" rx="28" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">AG-UI</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Event contract</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">run lifecycle</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">messages + tools</text>
<text x="28" y="172" class="small" fill="#010507" style="fill:#010507">state + activity + interrupt</text>
  </g>
<g transform="translate(710 230)">
    <rect width="260" height="300" rx="28" fill="#010507" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">RUNTIME</text>
    <text x="28" y="78" class="heading" fill="#FFFFFF" style="fill:#FFFFFF">Execution</text>
    <text x="28" y="116" class="small" fill="#FFFFFF" style="fill:#FFFFFF">bounded loop</text>
<text x="28" y="144" class="small" fill="#FFFFFF" style="fill:#FFFFFF">LangGraph</text>
<text x="28" y="172" class="small" fill="#FFFFFF" style="fill:#FFFFFF">queue / worker</text>
  </g>
<g transform="translate(1030 230)">
    <rect width="260" height="300" rx="28" fill="#E8FBF5" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">POLICY BOUNDARY</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Authorization</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">principal + tenant</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">resource + proposal</text>
<text x="28" y="172" class="small" fill="#010507" style="fill:#010507">current policy + receipt</text>
  </g>
<g transform="translate(1350 230)">
    <rect width="180" height="300" rx="28" fill="#FFFFFF" stroke="#DBDBE5" stroke-width="2"/>
    <text x="28" y="38" class="label">MCP / APIS</text>
    <text x="28" y="78" class="heading" fill="#010507" style="fill:#010507">Effects</text>
    <text x="28" y="116" class="small" fill="#010507" style="fill:#010507">tools</text>
<text x="28" y="144" class="small" fill="#010507" style="fill:#010507">data</text>
<text x="28" y="172" class="small" fill="#010507" style="fill:#010507">services</text>
  </g>
