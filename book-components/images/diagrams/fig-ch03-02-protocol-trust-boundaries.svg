<path d="M 1290 380 L 1350 380" stroke="#838389" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
<text x="1000" y="590" class="label" text-anchor="middle">TRUST BOUNDARY: PROTOCOL EVENTS ARE NOT AUTHORIZATION</text>

